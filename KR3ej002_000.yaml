front:
  text: 自序人生疾病種類繁夥然歸納言之除不內外因外一言以蔽之外感與內傷而已外感與內傷恆有互相之關係成人然婦人然即小兒亦莫不然也故醫者治病最古不事分科蓋病理醫理其道一貫適於此者合於彼初不必為釐然之此疆彼界也自後以病變之多時有增治法之出代有加一人之心思才力未足以盡其奧也故特分科以治之婦科也以其有經帶胎産之異兒科也以其無問診脈診之難專科既分探討益進於是婦幼之書亦復汗牛充棟矣特是衆説紛紜瑕瑜互見整理之道千頭萬緒六七年前余以上海中醫專門學校之聘勉任兒科講席當時滿擬搜集兒科醫書若干種採其精純汰其蕪僻編成較為完備之專書無如診務輯務兩少暇晷往往漏夜屬稿翌日應講匆匆半年草成痧痘講義雖能塞責於學子而私衷輒自慚疏漏也其後歷應上海國醫學院及上海中國醫學院之聘任兒科教授於兩校凡五易寒暑修改增益至數十次始稍稍自愜於懷今年春余書既大部告成於是同道先進以及醫校學子門下諸弟感慫恿付刊遠之廣粵之友人亦馳書促其早日出版蓋兒科專書群推此為編制較新而網羅較備一可供家庭社會之檢查二可作專門醫校之教本也余以茲事體大而不能不勉應衆命也乃再以三月之力改革編纂分為九章凡十萬言其中每述一病必詳其來由及病理於證狀及治法尤三致意焉惟冀他日剞劂既成稍補於世而不棄於知者於私願為己足至於整理學術抉微闡奧級深梗短愧余未能固祈後來者之有以教之也中華民國念三年長夏吳克潛序於海上寄廬
