body:
  text: 第一章出生前後第一節胎中之教養近世治兒科醫學者莫不以落地之始為起點故論證述治恆始於初生以迄於童年其調護養育之法亦然抑若保嬰之道能就生後加以注意則嬰孩無不茁壯比長亦無不堅強者雖然嬰孩生活之起點非起於出生之後乃起於成胎之時也當其胚胞始萌即為靈氣已種逐日長大無時不受母氣之感應感應良好者其胎必良感應惡劣者其胎必劣當其種胎之時父母體氣之是否適合父母身體之有無缺陷亦均傳之於胎兒甚而至於聲音笑貌之微亦莫不寄焉凡茲影響所及感之深者或為一成而不變感之淺者或可潛移而默化由此觀之生後之性情生後之健康以及生後之模型殆莫不出於胎中之時期茁壯堅強亦非僅生後盡力所能致也故欲求保嬰之法追本尋源必以胚胞之期為始則治兒科醫學者固當進一步為起點也本書所述胎中教養之法悉本於實驗及真理以此為起點亦即以此為造成良好嬰孩之基礎至於培養體力彌補缺陷養精蓄鋭善求佳種是則屬於優生學之範圍本書不復贅矣一戒淫欲天地之大德曰生生生不息以成斯世界故春情之萌動男女之好逑根於天賦本諸有生也是謂之生殖性亦屬之性欲惟此種性欲既為蕃衍計而不可無然亦不可不節不節則非但足以戕自己之生抑且足以害兒女之生天既賦人以性欲而不能預為之限是故聖人體天之心製成禮教諄諄言夫婦之別男女之防固不僅為風俗計亦所以為生殖計也查婦人受胎以後最好與夫分寢獨眠寡欲則所生子女必聰慧易育至於不戒淫欲之害舉其犖犖大者約有數端一曰易於流産孕婦身體有強有弱胎元有固有不固若恣情放縱則初成之胎弱者恆因受衝刺而流産強者或亦有孕後漏紅之患胎元一經受傷即能生子亦非十全十美矣二曰易於多病孕婦多欲非但有害於己身抑且使子女多生胎毒多生瘡癤而痧痘等症亦易較尋常為甚三曰害其性情孕婦若能寡欲胎兒稟賦既良將來性情必能溫和否則性情恆易流於暴躁欲念恆易熾於常人至於戒淫欲一端就表面觀之似僅對淫欲之事實言然意淫之害雖無事實亦正相同蓋子母之間感應之力最大母有妄念兒即感之是以婦女孕期須重胎教節欲之法首當正其觀念毋使心有妄動是為最善也二養性情陽剛陰柔婦女之性情貴乎溫和柔婉矧當受胎之時其性情之感應於胎兒者尤大可不慎哉然考婦女受胎以後常因胎氣之影響較平時易於動怒或任情已慣者以為身懷六甲乃婦女大事公婆丈夫皆應以另眼相看因之每每使性多怒者亦有之不知怒易傷肝直接有害於己身間接有害於胎兒故因胎氣易怒者雖不克涵養亦宜強自抑制必要時更宜延醫服藥至於使性則萬萬不可須知婦女生産乃婦女之義務亦世間之常事也婦女固莫不望其所生子女個個良好則怡養性情乃可操券否則得有惡劣之遺傳性將來改變為難矣是以婦女孕期須重胎教不但動怒宜戒他如哀樂之發亦不可失之過度總之七情雖有不能免然必求其中乎節則子女將來當能性情溫良聰慧易育也三慎起居起居飲食人人所宜謹慎婦女懷有身孕尤不可不特加注意蓋二者對於孕婦及胎兒之康健關係亦殊巨也夫母病則子亦病母健則子亦健孕婦患大熱之證往往因熱而胎元損壞以致流産孕婦患虛寒之證往往因寒而胎元不固以致流産且所食之物更宜和平而其中富有滋養者方合否則炙爆煎炒腥鮮異味久嘗皆足使胎兒血分不潔熱毒蘊結生後多病昔賢言孕婦所宜注意者有夏不居樓宜著地氣夜不露坐宜暖背腹不可升高恐其傾跌不可舉物恐其傷胎戒食生冷恐傷其脾戒食煎炙恐傷其胃茶酒之類亦不宜過飲至於飲食之宜以時而進動定之宜勞逸均平皆足以養成胎兒良好之習慣是以婦女孕期須重胎教謹慎起居亦一要事也大生要旨言孕婦不可洗頭不可浴身一切宰殺凶惡之事不宜看龜蛇怪異諸物不可見總言以確守禮記非禮勿視非禮勿聽非禮勿言非禮勿動此胎教之上乘也至於孕婦宜食之物青菜鮮果最相宜其他有蓮心松子熟藕山藥芡實鯽魚童雞童鴨鱸魚海參豬脂豬腰豬肺麻油淡菜筍之類昔人亦謂其頗適於孕婦若謂不可食蛙生子令啞不可食蟹橫生倒産不可食雀令子多淫雖未可盡信要亦不可不信蓋諸物總有不宜之處也四新胎教婦女懷孕之後不可過於安逸宜為輕便之習勞常常散步常常操作即可養成子女將來耐勞之天性於春秋佳日可旅行山水優秀之地以開拓其胸襟而滌除其俗意則子女將來多可秀外慧中此外交結益友多看有益書籍談正當之事業生高超之思想則子女將來自當惡居下流而時時習上閨房之中最好有美術之布置室中懸挂歷代英雄肖像或美女圖畫使孕婦眼光所觸無非英雄美人心中所念亦無非英雄美人則子女將來自可頭角崢嶸別具英爽之風而此期夫婦更宜融融和好而不流於淫能如是者將來子女天性之純潔容貌之清秀必有勝人一籌者可以預期也第二節臨産之處置一接生之方法懷胎足月自然瓜熟蒂落而生産生産原屬平常之事只要接生得法自然母子平安其有流於難産或傷其母或傷其子者皆由平時不守胎教或臨時手忙腳亂故也接生之要旨要在臨産使母子平安經過其方法最宜熟諳其性情宜忍耐其手段宜敏捷蓋能忍耐則不致催迫孕婦動手過早能敏捷則産後處理母子簡速妥貼也今將其步驟述之如後一曰臨産宜慢孕婦足月腹痛有時屬於試痛並非真正臨盆之期至於臨盆之期必腹痛腰痛一齊俱作更進一步則陳陳作勢一陳緊一陳方是將落地之時故接生者於孕婦腹痛時只宜安慰不可動手俟其腰痛作陳胞漿破裂然後徐徐待其落地略見胎兒顱頂方扶持頭顱輕輕曳下即順遂産出矣若逼令産婦用力過早或動手過早反足釀成橫生倒産之弊傷及胎兒也二曰臨産宜忍産婦腹痛總宜忍耐愈能忍痛生産愈易最忌畏痛曲身蜷臥則氣血不舒胎兒礙於轉動則産出必然較難也三曰臨産宜靜産婦房中只須有老成接生者二人看護已足切忌親戚探望家人麇集使房中空氣渾濁聲音雜亂産婦神志為之不寧最好使産婦忍痛略為散步舒其氣血或扶人緩行或挺身仰睡片時使産婦調養心神愛惜氣力則胎兒産出決不致有何等困難矣二落地之調護落地之時之首宜注意者為室中之溫度炎夏之時室中雖不可大開窗戶亦宜流通空氣毋令太悶嚴冬之候更宜使室中溫暖毋使有冷酷之寒氣煤爐過熱及煤氣瀰漫亦大為不宜若在平時總以室中較暖為宜蓋胎兒在母腹中較外界為溫暖也譬如當夏月産生之孩宜先以單夾之布裙圍之待洗浴後再易以單夾之衣當冬月産生之孩宜急以重棉裹之然後再及其他此初落地之措施也落地之調護約有數端皆宜以謹慎敏捷之手段出之以免傷及嬰孩釀成種種變端也一曰洗浴嬰孩生下後接生有兩人者一人料理産母一人料理嬰孩如只有一人可將嬰孩簡單包裹放置一旁料理産母畢時間亦不過數分鐘然後預備開水放入硼酸少許調和之俟其溫度可洗即以之浴兒水以較熱為佳不可過於低溫浴時用潔淨藥棉遍身淋洗手續宜快浴畢再用潔淨毛巾擦乾水濕然後以消毒利剪為之斷臍亦有生下不洗浴先斷臍者非因天時太寒即由時間不及則宜於三朝日燃火取暖為之洗浴浴水有用桑槐榆桃柳各嫩枝三五寸者數十節煎長湯混入豬膽汁少許代水者取其清涼解毒浴畢亦有用滑石甘草細末或松花撲之以免嬌嫩之皮膚受濕而擦傷也二曰斷臍嬰孩生下不洗浴則已若須洗浴必先洗浴而後斷臍決不可先斷臍而後洗浴蓋先斷臍而後洗浴則水濕風寒俱易襲入臍中以致病也斷臍之法接生者一手握臍帶近胞衣處之一段一手將臍帶推擠數次使胞中之血貫注臍穴然後握緊於離臍六七寸處以綿線緊扎用消毒潔淨之利剪迅速剪斷再用枯礬摻軟帛上包裹於臍上亦滿摻枯礬再將臍帶盤置臍上外用紗布包裹繞背緊扎俟其乾燥隨時將護三數日後臍帶脫落若未脫落淨盡切防扯動受傷此時臍眼新嫩宜以軟帛藥棉封裹數日內中或摻以粗紙煨成之紙灰覆地去火毒或枯礬細末或松花均可更須時時看護防其受濕受傷免致臍風臍爛等症也三曰擠乳嬰兒初生無論男女兩乳必有餅子接生者宜於洗浴時將兩乳頭各擠一把捏去些須乳汁則腫硬自消四曰穿衣嬰孩衣服宜用潔淨之舊帛製成不宜加邊四周皆毛故曰毛衣為其柔軟而不傷皮膚也穿時切忌鹵莽而傷及嬰孩筋骨又忌遲滯而纍及嬰孩受寒五曰洗口分娩之時嬰兒初離母體口中含有液毒如血塊狀接生者宜乘其頭顱方出産門啼聲未出時以敏捷之手法挖去之及至啼聲一出隨即咽下不及挖去矣此種液毒之塊咽下有害腸胃並釀成口內諸病然不及挖去者多故嬰兒穿著已畢宜行拭口之法以清潔其口腔普通以甘草銀花煎湯用藥棉遍洗口內熱毒重者宜用黃連煎湯洗之略有咽下亦屬不妨嗣後每間三四小時拭洗一次硼酸沖水大黃煎湯皆可通用更須洗眼當初次洗時兩眼內可滴以稀硝酸銀一二滴其後可以硼酸沖水時時揩拭眼角眼皮蓋嬰兒生下經過産門胞漿之類侵入眼中未免有毒生後切宜注意及之庶免釀成目疾貽患將來也以上五種為初生落地普通調護之法至於初生急症有時不得不為特殊之調護者容俟後節述之俾臨時知所措施也第三節初生之去毒胎兒居於母體中總不免感染七情六欲以及飲食之毒故胎兒未産之前胎毒已隨日積月纍而蘊藏於軀體之中不過毒有輕有重之別他日發為口病遊丹疹痘驚熱等症亦有甚與不甚之差初生之去毒蓋藉藥物之力冀以減輕其毒邪為預防後患計耳其法內服外治相沿有數種茲述之如後一內服去毒方一以甘草煎湯用胡桃肉去皮研爛取薄紗包胡桃肉如小棗隨時蘸甘草之汁納兒口中任其吮汁二用當歸尾紅花桃仁甘草大黃各五分煎汁盡生下六個時辰內服完三用甘草淡豆豉濃煎汁與三五口四用三黃湯黃連黃柏黃芩或作大黃黃連黃芩時時服之五用淡薑湯喂之六用犀黃三五分隨時置少許於舌上任其自然咽下以上六方第一二三方皆可通用第四方則孕婦素體熱而胎火旺者宜多服之第五方則冬季生産嬰孩受寒面色㿠白唇色淡紅者適用之第六方則嬰孩血熱發生遊丹或口疳者適用之凡此等去毒之法無非使嬰孩蘊結於腸胃之穢物暢下無阻則後天既潔淨以無瑕先天之伏毒亦得以解除不少也小兒經此去毒之法以後必解出黑糞二三次或歷二三日而未已此糞謂之胎糞胎糞既淨漸見嫩黃之稀糞是為腸胃已清後天正式之胃氣始萌矣二外治去毒方一用黃梔子桃仁杏仁各一粒白胡椒三粒共研細末取烏骨雞蛋清調和之於嬰孩未滿月前包敷足心男左女右一周時解下足心現青黑之色可免嬰孩將來驚熱之病二用川白蜜小磨麻油雞蛋清黃酒各一調羹和勻於嬰孩三朝洗浴時先敷前胸次敷後背用新木梳略梳幾梳後以青布輕輕摩擦如有白毛挺出將鑷子齊根拔出淨盡其毛尖頭黑而粗極堅硬長五六分其餘兩手心兩足心腦後兩肩尾骨等處只須如法挨次而行至少有數十根多則二百餘根為率無論多少總宜擦遍拔完惟所擦各處有無不定若竟無一根擦出者可保長生少病其有者即夭折之根苗一經拔出可以止驚稀痘免除一生大病小恙以上二方第一方凡嬰孩生下人人可為第二方宜於天氣和暖之時候行之若天氣嚴寒反恐受凍不宜也第四節急症之療治嬰孩生下常有種種急症出人意料其原因雖屬各別然治之均宜迅速否則一有耽誤每致不及救治矣茲將各種急症發生之原因及救治之方法分述於後一生下不啼嬰孩方出産門即有啼聲故出世亦謂之呱呱墮地其有生下不啼者謂之假死原因各別務宜細辨一最普通者為孕婦難産以致胎兒逼於産門進退不得為時過久則氣息閉塞墮地時不能出聲奄奄如死此時接生者宜輕拍其背使其肺氣舒展啼聲即出二難産過甚嬰孩經醫者良久之手術而取出者往往因窒息過久拍背亦不能遽出啼聲宜將嬰孩兩腳提起倒懸而甩動之不效則用人工呼吸法三因臨産勞傷胎氣或為天時寒冷所致以至不能啼叫者未可遽斷臍帶宜用熏臍帶法將嬰孩棉絮包裹抱於懷中離胞寸許用苧皮扎緊將大紙條蘸麻油點火於臍帶上遠遠往來熏之使暖氣入臍寒得溫散啼聲方出俟其氣回乃可斷臍或用蘄艾灸臍帶上亦可四嬰孩生下不啼亦有因喉間蒂丁前上齶上有一泡閉住宜急看視如有此泡可用潔淨銀針挑破或用手指摘破以帛拭去惡血弗令咽下再以京墨搽之即能通聲吞乳矣五嬰孩生下不啼亦有因糞門有一膜閉住兒氣故不能出聲宜以銀針挑破其膜即能出聲凡此種生下不啼之症雖如法施治已能出聲然總宜慎於將護且弗令久睡庶免氣息之復行閉塞也二生下不乳嬰孩生下即知努嘴索乳今與乳而不能吮必然有病有因口症而不能吮者有因臍風而不能吮者俱詳見後章至於不因上述諸症者一因腹中積有瘀血穢惡一因胎中受寒生下遭冷前者腹滿短氣宜用大黃牽牛檳榔之屬以攻積後者面色青白宜用生薑乾薑白朮砂仁木香陳皮之類以溫中散寒調胃行氣然審證用藥必須兼顧脈息及舌苔毋忘投也三兩眼不開嬰孩生下兩眼不開或由胎毒蘊結肝家有熱或由初生時遇穢侵入眼內可以熊膽黃連少許煎湯熏洗或用生地赤芍當歸青葙子之類煎服之或以清涼眼藥滴入眼中總之兩眼最為嬌嫩必須防其受損庶免生而失明也四二便不通嬰孩生下大小便不通腹脹欲絶者急令人溫湯漱淨口吸咂兒之前後心臍下兩手足心共七處每處吸咂五七口取紅赤色氣透為度氣透則便自通內服輕粉按此藥有毒不可輕試五分調蜜少許徐徐與之再看肛門是否閉塞宜以物透而通之又大小便不通輕者用大黃牽牛車前甘草木通之類即通重者可用巴豆少許與服通大便及田螺加麝香取涎置臍下少腹處通小便無有不通者若二便不通至於肚腹膨脹不能乳食作呻吟之聲則難於施治矣其有僅小便不通者用蔥白三四寸搗爛拌入人乳中與服謂之蔥乳湯方頗平淡而有效或以食鹽置臍中尉之如少腹作脹者用針略砭少腹數下刺出紫血少許小便即通其有僅大便不通者三黃湯加大黃服之即通五嘔吐不止嬰孩生下嘔吐不止因腹中穢惡不淨而吐者多腹脹便祕宜服木瓜丸因客寒犯胃而吐者多曲腰而啼吐沫不止宜服香蘇飲因胎前受熱而吐者面黃赤手足溫多出黃涎宜服二陳湯加黃連因胎前受寒而吐者面青白四肢冷多出白沫宜服理中湯若吐乳直出不停者多由吃乳過多運化不及所致宜用焦麥芽三錢橘紅一錢丁香三分煎服之六遍體無皮嬰孩生下遍體無皮俱是紅肉因母受胎之後久處高樓不沾地氣故有此異用純黃土研細盛軟絹袋在兒周身輕輕撲之一日三四次俟皮生即止或用珍珠末白秈米粉亦可更有焮熱發赤者母體火盛也用石膏末敷之或由父母素有梅毒遺傳者兒生多半身赤爛無皮宜服換肌消毒散治之外用黃柏煅石膏為細末摻之七周身發泡嬰孩生下周身如魚泡或如水晶擦破則水流此濕毒注於皮膚也以密陀僧研極細炒過乾摻之內服蘇合香丸八蝦蟆瘟疫嬰孩生下胸腹忽如水晶色臟腑俱見此以胸腹腫亮光如水晶者即是若臟腑俱見則未必然此名蝦蟆瘟用大蝦蟆六隻將四足扎起以蝦蟆肚皮在水晶色處撫摩幾次置兒臍上再用第二隻亦如前法更換六隻其病即痊但蝦蟆眼中有蟾酥須防迸出射人宜以絹遮其眼用畢將蝦蟆仍放歸曠野中九陰囊縮腹嬰孩生下數日之內有陰囊忽收縮入腹啼哭不止者由受寒所致用硫黃吳茱萸各五錢為細末研大蒜調塗臍下再以蛇床子炒熱帛包尉臍即下十陰囊光腫陰囊腫大墜下不收用紫蘇為末如患處濕則乾摻干則香油調塗雖皮潰而核欲墜者亦有神效附方一木瓜丸治小兒吐不止木瓜麝香膩粉即輕粉木香檳榔各等分研細末麵糊如小黃米大每服一二丸甘草水下時時用之二香蘇飲治小兒嘔吐泄瀉等證藿香蘇葉製厚朴陳皮枳殼茯苓煨木香炙甘草各等分以生薑為引水煎服三二陳湯治胃中寒濕痰濁等證陳皮去白脅下引痛醋炒乾咳蜜制半夏生薑汁製熱痰竹瀝制妊娠惡阻醋製茯苓停飲心悸桂枝煎酒製各二錢甘草炙痞脹砂仁汁制一錢生薑七片咳逆痰結蜜煎一方有烏梅肉一個瀉利炒焦用四理中湯治中焦脾胃虛寒不能運化嘔吐泄瀉不飲不食胸痹胸痞腹痛痰多傷寒直中太陰自利不渴寒霍亂吐瀉四肢逆冷自汗脈虛便血血痢傷胃吐血婦人妊娠虛寒等證人參炙甘草白朮各三錢乾薑一錢清水煎服五換肌消毒散治時瘡楊梅瘡初起或潰爛者萆薢五錢當歸白芷皂角刺薏苡仁各一錢白蘚皮木瓜勿犯鐵器木通金銀花各七分甘草連翹防風各五分茯苓芍藥各一錢黃耆二錢川芎生地各八分分作二三劑清水煎服六蘇合香丸治傳尸骨蒸殗殜傳尸癆之一肺痿疰忤狐鬼邪祟驚癇中風痰厥心腹猝痛昏迷僵仆寒證氣閉寒霍亂吐利時氣瘴瘧赤白暴痢婦人瘀血經閉小兒驚搐吐乳療痃癖疔腫蘇合香油白色者佳入安息膏內五錢丁香安息香另為末用無灰酒五合熬膏飛去砂土青木香白檀香沉香另研極細蓽茇香附子炒去毛訶梨勒煨取肉烏犀角屑鎊另研極細硃砂另研水飛以一半為衣各一兩薰陸香另研龍腦另研各五錢麝香另研勿經火七錢五分一方加白朮去白檀香蓽茇訶梨勒用安息香膏並煉白蜜和丸如芡實大約重八分硃砂為衣蠟殼護封每服一丸第五節兒科之診法兒科之診法雖無異於成人然以小兒之幼者口不能言較長者又言不達意且有拒絶生人臨診啼哭之事廉得其情殊非易易故世有寧醫十男子莫醫一婦人寧醫十婦人莫醫一小兒之諺也然小兒七情六欲究不同於成人所患之證非虛即實有憑有據只須診察周到得其原委則病之復雜究亦遜於成人故治法方面或有反較成人為易者惟所難者乃在臨證之心領神會聰明穎悟耳今將診治兒科之必須別創一法與成人不同者述之如後至於融會而變通之端在醫者臨時之化裁若執柱而膠瑟刻舟以求劍則又失之遠矣一診脈息小兒之腕短而小醫者初不能按三部以分別之然浮沉遲數滑澀虛實則不可不仍察之於此可以大拇指按之辨其全體之脈象此小兒診法之不同於成人者一也又小兒脈息之跳躍較成人為速尤小則尤速焉襁褓之兒一息常七八至七歲以上五至為平七歲以下六至為平此小兒診法之不同成人者二也又小兒診脈之時有驚哭啼叫者其脈常因此而乍大乍小為之凌亂不能辨則宜俟其睡時潛為診之否則誤虛為實誤實為虛患不勝言此小兒診法之不同於成人者三也又小兒脈息既速故呼吸之氣亦較短成人之呼吸一分鐘常為十九次小兒之呼吸在一歲以內一分鐘常為三十五次一歲以外約為二十六七次以上此小兒診法之不同於成人者四也又小兒當驚哭啼叫之時其呼吸常因此而尤為迫促此非喘也宜就其驚定良久而潛聽之乃得聞其正確之呼吸此小兒診法之不同於成人者五也二察神情診治小兒之病最宜點察其神情視其靜視其動視其一動一靜之處而不少病機可以意會矣如醒而常靜止者周身必無何等痛楚可言也若一時靜止一時動而以手近腹者此必腹中間作陳痛也似睡非睡靜止而氣促此必呼吸困難胸中作悶神氣疲弱而不欲動也若一時靜止一時動而以手近胸者此必胸中煩躁也靜而呼之似應非應身熱者此必熱趨於內而神志迷濛也靜止懶言呼吸清長而身不熱者此必久病虛弱之證也動而欲狂渴飲冷水而身大熱者此必邪熱內盛而欲外達也又如頭痛者常護其頭牙痛者常護其腮心痛者曲身護其胸大痛者爬床而搔席痛不可按者則堅拒不令近以手爪挖皮膚者則為癢欲食不能食咽物則哭者為口舌之病為喉痛凡此者既可以意會得之則舉一以反三諸病自無遁形再合色脈以參之而治法當不虞其左矣三看三關小兒三歲以內按脈既有不能憑者相沿有察看食指三關關紋之法男左女右分別察之自虎口看起至食指第一節之端為風關至第二節之端為氣關至第三節之端為命關小兒有病則紋見於三關紋藏不露其病猶輕紋色暴露其病必重紋紫色為熱紋紅色多傷寒紋色青多驚風紋色白多屬疳紋黃色或淡紅多屬小恙若見黑色則為危候又凡紋之見於下截風關者多為輕病小恙紋之見於中截氣關者為重紋之見於上截命關者尤重直透三關則為大危之候也三關有種種花紋主種種疾病之説未必確實故刪而不録四附雜法凡聞小兒之聲自以清亮和平者為吉若啼聲如鴉直而無回音者無論虛實之證皆為重篤之候又啼而有淚者謂之哭啼而無淚者謂之號有淚之哭津液不枯無淚之號津液必少又直聲而啼不住者非驚即痛也啼以時而止作者多由痛之忽止忽作也又驗其鼻竅以指拈之即嚏者靈竅通暢也以藥拈之猶不能嚏者靈竅閉塞也諸恙竅開者多輕竅閉者多重此皆可就一端而得以推想其病情者若夫按其腹之膨者堅實者多食積及蟲積明亮者多屬水濕繃急虛脹者多屬氣虛食多而身瘦者多蟲病多胃火此又可以意得之者也第二章養育方法第一節哺乳時期一襁褓之護持嬰孩初生其淨重約為五斤至七斤之間父母身材長大者産兒恆較大而重父母身材短小者産兒恆較小而輕女孩則較男孩稍輕然纖弱女子産兒雖小初不因之而妨及康健若護持有方將來長成之後體格或亦能變為偉大也惟初生骨胳皮膚無不柔嫩護持之方殊非容易有其常識更須有誠摯愛兒之心方能體貼入微嬰孩獲其實益也今將襁褓時期之應須注意者擇要述之如後嬰孩初生皮膚上充盈血液故呈高度之紅色謂之胎膚胎膚上且護以頗長之毳毛此種紅色生後一星期內漸次減退其胎膚亦漸次脫落在此時期皮膚之柔嫩異常最易擦破最好宜常易內衣勤加拂拭洗面可先用乳汁塗抹再用毛巾蘸溫開水揩乾則皮膚光潔腠理致密浴身洗口洗眼均宜規定時期為之總以清潔而無礙於兒體為合度嬰孩初生其頭圍與胸圍約相等均為一尺或頭圍竟稍大但胸圍之發育應較速半年之後胸圍應大於頭圍否則即非健康之兒矣嬰孩初生哺乳宜遲至十二小時或二十四小時之後生後三四日吸取乳量亦不能過多此時胎糞之排泄不少兒身體重往往較出生時為輕俗語謂之收身非屬病徵亦有偶爾現發熱之象亦非病徵以兒體中乾燥缺水也此種現象不久即恢復常態若久而體重不增發熱不退者則為病徵宜亟設法醫治矣嬰孩初生睡眠之時甚多每日夜約為十四小時至十六小時不必屢屢警之使醒若覺飢餓自能醒而索乳其有終日沉睡不醒者則防有遊丹及臍風發熱等證宜注意審察以防患於未然嬰孩之腸其比例較成人為長因其吸收滋養之力弱故不得不長也嬰孩之胃不若成人之在水平位置殆垂直接於食管故乳後搖動其體極易吐乳嬰孩衣服不可過暖過暖則令筋骨柔弱宜時見風日不見風日則令肌膚脆軟往往成童之兒體質軟弱動輒感冒實由襁褓時所造成者不在少數也嬰孩不可聞啼即抱一抱便乳因此最足以養成其好啼之惡習而於乳食方面亦有漫無限制之弊也最良之育嬰法除吃乳外勿必保抱宜安置有輪床筐內略為搖動使之肢體舒適氣血宣暢即在夜間亦不同睡一床嬰孩與乳母同睡須防其口對兒之囟門時時吹氣久則兒能致病乳頭亦不可任令長含口中在嬰孩有悶斃之險在乳母亦有乳吹之患嬰孩屎尿布片宜勤換勿令屎尿久留身上換時切忌當風如用水揩拭須用溫水其布片日曬須要攤涼火烘須要退熱如此庶可免除風寒暑濕燥火等症嬰孩初生三四個月內只宜橫抱至百日之後方可漸漸豎抱豎抱之時宜注意頭項勿使傾斜倒側半歲之內不可令多坐恐致脊骨受傷不可令久立恐致腿骨彎曲又當睡臥之時不可令其常側一面致使頭骨歪斜損其儀容嬰孩初生聽覺極鈍幾等於無聞然二三日後發達極速數星期後已鋭敏異常故小兒之近旁不可發高聲恐傷其聽覺雷鳴放炮時宜掩耳以保護之嬰孩初生未剃胎頭前不可戴帽晴和之天氣宜抱兒出外數見風日如是可使兒氣血強盛腠理堅固堪耐風寒不易得病庶自幼至長少見鼻塞拖涕之狀嬰孩衣服宜寬大使其易於發育嬰孩又可習薄衣之法當從秋習之不可以春夏卒減其衣令兒中風寒嬰孩當消息無令多汗出汗出多則致虛損易受風寒晝夜寤寐皆當戒之嬰孩當時驗其溺色如小便少停變成米泔水狀者此必腸胃不清有發熱之象嬰孩當時驗其糞色色深黃蒼老而細膩者為無病之糞色少帶溏薄者因乳食使然亦非病象倘所食為牛乳代乳粉之類則糞便必較用人乳者為干若嫩黃不蒼渣滓不能全細則胃中火力有不到之處若淡黃則火力不到食僅半化若色青色白則病象成矣故於糞色不正之際先宜早為之防嬰孩每星期宜磅稱一次驗其體重有無增加若不增而反減者防有疾病之暗伏切宜注意不可忽視二哺乳之方法嬰孩哺乳乳汁宜慎為選擇時間宜妥為規定哺法宜精密可靠則嬰孩健康茁長疾病常無由以生奈世人對於嬰孩哺乳恆以為有乳可食其他更無問題以致腸胃之病層見疊出疳積等症亦積漸而成可不戒懼茲將哺乳之方法擇要述之如後嬰孩之自乳者為母宜戒憂怒酒醉淫欲等事如有之切勿驟然與乳母睡勿與乳恐食乳過多而傷脾胃與乳之時宜略為擠去宿乳然後與吮則少有停滯之患選擇乳母年齡宜在三十五歲以下性情溫和體格健全者過肥過瘦皆有不宜至有曾患梅毒及神經性病肺病黃疸喘息腳氣近視重聽等更有大患不可姑息雇用凡乳母之乳房充實高起乳汁白而甘濃其子女無病健全者方可雇用之乳母之食料宜清淡而富有滋養料者為合牛乳雞蛋豬蹄青菜之類於乳母最為相宜乳母生子一年左右者再哺嬰孩則不適於用蓋哺嬰孩至十個月之久則乳汁將歷二年已清淡而無滋補之力矣故雇用乳母須考查其兒生日期初生至三月以內者最為適用以哺至十個月或一周歲為止有孕之乳母不可哺兒驟患風寒感冒者哺乳亦宜暫行停止代以乳粉或乳糕人乳不足須添用牛乳者人乳牛乳宜分隔時間與之不可一時並用恐成停積之患每日擇二三次於乳畢之後與嬰孩以鮮橘汁一羹匙能輔助消化增加營養最為有益如吃牛乳乳粉者更不可或缺俾潤澤腸胃使大便有序嬰孩哺乳之時間在我國普通社會往往漫無標準最為有害按照嬰孩消化力哺乳時間宜隔二小時至三小時一次稍長則宜隔四小時一次晚間之次數愈少愈妙至於每次哺乳之時間約以十五分鐘為率乳質少者略為超過之乳質多者略為減少之嬰孩初乳乳母宜將乳頭洗淨每次哺乳之後均宜保持其清潔或用棉花洗過而以清潔之布片覆之嬰孩六個月之內只宜吃乳不宜兼吃糕餅粥飯七個月後可略吃粥飯亦不可與肉類葷腥蓋兒生六個月內尚無消化米粉質之能力十個月內尚無消化肉類等之能力也哺乳無一定之時間常能養成不規則之睡眠故夜啼之類恆由夜間多抱多乳而引起蓋夜間少睡必白日多睡白日愈多睡夜間愈少睡而夜啼養成矣如遇有此等情形不可稍存姑息宜亟設法矯正之飲乳量過多之小兒大都在哺乳中或哺乳後吐出乳汁睡眠不安啼哭多屁排尿頻數大便多而次數亦為之增加飲乳量過少之小兒因身體疲倦易於飲乳未了時即時睡去但經短時間後忽以響大之飢餓號叫而復醒兒體外觀萎枯弛緩腹部凹陷尿量減少大便次數少而量微為暗褐或帶青色之黏液狀糞便飲乳量過多之小兒雖呈消化過度之狀但小兒貪食天成索乳依然宜漸為減低其量使於不知不覺間校正之不得已時或每日一二次僅豫以開水代乳飲乳量過少之小兒雖呈飢餓憔悴之狀但此時胃力不振不可驟豫過飽反致停積宜漸為增加其量俾得調整其胃氣嬰孩有病暫時不宜斷乳當夏令時亦不宜斷乳蓋此際消化之力薄弱豫以他種食物頗有不宜也第二節孩童時期一孩童之護持通常小兒一歲以後漸能行動並學言語是為入於孩童之時期此時小兒知識漸開導之習於善則善導之習於惡則惡浸假日久習性養成往往終其身有不能改者譬如白布一匹染黑即黑染紅即紅正聖凡之起點賢不肖之所自判也故孩童之時期務使耳沾目染盡為家庭所可矜式者切勿豫以不良之環境而誤其畢生之光榮再如身體方面亦須養成其健全之體格弗使彎腰曲背欹形偏頗此皆父母扶養應擔之義務亦國家保護兒童之責任衛生當局與醫生同宜注重者也茲將孩童之護持擇要述之如後小兒行動言語過遲者常由先天不足及營養缺乏所恐宜及早調補毋令遷延小兒腹部過凸過堅皆為不健之象宜調節其飲食並預防蟲患食積腸胃疾病之潛伏小兒宜使其有運動之興趣視其體部何者發達不足即以運動補救之運動時間過長及攜過重之物賽過急之跑劇烈運動跳高跳遠均所不宜小兒宜使其有早起早眠之習慣若未滿二歲以上者則日間宜使睡眠一次俾其精神有充分之休養小兒宜背暖腹暖頭涼手足涼然腦後風府足下湧泉亦忌睡臥當風任意招寒小兒不可使其久視久視必傷眼小兒不可使其久立久立必傷骨小兒頭部不可使其久曝陽光久曝必傷腦舉凡一切起居宜訂以合乎衛生之規則使其遵循以成習慣小兒當盛暑之時最宜與大人分睡睡熟之時切忌對之揮扇免致侵襲風寒小兒當嚴寒之時最宜為自然之暖切忌熏火免致燥火之疾小兒之立法行法坐法睡法均宜隨時指導隨時矯正夜間蒙被而臥尤為衛生之障礙宜早防微而杜漸小兒言語之習練務使其不高不低不徐不疾層次井然有條不素否則嗄音口吃囁嚅抗聲俱由此而起不可忽視也小兒之規矩禮貌最宜時令習練使養成良好之習慣俾終身由之而不自覺二孩童之飲食若要小兒安常帶三分飢與寒此雖古昔之俗諺實合衛生之至理者也略能耐寒可使兒氣血強盛腠理堅固已見前述至於略能耐飢則使腹中空虛無停積之患增抵抗之力無形中可免不少疾病其益亦匪淺鮮也況飲食合宜不但能防疾病於未然更可臻身體於強壯孩童時期之健康既常為一生幸福之起點則於飲食方面豈可忽略以成孱軀乎哉小兒二歲以上每日四餐禁絶零食十歲以上只可三餐略佐點心夜間更宜嚴格禁食則疳積等症可以永絶小兒二歲以上每餐畢後可略進水果以蘋果橘子雅梨等為宜惟多食則易損脾致瀉浸假成臌脹黃疸等疾小兒對於食物常有偏嗜之習慣最宜矯正蓋其所嗜者未必為有益之物而其所惡者未必為無益之物偏嗜之習慣養成則小兒恣食一物營養反致不良而疾病常由之以起小兒宜食之物為牛肉汁牛乳雞蛋蔬菜等魚肉獸肉亦可惟通常蔬菜常為小兒所厭棄不知隔絶蔬菜不食者最易使血分不潔身體衰弱呈蒼白之面色及瘡腫敗血齒衄等證小兒過於肥胖白嫩外貌雖令人可愛而實則非健全之體格也宜少與牛乳油類等食品而易以蔬菜素食則痰火不盛可以防免驚風等患小兒對於糖果花生豆類通常皆屬嗜好不知糖果易使胃中特別發酵漸致消化發生障礙花生不能細嚼亦易停積豆類最壅氣滯氣多食易成大腹膨脝之患均宜戒之小兒不可任其多飲茶水因其能妨礙消化停飲蓄痰且助濕也第三章兒科特徵第一節臍風一臍風之原因嬰兒生下斷臍之時必須謹慎若水濕寒氣因斷臍不慎而由臍侵入或手術不潔當時附有微生物類混入血中或斷臍之後包扎不慎以致受邪或臍帶脫落過早受傷其結果皆足以成臍風若不速為救治則邪毒走竄致命甚速然初起即力圖救治亦頗有不易保全者故俗有臍風難治之説而知接生斷臍之不可不謹慎將事也二臍風之症狀臍風將作初起時無端啼叫顯不安之狀若驗其腹部略有膨脹而臍部作腫者是矣是時眼之兩角及鼻準略有黃色吮乳不緊便更進一步矣其變象之來亦有痰涎壅盛氣高喘急者亦有身體壯熱面赤口乾者亦有曲腰而啼而青嘔吐者甚則撮口噤口手足抽搐少腹青筋一道由肚腹發生兩丫叉直透心胸臍邊青黑者多危急難治三臍風之治法臍風初起發熱多啼者治宜解散其邪熱以驅風散主之實症大便不通而壯熱者可用大黃玄明粉黑白醜之屬攻下之痰涎壅盛臍腫肢搐日夜多啼不能吮乳者宜天麻丸或定命丹朱銀丸之類斟酌用之實症有似急驚眼閉口噤啼聲不出口吐白沫者宜量與辰砂膏此為內服之方須視病情而對證用之尚有外治之方灸法最妥一方臍風危急可搗蒜安臍上以熟艾灸蒜上至口中有蒜氣方止仍以蒜汁滴鼻中一方用燈火灸之初起灸之可免危急危急灸之可以回生方為夏氏所傳夏禹鑄曰臍風初發吃乳必較前稍松或啼哭無時速抱兒於亮處看兩眼角及眉心有黃色宜急治之極易愈黃到鼻準治之仍易至人中承漿治之稍難口不撮而微有吹噓猶可治之若唇口鎖緊舌頭強直必不治矣一見眼角鼻準有黃色而唇不鎖緊者曲兒小指揉外勞宮手背之正對掌心處為外勞宮即用粗燈草蘸好麻油點火於囟門眉心人中承漿兩大指少商各穴灸一燋臍輪灸六燋臍帶未落於帶口火燃既落於臍心灸一燋臍風便止而黃即退矣病未痊愈仍照前治此火靈應無比云云編者按臍風多因舊式穩婆毫無消毒常識以致斷臍不慎所造成現在産科醫生接生較少此弊然疏忽從事者亦所難免則宜監視其斷臍庶可認真至灸法之效全在藉其暖氣以溫通殺菌故頗適於用若邪毒滋蔓則亦難圖矣附撮口噤風撮口噤風亦同於臍風之類蓋患臍風之後多見之或素有胎毒而生下感受風寒以發者亦有之撮口之狀為直啼舌強不乳噤風之狀為口噤牙關緊閉皆屬危症撮口初起用辰砂殭蠶散手足抽搐甚者用撮風散噤風初起用龍膽湯藥不能入口者宜開關散以開其牙關實者均可微利之治宜參照臍風諸方而灸治之法亦可通用附方一驅風散治小兒風熱蘇葉防風陳皮厚朴枳殼木香殭蠶鉤藤甘草各等分生薑為引水煎服二天麻丸治小兒食癇有痰及吊腸鎖肚撮口等證天麻白附子馬牙硝川靈脂全蠍焙各一錢天南星炮二錢輕粉五分巴豆霜去油二錢五分研為細末水煮稀麵糊和丸如麻子大每服一丸至十丸三定命丹通利痰熱治急驚天吊撮口全蠍七個天麻南星炮白附子各二錢五分硃砂青黛各一錢五分輕粉麝香各五分龍腦一字研為末粟米煮糊和丸如緑豆大每服一丸荊芥薄荷湯調下先研半丸吹入鼻中四朱銀丸治小兒胎風壯熱痰盛眼翻口噤硃砂水銀蒸棗研如泥各一錢白附子一錢五分全蠍天南星各一錢天漿子蘆薈牛黃各五錢鉛霜五分和水銀煅研龍腦一字麝香少許白殭蠶炒七個共研細末煉蜜為丸如梧桐子大薄荷湯送下五辰砂膏治口噤目閉啼聲不出吐乳不化辰砂三錢硼砂馬牙硝各一錢五分玄明粉二錢全蠍珍珠末各一錢麝香三分細微為末和棗肉好絹包起自然成膏六辰砂膏治慢脾風冷痰壅滯手足冷而微搐者撮口危急臍風痙掣不因實熱者可酌用黑附子一枚重一兩以上者去皮臍頂上挖一孔入辰砂末一錢仍用附子塞之炭火燒存性牛膽南星五錢白附子炮五靈脂蠍稍各二錢五分共研為末煉蜜和丸如梧桐子大每服二三錢生薑汁泡湯送下七辰砂殭蠶散治初生小兒撮口辰砂水飛五分殭蠶去絲嘴炒蛇蛻皮炒各一錢麝香另研五分研為極細末每用少許蜜調敷唇口八撮風散治撮口赤足蜈蚣炙半條鉤藤二錢半硃砂直殭蠶焙全蠍稍各一錢麝香少許共為末每服少許竹瀝湯調下九龍膽湯治小兒初生血脈盛實寒熱溫證四肢驚掣發熱吐哯臍風撮口及已能進哺中滿食不消壯熱變蒸客忤魃氣並諸驚癇龍膽草鉤藤柴胡去蘆黃芩炒桔梗去蘆炒赤芍炒茯苓去皮甘草炙各五錢蜣螂去翅足炙二枚大黃紙裹煨一分上研合為極細末用大棗去核煎食前調服一錢如有客忤及魃氣者可加人參當歸各二錢五分十開關散治口噤南星末五分冰片少許研和以中指蘸藥末揩齒二三十度其口自開第二節丹毒一丹毒之原因小兒一歲以內身發赤遊風者皮如塗丹之狀而其原多由血中熱毒之壅滯故謂之丹毒溯其遠因胎兒先天血中之伏毒總由妊母血熱流於胎中熱毒蘊於腠理此生下之後發動而宣泄即為丹毒亦謂之遊丹以其遊走甚速重者頃刻可以致命也有時發動之因為乳母好酒嗜辛喜啖炙爆或烘曬熱衣即與包裹柔嫩肌膚感受熱毒所致發於四肢者易治由四肢入腹入囊皆為難療也故嬰孩初生最宜服解毒之藥後天飲食更須令乳母食清淡之味起居方面亦小心謹慎則丹毒自無由發生即發生亦不甚為患矣二丹毒之症狀丹毒之輕者多發於臀部及四肢皮膚略有浮脹焮赤之狀或片片如紅雲愈重者色愈紫赤脹亦愈堅尤重者熱毒凝壅堅硬成塊謂之丹瘤大凡發於頭面胸背者重而能漸退以走入四肢者亦尚易治如發於四肢而倏忽走入頭面胸背者必不易治發時身如火灼煩躁脹悶者亦重古人謂入心必死蓋熱毒最忌走竄若頃刻蔓延壅塞心經心失其主必為不救也三丹毒之治法丹毒之原因既由於血中熱毒之壅滯故其治法總不外涼血解毒初起之輕者臀部或足部有紫脹之狀可以針沿足之兩旁腿之兩側微刺之擠去瘀紫之血脹必漸退較甚者初刺無血僅流黃色之汁宜再刺之使見血為度如刺後多時脹復作者則再刺一次數日之後脹即松而丹即退此種刺去惡血之法蓋即所以泄去血中之熱毒而不使壅滯也重者結塊瘀脹宜砭去惡血如在頭面等處則不可砭外治之藥用朴硝大黃青黛為末新汲水調敷或芭蕉根搗汁塗干則再塗冬月畏冷則燉稍溫塗上或用井底泥塗之亦妙無論赤白丹毒若用寒涼之品塗之不效者將伏龍肝為極細末以熟雞子黃熬油調塗之必可見效按寒涼之品既不效必非完全熱毒蓋小兒皮膚嬌嫩其接觸尿片之處因摩擦而發腫如丹者亦有之則宜用此法塗治或用密陀僧研細末調白蜜濃茶塗之亦可內服之方宜犀角解毒飲藍葉散之類附方一犀角解毒飲治小兒赤遊風發於頭面四肢皮膚赤而腫色若塗朱遊走不定者犀角牛蒡子炒荊芥穗防風連翹去心金銀花赤芍藥生甘草川黃連生地黃各等分燈芯為引水煎服或研細末煉蜜為丸名犀角解毒丸二藍葉散治小兒月內發丹毒藍葉一兩黃芩犀角屑川大黃銼微炒柴胡去蘆梔子仁各一分川升麻石膏各一分五釐甘草五釐研為粗未每服一錢清水一小盞煎至五分去滓加竹瀝五勺再煎二三沸不拘時溫服元氣怯弱者去大黃第三節口症一口症之原因初生小兒為純陽之體甚少虛症其由胎中火旺或胃中有熱者嬰孩生下多患口症蓋胎毒發動最易上攻而胃中火邪亦最易凌上也惟口症發生種類甚多治法亦因之各異茲將各證證狀治法分志如下二口症之症狀口症之最著者有雪口懸癰乳菌牙疳重齦重齶重舌木舌弄舌痄腮滯頤螳螂子等雪口又名鵝口白屑小兒患之最為普遍嬰孩初生百日中口中有白點旋拭旋生滿口纏遍內竄入喉甚至有啼哭不能乳者是也懸癰一名垂癰凡喉里上齶腫起如蘆籜盛水狀者是也乳菌者口中有肉腫起高如菌狀者是馬牙疳者牙齦處生白泡者是也又有走馬牙疳者則牙床腐爛崩潰甚速若已出牙牙齒能依次脫落此為險惡之症重齦重齶又名齦腫齶腫頰裡及上齶牙床浮腫或腫如水泡者是也重舌之狀為舌底作脹如重出一舌之狀舌根之肉壅腫疊出短小如舌者是也木舌之狀舌尖腫大塞滿口中或僵硬如木不能轉掉者是也弄舌之狀舌出掉弄如蛇也痄腮之狀小兒兩腮腫硬有核或在一邊兒面常現黃色鼻端起黑瘰令吮乳困難啼哭無度滯頤者涎自口角流出滯於頤間故名螳螂子者月內小兒多患之兩內腮腫硬口噤不乳啼聲難出其狀與痄腮大同小異惟痄腮面部之外面高腫而螳螂子則口內腫硬此口症各種證象之一斑也三口症之治法雪口多由於先天胎毒及脾胃二經之積熱故治法宜以清熱解毒為主內服宜三黃湯及梔子石膏生地之屬外治宜用甘草黃連等分煎湯以帛裹指輕輕拭去白屑取桑皮中汁塗之即愈或用枯礬硃砂各二錢半馬牙硝五錢研極細再以水攪取汁調塗舌上頤頰內亦可簡易方用鵝口中水一鍾作數次服之亦效然未悉其何所取義也懸癰由胎毒而肺胃之熱上蒸故發生於喉間治法宜以針刺破之流出毒血泄去毒氣即可自愈若一日未消來日又刺之不過三刺自能消盡若延久不刺令毒聚而皮亦難破故不可姑息從事也刺後宜用鹽湯洗拭急用如聖散或一字散摻刷之乳菌馬牙疳多因腸胃之火而發生治法宜清涼消毒內服可用三黃湯及石膏知母之屬外治宜以指摘去其頭倘有血出以帛或藥棉拭去之輕者京墨搽之即愈重者以直殭蠶三條去絲嘴炒人中白四分冰片少許研細擦患處略停片刻用藥棉花蘸苦茶洗淨再擦日三四次自愈如未愈加硼砂血竭青黛各三分兒茶分半藥珠一分為細末和入前藥每日洗擦三四次無不愈者簡易方以馬齒莧根瓦上焙少加雄黃研末擦至於走馬牙疳則其病勢凶險又迥乎不同蓋其發生之因由於胃中毒火燎原而其崩潰齒落之時每已不及救也內服宜以緑豆煎濃汁頻飲使化毒從小便而出外以人中白四分醋製銅緑杏仁各二分冰片少許為細末敷患處此症痧後餘毒不消最易發生即或得治常有唇缺腮穿之禍也參看第四章重齦重齶由胃中有熱熏蒸而作治宜先用針頭刺破流去紫血以鹽湯拭淨外敷牛黃散或一字散內服清胃散重舌木舌弄舌三者多由心脾積熱所致重者皆能殞命宜急治之重舌用竹瀝浸黃柏一宿點舌上木舌用萆麻子油蘸紙捻點火吹滅以煙燻之即消若舌下有如螻蛄或如臥蠶急於腫處砭去血以鹽醋調釜底煤或井花水調釜底煤厚敷之脫去再敷用真蒲黃頻刷舌上亦愈弄舌輕者燈芯煎湯與服重者黃連煮湯與服痄腮治法用蜒蚰一條硃砂錢許同研爛搽腫硬處勿令擦去即消或用染坊靛青花敷之亦消內服初起宜柴胡葛根湯口渴便祕者宜四順清涼飲勢將成膿者宜托裡消毒散托之滯頤之治法因於脾虛不能攝津者宜用白朮陳皮青皮炮薑各五分熟半夏丁香木香各一錢為末麵糊丸黍米大一歲每下十丸服之由於脾熱津泛者宜用白朮滑石各五分扁豆茯苓石斛各三分黃連二分葛根一分半甘草一分為末燈芯湯調下每服一錢螳螂子之治法俗尚割治手術宜清潔靈敏乃可無礙然割不得其法反致危殆宜用青黛硼砂各一錢玄明粉三錢薄荷五分冰片一分同研細擦口內兩頤一日四五次治之可愈一方用斑蝥三個蠍尾五個俱炙脆存性不可太焦致藥無力研極細麻黃一錢煎湯少許去渣入棗肉一粒收干麻黃汁打爛和斑蠍末丸如桐子大放小膏藥上貼兒印堂及左右兩頤一周時三處皆起泡毒泄即愈至於一般口症通治之法內服俱宜清涼解毒如黃連生地木通當歸石膏玄明粉甘草連翹梔子黃芩黃柏大黃丹皮赤芍之屬斟酌用之外治則兒茶薄荷冰片人中白甘草硼砂青黛馬牙硝石膏黃連黃柏犀黃麝香之屬斟酌配合為末調敷之附方一如聖散治小兒口症時時摻之鉛霜鉛合水銀製成牛黃太乙玄精石硃砂水飛曝乾各二錢五分研為極細末和勻入白龍腦五分再研勻即成二一字散治口內白腐硃砂硼砂各五分龍腦朴硝各少許研為極細末每用少許蜜調鵝翎蘸刷口內咽下無妨三三黃湯治三焦實熱煩躁便祕脈浮狐惑疹痢黃連酒煮黃芩酒炒大黃酒浸各等分每服一錢五分清水煎服或不用酒製俱生用為小兒落地常用之方或以大黃易黃柏四牛黃散療口瘡牛黃白龍腦硃砂各一分鉛霜五錢太乙玄精石一兩研為細末先於腫處以鈹針刺出血鹽湯洗淨然後摻藥五清胃散治脾胃濕熱中脘作痛唇口腫痛齒齦潰爛痛引頭腦或惡寒發熱飲冷作渴口舌生瘡或滿面發熱大痛喜寒惡熱小兒重舌馬牙吐舌流涎升麻五分生地黃酒洗當歸酒洗各四分川黃連炒丹皮各三分研為細末清水煎至一半去滓候冷細細呷之如痛未止可量加石膏若因脾胃氣虛寒涼克伐或虛熱上行口舌生瘡弄舌發熱飲食少思或嘔吐困睡大便不實流涎齦爛者則宜用五味異功散雖證狀相類而虛實判然其治法不同如此六柴胡葛根湯治傷寒及痄腮柴胡葛根石膏天花粉黃芩各二錢生甘草五分牛蒡子炒研連翹去心桔梗各一錢升麻三分清水二鍾煎至八分不拘時服七托裡消毒散治瘡瘍氣血俱虛腫不能潰潰不能斂人參生黃耆白朮炒茯苓白芍當歸酒拌川芎金銀花各一錢白芷甘草炙連翹各五分一方無川芎一方有陳皮一錢皂角針桔梗各五分此為外科內服之要方有加減應用法甚多八四順清涼飲治小兒血脈壅實臟腑蓄熱頰赤作渴五心煩熱睡臥不安四肢驚掣及腸胃不調大小便澀欲發驚癇或風熱結核頭面生瘡目赤咽痛瘡疹餘毒泄瀉不止赤芍當歸甘草炙大黃酒蒸各一錢五分銼碎加薄荷葉煎八九沸去滓不拘時服九當門子塗頂法預防螳螂子當門子硃砂共研細末用水調和塗小兒囟門即頭頂跳躍處惟須於産後五小時內塗用可防螳螂子發生第四節變蒸昔人云變者易也生五臟蒸者熱也養六腑輕則發熱似驚重則壯熱煩躁三十二日一變六十四日一蒸至五百七十六日變蒸即畢兒乃成人也其説似以為小兒自幼而長必經變蒸故有發熱似驚壯熱煩躁之象並非病象而屬於自然之現象此未可盡信者也考小兒平時保護得宜至長無病惟當出牙之時則常有自然之發熱出牙一次發熱一次牙出之後其熱自退此殆變蒸之説之由來也又人身本有抵抗疾病之能力小兒亦然往往小兒因起居不慎飲食不節感染小恙隨即發熱其後因自身抵抗之力而將疾病消滅於無形故小兒常有似病非病之象不久即霍然而愈者此殆變蒸之又一説也準此則變蒸之治法宜就以上之情狀而為相當之治療決不可漫不注意而貽小兒以後患也一出牙發熱之治法小兒第四個月至第十個月內齒牙漸次出生最初出生之二齒為下牙床之門齒繼則出生上牙床之門齒一對若上牙床門齒先出或先出一枚者皆為不良之現象其出生之遲早亦因人而異早則四五月出生遲則至十月方出亦有落地時已有牙者亦有一周歲方出牙者則百人中偶有一二也至於出牙之時最普通之徵象常為身體發熱胃口不良甚則睡眠不安時時驚惕或兼有泄瀉或兼有嘔吐此時可驗其牙床微脹或作浮腫漸露白色齒頭者即出牙證也牙齒頂穿牙床而露頭之時因生長之力較速故現發熱之狀發熱雖非病徵然引起他種之病恙則不得依法治之譬如因發熱則消化為之遲鈍胃中失其常序而嘔吐之證見矣腸中失其常序而泄瀉之證見矣皆宜酌用清涼退熱及輔助消化之劑體實者多佐以退熱消痰清火之藥體虛者多佐以健脾扶氣化積之藥雖見證治證與一般疾病之治相同然切忌過於苦寒克伐香竄之品以暗耗其生長之氣此於出牙時之所宜注意者也二感冒發熱之治法小兒無端發熱若不因於內傷者非屬感寒即屬傷風非屬受濕即屬受熱均宜按證治之發熱無汗者宜微汗之發熱有汗者宜和之熱輕者輕清解表熱重者清涼退熱因寒因風因濕因熱俱於成法之中酌為變通用其小劑蓋小兒臟腑嬌嫩不耐過劑之藥若投藥中病則體力恢復甚易輕微小恙自必退除所謂平淡有奇功於此恆最適用也第五節弱症昔人謂小兒有五軟五硬五遲等證又有雞胸龜背解顱囟陷諸名揆其原因皆由營養不足化育之力薄弱所致無論其為胎中缺乏營養生而先天不足以成此病或為生後乳食不足後天失調因循誤事以成此病病狀有不同其為積弱則一也故此等疾病統可名之曰弱症亦可名之曰軟症屬於此類者當俟其病未全成之時力加調護時進藥石則病可逐漸以退若任其遷延則鮮有不終身成為廢人者嘗考小兒軟弱之成以先天性者為較多亦較為難治譬如父母皆為積弱之體雖能幸而受胎然所生之兒必伶仃弱質數歲不行或父老母少陰陽懸殊所生之兒必細小嬌弱動輒致病或父母曾患梅毒或父母皆嗜鴉片所生之兒非患軟證即患硬證凡此之類中途之夭折最易即他日幸而長成則智力體力兩不如人徒寄於世無裨家國此世所謂低能之兒各國皆所深切注意而為預防取締之謀也編者於此敢敬告吾國人曰人之欲求生育小之為家庭嗣續大之為國家種族責任綦重則於選擇配偶之時以及種子求嗣之夕切勿苟且以造成低能之兒實為至要即不幸而成矣則宜為之多方醫治以使其儕於常人如是方無負於家無負於國無負一己無負小兒若惟欲念之是圖一任低能兒種之增加於國於家皆為罪人寧僅一身受害而已哉茲將各種弱證逐一述其證治如下深望國人側重其病源而加以注意俾於種族上謀偉大之補救則幸甚一五軟五軟者頭軟項軟四肢軟肌肉軟口軟是也小兒身體嬌嫩過硬本所不宜略軟應非所忌惟軟而至過於其度或當逐漸發育之時而仍綿軟無力者是則病象顯然矣頭軟者頭骨不固囟門虛大項軟者頸項無力東倒西歪四肢軟者手臂無力足難行立肌肉軟者皮肉寬軟如絮如綿口軟者口齒俱柔唇薄無力之五證者雖病狀不同而其源則初無大異也蓋非屬骨胳痿軟即肌肉柔弱氣血不充不足以資長養也先天性者由於稟賦之不足後天性者屬於乳期之失養茲將其治法述下二五軟之治法頭軟項軟四肢軟之類多屬於骨胳不強治宜補其骨髓俾之堅壯可用鹿角牛骨髓骨碎補牛膝等加以補氣養血之劑肌肉軟口軟之類多屬於筋肉不強治宜健脾扶胃俾其充實可用白朮山藥人參巴戟等加以補氣養血之劑通治之方有六味地黃丸加鹿茸五味及扶元丸等三五硬五硬又名五鞕小兒仰頭哽氣手足心堅口緊肉硬也夫小兒身體本屬柔軟今硬過其度是病象顯然矣仰頭者項頸硬直也哽氣者氣壅作痛也手足心堅者四肢僵木也口緊者環口拘急也肉硬者皮肉乾硬也之五證者雖病狀不同而其源則亦初無大異蓋非屬骨胳中缺少柔嫩之質即為皮肉不能吸收營養也先天性者亦由於稟賦之不足後天性者亦屬於乳期之失養常按之生理學所載凡人之骨胳為礦物質及動物質二者所組成礦物質主骨胳之堅動物質主骨胳之柔堅柔相濟骨之發達乃不至偏欹其有過軟者則礦物質之過少也其有過堅者則動物質之過少也總由營養不良故成此偏欹之狀浸假久之軟者益軟硬者益硬即無法以挽此沉疴矣茲將其治法述下四五硬之治法五硬之證既屬於骨胳過堅筋肉失榮所致故證之初起為津耗陰傷漸成獨陽無陰之候陽無陰則失所依附再至陰陽俱傷元氣不續則為不治當初起時宜急進養血補陰之劑使其血足氣旺陰陽無偏勝之患硬症自漸歸消失及其既成之後則宜宣通行氣為導庶幾使氣血得灌溉於骨胳皮肌再加補虛扶弱之品硬症亦可由重而輕由輕而痊也惟此際飲食起居之調護最宜遵循醫者之諄囑必須合乎攝生之法乃能漸奏功效通治之方有六味地黃丸及加味六君子湯腹筋青急者宜六味丸加麥冬五味風邪內襲者宜小續命湯去附子五五遲五遲者小兒立遲行遲發遲齒遲語遲是也小兒達適當之時期均應逐步發育而無所遲滯有一於此即為身體方面有所虧損立遲行遲者腰膝無力骨胳空虛齒遲者骨氣不充皆屬腎氣過弱先天不足所致由於後天者則乳食不良如乳母有宿疾及年老或過少亦有以致之發遲者血分不充不能上華語遲者氣血衰弱舌本無力凡此徵象雖無五軟五硬之甚然足以喪失健康危及將來則一也茲將其治法述下六五遲之治法立遲行遲齒遲之證其病根由於腎氣不足骨髓不充有類於軟故治法宜加味地黃丸以補腎養血身體過弱者可用八味丸發遲者宜養血用苣勝丹語遲者氣血不足心肺俱怯用菖蒲丸總之五遲之證俱屬於虧弱之類用藥切勿伐其生生之氣當可免釀大患也七雞胸雞胸者胸骨彎出胸前高脹形如雞胸故名龜背者脊柱彎折背部突出其形高尖形如龜甲故名此二證者雖可保其生命然終身不治考其病源約有三端一為生前稟賦不足骨質柔弱生後調護失宜積漸以成一為大病之後本元驟虧起居不慎亦能致此一為跌撲受傷坐立過早漫不注意亦能致此而雞胸與龜背二者常相併而起龜背漸高雞胸常被纍而成雞胸方作龜背常被纍而成亦有雞胸而不龜背龜背而不雞胸者則猶此中之幸也原其所以相纍成病實以小兒胸骨脊柱兩俱柔弱此傾則彼折彼折則此傾幸而得免固弱中之強而治之亦較早者也夫胸前之骨與背後之脊因人身之俯仰靈捷不能生成過堅之骨以阻礙之因是胸骨雖支持身前之重而硬中帶軟在小兒尤易彎曲脊柱雖支身後之重而每節連串疊置在小兒尤易脫榫此小兒之所以易成雞胸龜背亦固其宜惟是證一成最難復原乃早提防庶乎可免茲將其治法述下八雞胸之治法雞胸之為病在胸骨及肋骨之失其常形病因種於先天之衰弱者為多法宜先用正骨夾板夾持之阻其外突之勢再服補益之劑以培其本其由於後天者則痰濕停飲積聚心胸復感風熱肺熱脹滿因而胸骨高起宜用五苓散合寬氣飲入薑汁蔥湯調服次用清肺飲雄黃散碧玉丸如意膏之屬或乳母過食膏粱厚味五辛之品以致胸中漸高者宜以清胃散母子並服其他有龜胸丸聖惠大黃丸百合膏之類均可斟酌施用然必須視其病之由於本者或由於標者如因熱脹標急者則宜先治其標如標去而胸仍高者宜治其本此不可不慎重將事者也九龜背龜背以其狀名其病也其原因已見前述在小兒多患之則以小兒髇骨未堅強令獨坐或由風寒之侵襲或由大病之未復均易委頓而成此病若在成人則骨質堅韌罕有此病矣百日以內生者不治背已折者亦不治世稱雞胸龜背無法可施蓋有由也茲將其治法述下十龜背之治法龜背初起法宜先用正骨夾板夾持之先阻其外突之勢然後再用藥調治由於虛者宜服補益之劑由於熱者宜服清熱之劑外治有灸法灸肺腧心腧膈腧三穴各三五壯艾炷如小麥大有摩法取龜尿點骨節間摩之使其內透雞胸亦可通用通治方有松蕊丹可斟酌用之十一解顱小兒囟門開大頭縫不合如開解之狀謂之解顱此證屬於稟賦薄弱氣血不足腦髓虧少所致患此者必難養育即能長大亦往往成為廢人蓋人無腦髓如草木之無根雖有良方亦難奏效惟神氣充足能飲能食投補藥即應者可治茲將其治法述下十二解顱之治法解顱因父體怯弱稟賦不足者宜服錢氏地黃丸加鹿茸因乳母氣血俱虛者宜四君子湯或四物湯有熱者加黃連甘草通治宜調元散張渙玉乳丹狗腦丸之屬外治宜天南星散王氏封囟散三辛散之屬或以帛束顱用白蘞末敷之或防風一兩五錢柏子仁白芨各一兩為末乳和敷囟上十三囟陷小兒囟門微陷本不足為病其有囟門過期猶未長足大概小兒漸長則囟門漸縮至一歲半而全合或竟低陷不平者則屬於虛弱之證或因先天不足血氣虛弱不能上充腦髓或由泄利慢驚病後氣虛以致囟門陷下病原雖有不同其總因實由於虛則一也早為調治自易復原若因循坐誤亦可漸成不治之證茲將其治法述下十四囟陷之治法囟陷一證治宜培本養元使其氣足血旺外治宜用烏附膏貼之或狗頭骨炙令黃搗篩細末雞子清調塗內服宜金液丹固真湯聖惠生乾地黃丸之屬至於囟門突起則有實有虛實者因胎熱或外感受邪虛者因乳哺不節寒熱不勻贓腑不調氣虛浮腫各宜因證治之附方一六味地黃丸治腎精不足虛火上炎面生雀斑頭目眩暈咽喉燥痛口舌瘡裂耳聾齒搖腰膝痿軟骨熱痠痛足跟痛小便淋祕或不禁遺精夢泄水泛為痰自汗盜汗亡血消渴尺脈虛大婦人經事不調小兒虛損腎疳腦熱瘡毒熟地砂仁酒拌九蒸九曬杵膏八兩山萸肉酒潤炒乾山藥炒各四兩丹皮酒洗微炒白茯苓人乳汁制焙澤瀉淡鹽酒拌炒各三兩研為細末和地黃膏加煉蜜為丸如梧子大作湯服即六味地黃湯二扶元丸治小兒先天不足後天羸弱人參白朮土炒茯苓熟地茯神黃耆蜜炙山藥炒炙甘草當歸白芍川芎石菖蒲各等分薑棗水煎服三加味六君子湯治傷寒病後脾胃虛弱腸滑泄瀉發熱微痛小兒脾疳泄瀉人參白朮茯苓黃耆山藥甘草縮砂仁各一兩厚朴肉豆蔻麵裹煨各七錢五分研細末每服二錢不拘時飯湯調下痰多者加陳皮半夏四六味丸六味地黃丸之簡稱五小續命湯治中風不省人事喎斜癱瘓麻木眩暈涎鳴反張暗啞厥冷及風痹腳氣外顯六經形證者麻黃去根節泡桂枝甘草炙杏仁去皮尖研白芍酒洗川芎防風人參黃芩各一錢四分防己二錢大附子炮去皮臍七分除附子杏仁外搗為粗末後入二味和勻分作二劑加薑棗清水煎服如無汗惡寒倍麻黃杏仁有汗惡風倍桂枝白芍無汗身熱不惡寒去附子倍甘草加知母石膏有汗身熱不惡風倍桂枝黃芩加葛根無汗身涼脈沉而細倍附子加乾薑有汗無熱畏寒脈沉倍桂枝附子甘草肢節攣痛麻木不仁脈緩加羌活連翹尚有其他種種加減應用之法不備録六加味地黃丸治腎水枯竭虛火上炎咳嗽煩渴食減形悴小便頻數白濁陰痿或黑夜晴明口瘡齦爛喉痛或吐瀉日久津液虧耗口乾作渴或五臟俱損寢汗發熱或痰氣上湧手足厥冷腿腫腳瘦癰疽等證常服除渴疾壯氣血熟地八兩山藥四兩山萸肉五兩白茯苓牡丹皮各四兩澤瀉三兩肉桂六兩五味子三兩一方加炙鹿茸二兩研為細末入熟地膏煉蜜或米糊和丸如梧桐子大七八味丸治命門火衰腎虛火炎小便祕澀流注鶴膝口舌生瘡或耳聵虛鳴腳氣入腹等證熟地八兩乾山藥山萸肉各四兩白茯苓牡丹皮澤瀉各三兩肉桂附子各一兩研為細末煉蜜和丸如梧桐子大若乳母命火衰兒飲其乳致病者子母同服一方無肉桂加五味子若虛寒過甚宜去丹皮澤瀉加杜仲牛膝五味鹿茸之屬八苣勝丹治發不生苣勝一合當歸洗焙乾生乾地黃芍藥各一兩胡粉鉛粉五錢先以苣勝胡粉研細次入諸藥搗籮為細末令勻煉蜜和丸如黍米大每服十丸煎黑豆湯送下九菖蒲丸治小兒心氣不足不能言語石菖蒲三錢人參五錢丹參二錢天門冬麥門冬各一兩赤石脂三錢一方無赤石脂有赤苓遠志甘草十菖蒲丹治小兒數歲不能語菖蒲九節者一寸遠志去心桂心各一兩酸棗仁人參黃連各五錢研為細末煉蜜和丸如芡實大十一五苓散治水分有熱小便不利煩渴或水飲內停臍下悸茯苓豬苓白朮土炒澤瀉肉桂十二寬氣飲消痰逐水進食通利關節除胸膈痞結治蓄氣而成搐傳變急慢驚風氣逆不和精神昏倦枳殼枳實人參甘草驚風發搐薑汁蔥湯同調服十三清肺飲補肺氣養脾胃定心氣治仲夏暑邪白芍五分人參升麻柴胡甘草各四分天門冬麥門冬各三分陳皮三分半黃芩黃柏各二分十四雄黃散外用治癰疽發背紫暈疼痛不止雄黃黃丹乳香沒藥各五錢粟米小粉三兩草烏頭天南星絡石百合各一兩白芨二兩研為細末溫水調敷又方雄黃黃柏檳榔川大黃麒麟竭各七錢五分麝香一錢川連一兩白芷木香川芎桂心各五錢當歸三錢研為細末臘豬脂調令勻塗於絹上治癰疽赤腫疼痛未得膿潰貼腫處候膿潰後用膏藥搜膿生肌十五碧玉丸治痰嗽氣喘胸滿飲食減少睡不得寧煩躁有熱青黛生明礬生南星滑石各二錢五分輕粉五十貼全蠍十五尾去尖毒巴豆四十九粒研為細末薑汁煮糯米粉為丸十六如意膏治痰喘半夏炮製天南星炮製各一兩五錢研為末生薑汁和勻炙乾再和薑汁候乾煉蜜為丸如芡實大每服一丸至二丸十七龜胸丸治龜胸高起川大黃酒煨麻黃去節百合桑皮薑汁炒木通枳殼甜葶藶微炒杏仁炒黑芒硝各等分研為細末以杏仁芒硝同研如脂煉蜜和丸如芡實大每服一丸蔥白湯化下十八聖惠大黃丸治龜胸肺熱壅滯心膈滿悶大黃七錢五分天門冬焙百合苦杏仁麩炒木通桑白皮甜葶藶隔紙炙紫朴硝各五錢研為細末煉蜜和丸如緑豆大每服五丸十丸百合膏潤腸去積百合一兩朴硝杏仁湯浸去皮尖桑白皮根木通川大黃天門冬去心各五錢研為極細末煉蜜和丸如黍米大每服十丸米飲送下二十水龜溺即龜尿治耳聾滴入口啞中風舌喑點舌下龜胸龜背摩患處亦治小兒驚風口閉此物走竅透骨故為治喑聾之品取尿法用三腳竹架頂起龜腹令足無著不得爬動置大盆中以受其尿若尿不出以麝香或冰片細末滲其鼻自下二十一松蕊丹治龜背松花洗焙乾枳殼麩炒獨活防風各一兩川大黃炮前胡麻黃去根節桂心各五錢研為細末煉蜜和丸如黍米大每服十丸粥飲送下二十二四君子湯治嘔吐泄瀉氣短面白聲微肢困食少不化口舌生瘡吐血便血以及胎前産後諸病凡屬於脾胃虛弱細軟脈象者皆可治人參白朮茯苓甘草二十三四物湯治一切失血體弱或血虛發熱肝邪升旺或癰疽潰後晡熱作渴及婦人月經不調臍腹㽱痛腰中疼痛或崩中漏下或胎前腹痛下血産後血塊不散惡露不止凡屬於血液虧少之病皆可治熟地血熱換生地當歸白芍川芎二十四調元散治小兒先天不足顱解肌瘦腹大神昏及五遲等證乾山藥五錢人參白茯苓茯神白朮白芍藥熟地黃酒洗當歸酒洗黃耆蜜水炙各二錢五分川芎甘草炙各三錢石菖蒲二錢研為末每服二錢加薑二片棗一枚水煎服二十五玉乳丹治嬰兒頭縫開解鍾乳粉依古法制煉者柏子仁干熟地黃依法蒸焙者當歸洗焙乾各五錢防風補骨脂炒各一分共為細末煉蜜和丸如黍米大每服十丸乳食前茴香煎湯送下二十六狗腦丸治小兒喜搖頭解顱狗腦一個五加皮甘草炙白朮防風鐘乳石乾地黃各一分牛黃二分以狗腦為丸如小豆大每服二丸米飲送下二十七天南星散外用治産後吹奶小兒重齶重齦囟開鼻塞天南星大者微泡去皮研為細末溫湯調以鵝翎蘸塗患處小兒米醋調塗緋帛上貼囟上炙手頻尉之立效二十八王氏封囟散外用治囟腦開張咳嗽鼻塞柏子仁防風天南星各四兩研為細末每用一錢豬膽汁調勻稀稠得所攤在緋絹帛上看囟子大小剪貼一日一換不得令乾時時以湯潤動二十丸三辛散外用治小兒解顱細辛桂心各五錢乾薑七錢五分研為末薑汁和敷貼顱上面赤即愈三十烏附膏外用治囟門陷生川烏生附子各五錢雄黃二錢研為末用生蔥和根葉細切爛杵入前藥末同煎作成膏貼陷處三十一金液丹治陰極發躁厥冷脈伏爪甲唇青自汗吐利小便不禁或陰結畏寒二便不通及小兒脾胃虛寒吐利肢厥神昏多睡露睛口鼻氣冷將成慢驚舶上硫黃五兩研細水飛入沙罐內鐵盞蓋定鐵線纏口鐵釘旋緊水調赤石脂封口鹽泥固濟候乾埋地坑以三足釘釘於地將罐置釘上另用一盞盛水置罐上再用鹽泥固濟慢火燒養七日夜再加頂火用炭十斤為度候冷取出用柳木槌於乳鉢中研細每末一兩用蒸餅小麥面加酵糟蒸成之物品一兩打糊為丸如梧桐子大每服二三十丸空腹時熟湯或薑湯或米飲送下三十二固真湯治吐瀉痢後胃虛脾慢四肢口鼻氣冷沉困不省人事人參附子茯苓白朮各二錢五分黃耆蜜炙山藥肉桂甘草濕紙裹煨透各二錢每服二三錢清水加薑棗煎服三十三生乾地黃丸治小兒十歲不行生地黃當歸焙防風酸棗仁微炒赤苓黃耆川芎羚羊角羌活甘草炙微赤桂心各等分搗爛和蜜為丸如緑豆大每服十丸食前溫酒送下量兒大小加減第六節疳證小兒腸胃受傷變生諸證以疳證為最劇亦最為復雜難治推其起因實由初生調護無方其後飲食失節所致一由小兒一面吃乳一面恣食肥甘積鬱既久熱傷腸胃一由小兒食不運化積久生蟲蟲既內生雖能食而不肥一由小兒數歲猶戀乳食生養不足脾胃之氣暗耗一由小兒吐瀉之後妄施攻伐之藥津液枯竭腸胃疲憊一由乳母喜怒失常飲食乖度或交合之後以乳哺兒均足致此疳證之初起常現身體發熱面黃肌瘦之象及時治之十愈八九其已成者多見頭皮光急毛髮焦稀腮縮鼻乾口饞唇白兩眼昏爛揉鼻撏眉脊聳體黃鬥牙咬甲焦渴自汗尿濁瀉酸腹脹腸鳴癖結潮熱酷嗜瓜果鹹酸炭米泥土等物諸般證狀此時按證施治亦可十愈六七若因循坐誤或治失其法則生生之氣日薄未有不由重而危由危而不救者或日在大人為癆在小兒為疳疳者干也明為精血敗竭之病故疳之一證其造因雖為腸胃受傷而其流所及變化無窮若病至腳指觸物不知痛手足垂軃無力身無暖氣瀉青涎或沫不止項筋舒展無力者均屬不治茲將疳之類別如五疳疳積雜疳各證條列於後一五疳疳證名目繁多而治法總不離乎脾胃曰五疳者有心疳脾疳肝疳肺疳腎疳等症其病狀雖間有出入而其源初無大異也心疳者多見身體壯熱面赤唇紅口舌生瘡胸膈煩悶口渴飲冷喜眠於地下痢膿血時有盜汗齧齒虛驚等狀脾疳者多見面色痿黃頭大項小喘促氣粗多啼咳逆困倦喜睡乳食懶進目生白膜唇赤發焦口鼻常干胸膈壅滿喜暗憎明晝涼夜熱口渴引飲腹脹腳弱吐逆乏力水穀不消泄下酸臭喜食泥土合面覆臥等狀肝疳者多見搖頭揉目流汗遍身合面而臥面色青黃發竦頭焦筋青腦熱周身瘡癬腹中積聚膈上伏熱痰涎壅塞下利頻仍或下鮮血或下青苔若肝風入目則赤腫翳生眵淚爛眶昏暗雀盲痛癢揉擦等狀肺疳者多見咳嗽氣逆皮毛乾焦多涕時啼咽喉不利壯熱憎寒唇邊赤癢腹內氣脹乳食漸稀口有腥氣面色㿠白手足枯細皮膚起粟腸胃不和頻頻泄利鼻下生瘡等症腎疳者多見肌骨消瘦齒齦生瘡寒熱時作口鼻乾燥腦熱如火腳冷如冰遍身瘡疥喜臥冷地乳食減少瀉利頻仍肛門潰爛或生濕瘡牙縫潰爛傳為走馬疳等狀茲將其治法述下二五疳之治法疳證之治法初起宜健脾消積清熱殺蟲及其已成體實者宜正本清源先用攻下殺蟲之劑後用培本養元之法體虛者宜攻補兼施慎用峻利之藥此中消息則寒熱之辨別以及虛多實少實多虛少之分尤宜詳察大概健運以扶持脾胃之劑宜用白朮雞內金豆蔻木香砂仁之類消積之劑宜用莪朮三稜檳榔厚朴麥芽神麯之類清熱之劑宜用川黃連胡黃連淡芩青皮柴胡之類殺蟲之劑宜使君子蕪荑川楝子蘆薈之類補益之劑宜人參潞黨山藥扁豆蓮心生地熟地萸肉當歸阿膠之類通治之方有集聖丸加減五疳保童丸五疳消積丸萬應丸之屬至於心脾肝肺腎五疳各因腸胃受傷脾運不健而致五臟交受其病兼病於心者即謂之心疳治宜安神丸以治心異功散以補脾余如張渙參黃丹及真珠散茯苓丸茯神湯桃花丸均可酌用大凡心經有實熱之見象者宜酌加黃連犀角羚羊牛黃天竺黃之類心經有虛熱之見象者宜加茯神遠志棗仁玄參人參之類心疳而至驚啼口渴嗜食辛味耳邊有脈舌下有黑靨者不治兼病於脾者謂之脾疳治宜四味肥兒丸以治疳五味異功散以養脾余如錢氏益黃散參苓白朮散神效換肌丸大胡黃連丸蘆薈丸張渙木香散均可酌用大凡脾經有熱者宜加黃連地黃三稜莪朮之類脾經有濕者宜加半夏白朮陳皮苡米甘遂商陸之類脾氣虛寒者宜加於朮補骨脂乾薑肉豆蔻肉桂之類脾疳而至腹大如鼓唇無血色人中平滿下痢無度者不治兼病於肝者謂之肝疳治宜地黃丸耆歸湯天麻丸生熟地黃湯熊膽天麻丹蘆薈丸均可酌用大凡肝經有實熱之見象者宜加龍膽草菊花柴胡連翹梔子青皮白芍之類肝經有虛熱之見象者宜加川芎天麻熟地牡蠣龍骨萸肉五味之類肝疳而至目有青脈左脅硬痛多吐涎沫眼角左右有黑氣者不治兼病於肺者謂之肺疳治宜先用地黃清肺飲以治肺次用益氣丸以補肺余如益黃散化𧈟丸補肺散張渙麝香丹阿膠散胡黃連丸之類均可酌用大凡肺經有熱者宜加桑皮桔梗前胡鮮生地竹茹竹瀝麻黃杏仁之類肺氣虛寒者宜加人參黃耆黨參麥冬山藥熟地之類肺疳而至頻瀉白沫身有黑斑如粟米大者不治兼病於腎者謂之腎疳治宜錢氏地黃丸或生脈散多加黃耆以調肺余如調元散九味地黃丸張渙熊膽散之類均可酌用大凡腎經有熱者宜加車前茯苓澤瀉通草豬苓木通黃柏之類腎氣虛寒者宜加附子熟地山萸肉胡盧巴巴戟黃耆之類腎疳而至嗜食酸鹹飲水無度小便如乳牙齒青黑耳腦幹燥肩聳骨枯者不治此五疳證治之一斑也三疳積疳積者因疳而成積也夫疳證之遠源起於腸胃之受傷腸胃既傷食不易化於是乎成積至易動輒成積疳證非但有難愈之望抑且有加重之勢是故疳積一證為患亦深輕治之則積不能行重攻之則每致泄瀉或變化為疳痢或變化為疳脹身體益瘦脾胃益疲亦可積漸以成不治故非可忽視也疳積之證狀面色青黃身瘦脘脹發立身熱腹中微痛疳痢則瀉痢赤白或青色如凍日久不愈腹痛或脹疳脹則身體日瘦腹大不行發豎發熱氣短而急之數證者虛中有實實中有虛稍不中病即無益而反增其害茲將其治法述下四疳積之治法疳積成於運化不良故治法宜化積行滯而不傷其正積重者雖宜峻攻然宜佐以保脾胃之藥造積滯既下仍宜常服健脾扶胃之藥俾食不再停積不再聚方可有效否則徒事攻伐則旋行旋積固無濟於事也通治方宜先用勻氣散或醒脾散調補後用青金丹取下疳積並宜常服保童丸醒脾散或疳積散之屬疳痢由積聚腐化腸中受病益深而致治宜先以殺蟲行滯次則保養脾胃滯未全行礙難兜塞通治方有青黛散殺疳丸肉豆蔻丸蕪荑丸白龍骨丸等痢行無度者簡易方用樗根白皮倉粳米蔥白甘草豆豉煮服極妥腹痛不已者宜白朮散或胡黃連丸祕方有用龍眼肉一枚包入苦參子七粒日日吞之治疳痢有效再以保脾胃之品加而用之尤為妥善疳脹由積滯既久濁氣凝聚因而成脹治宜行氣化滯溫中去積通治方有肥兒丸六神丸褐丸五疳保童丸肥氣丸分氣飲等但方藥中有攻伐過峻者宜慎用之或一用即止初起以胡黃連二錢阿魏一兩神麯黃連各二錢麝香一錢為末每服少許白朮湯送下亦妥五諸疳小兒疳證之重要者為五疳疳積然有因疳病之後發為其他合併之病者以病狀之互異或部位之不同遂有種種之名稱至論其治法固與五疳等無大差別也合而並之固屬一類惟進一層言之昔人既為之特立一名則於治法方面亦屬不厭求詳之意立意既屬可取方亦未可偏廢爰特摘録蛔疳脊疳乾疳內疳口齒疳鼻疳眼疳腦疳無辜疳丁奚疳哺露疳癖病等諸疳逐條述之以便治疳者得為鄭重之考查一蛔疳因小兒飯食太早或多食甜膩停蓄腸胃以致腹中化生蛔蟲證狀多見皺眉多啼嘔吐清沫腹中作痛外見青筋齒癢鼻癢唇口紫黑二脊疳因蟲食脊膂所致證狀多見身熱羸黃擊背如鼓鳴脊骨如鋸齒或十指皆瘡頻齧爪甲煩渴下痢三乾疳因胃火過亢消爍津液所致證狀多見身體壯熱時或憎寒舌澀口乾睡多盜汗皮膚枯燥發立毛焦乳食雖多肌肉消瘦四肢無力好睡昏昏大抵憔悴少血舌乾多啼者其病在心目不轉睛雖啼無淚者其病在肝身熱尿干手足清冷者其病在腎聲焦皮燥大便乾結者其病在肺閉口酣睡胸脘乾渴者其病在脾四內疳因蟲蝕肛腸所致疳之在內者所以別於疳之在外者外疳如走馬疳口齒疳鼻疳眼疳等證狀多見眼目澀癢體熱皮枯腸胃不調乳食不化心腹虛脹痢下五色久而不止日漸羸瘦五口齒疳即走馬牙疳之輕者走馬牙疳見本章第三節及第四章第三節因脾胃傳化失常熱毒蘊蓄血分不清所致證狀多見唇口癢痛牙齒焦黑齦肉赤爛頰腫舌痛口多臭氣六鼻疳固乳食不調上焦壅滯疳蟲上蝕所致證狀多見鼻中赤癢連唇生瘡壯熱多啼皮毛乾焦肌膚消瘦咳嗽上氣下痢不已七眼疳因臟腑風熱壅滯不得宣通或乳食過多胸膈痰結邪熱上攻於目所致證狀多見腦熱目癢或赤爛生瘡或生翳膜漸漸遮睛八腦疳因胎中稟受風熱所致證狀多見頭皮光急滿頭生瘡腦熱如火髮結如穗遍身多汗腮腫囟高哺乳越常睡喜合面九無辜疳因小兒衣席夜露不收沾染邪氣或因飲食不節寒暖不勻所致證狀多見腦後有核如彈丸按之則動初生時軟而不痛中有蟲如米粉得熱氣則漸長大蟲隨氣血流散子母相生侵蝕臟腑令兒肌肉作瘡便泄膿血頭大發豎手足細弱十丁奚疳因脾胃受傷不能運化血衰氣滯所致證狀多見腫脹而腹無青筋面色慘淡潮熱往來手足細小項長骨露尻臀無肉腹脹臍突十一哺露疳因臟氣虛冷所致證狀多與丁奚疳相似食則吐逆泄瀉無度糞中有蟲十二癖病因飲食失節傷及脾胃積滯不化久而成癖其形堅結藏於隱癖證狀多見生於脅下堅硬成塊初作之時午後潮熱口渴飲冷腹大筋青漸如雞卵不時作痛此諸疳之證狀也此外因疳而發為瘡疥者謂之疳瘡亦同類而附入之茲將其治法述下六諸疳之治法一蛔疳因積滯化蟲治宜使君子散蘆薈丸以取蛔蟲後用益黃散之屬以調脾胃余如張渙三根散下蟲丸之屬均可酌用二脊疳因蟲食脊膂治宜聖惠金蟾散地骨皮丸殺疳丸蘆薈丸青黛丸之屬瀉血不止者用定粉少許大棗十枚頭髮少許共聚一處火煅通赤細研每服五分米飲下三乾疳因水津虧耗熱自內生治宜聖惠天竺黃散青黛丸牛黃丸胡黃連丸之屬四內疳因蟲蝕肛腸治宜使君子丸以殺蟲余如東垣厚腸丸聖惠木香丸蘆薈丸胡粉丸之屬俱可酌用或神麯麥芽三稜青皮香附山楂厚朴甘草藿香枳實地黃砂仁黃連棗子各等分研為末熟湯調服五口齒疳因熱毒蘊蓄血分不清治宜清血解毒內服用清胃散甘露飲等外敷用青霞散黃礬散之屬或百藥煎胭脂各等分為細末摻之或用米泔水洗瘡以黃丹飛過乳香白礬飛過胭脂各一錢輕粉麝香各少許共為細末挹乾摻之六鼻疳因疳熱熏蒸鼻癢生瘡治宜湯氏五福化毒丹澤瀉散枇杷葉散之屬外用甘草白礬湯洗淨後以蘆薈黃連黃柏為末敷之或青金散敷之或蟬殼散吹之或青黛一錢麝香少許熊膽末五分臨睡時摻之七眼疳因疳熱熏蒸上攻於目治宜瀉肝散殺疳散退翳丸羚羊角丸消疳無價散外用蕤仁膏之屬八腦疳因疳熱熏蒸上侵及腦治宜龍腦丸龍膽丸之屬或用吹鼻龍腦散或用黃葵花菊花釜下墨硝石柏葉各等分共為散吹入鼻中良久鼻中有惡物似泥者泄下數條此即病根下後可愈九無辜疳因熱生蟲頸項生瘡治宜柴胡飲先清其熱蘆薈肥兒丸再消其積或聖惠鱉甲散張渙蠍虎丹藍葉湯漏蘆散之屬頸項有核內有蟲如米粉者宜破取之再以蘆薈黃連黃柏粉末敷患處十丁奚疳因脾胃氣虛大腹膨脹治宜先投萬應丸次投參苓白朮散並以醍醐散進食食後下烏犀丸三五粒以殺蟲化積並間投醒脾散沉香檳榔丸木香莪朮丸之屬次第調理之十一哺露疳因臟氣虛冷治法與丁奚疳大略相似惟宜加養臟湯服之余如麝香進食丸聖惠人參丸等俱可酌用十二癖病因積滯不化久而成癖治宜千金消癖丸木香硇砂丸外用紅花膏或阿魏保生膏攤貼此外有因疳而成之瘡疥謂之疳瘡不甚痛癢常有汁出汁所流處旋即成瘡宜分其經絡治之如面青寒熱或白翳遮睛者屬肝經面赤身熱作渴驚悸者屬心經面黃體瘦作渴泄瀉者屬脾經面白咳嗽鼻間生瘡者屬肺經面黧體瘦喜臥濕地者屬腎經內服之劑宜因其寒熱虛實分別進之外治方有蘭香散白粉散熊膽膏之屬此諸疳治法之一斑可與五疳之治法相參看者也附方一集聖丸治冷熱新久一切疳症以此為主其有五臟兼證照後開加減此方不熱不寒補不至滯消不致耗頗屬穩妥蘆薈酒蒸五靈脂洗淨泥砂微炒夜明砂炒廣皮酒炒青皮醋炒蓬莪朮煨使君子肉煨木香川芎當歸砂仁酒炒各二錢潞黨參川連薑汁炒乾蟾蜍酥炙各三錢上為細末公豬膽二枚取汁和藥粟米糊丸龍眼大米飲化服咬牙舒舌舌上生瘡愛飲冷水唇紅面白喜伏地臥此心疳也本方去蓬莪朮砂仁青皮廣皮川芎木香六味加生地茯苓膽星各二錢辰砂甘草各一錢面青目生白膜泄瀉夾水或青色此肝疳也本方去蓬莪朮砂仁廣皮木香加膽星甘草梔子仁防風天麻蟬蛻各二錢青黛錢半食泥土冷物面身俱黃發稀作穗頭大項小腹脹腳弱泄瀉肌瘦晝涼夜熱不思飲食此脾疳也專用本方鼻下赤爛手足枯細口中腥臭右腮㿠白喘嗽此肺疳也本方去蓬莪朮砂仁青皮川芎木香加桑皮桔梗蘇葉阿膠炙甘草各二錢耳內外生瘡腳如鶴膝頭縫不合或齒鼻爛變成牙疳此腎疳也本方去蓬莪朮砂仁青皮廣皮木香五靈脂加熟地茯苓山藥萸肉各二錢久瀉不止胃虛成疳本方去蘆薈五靈脂加茯苓冬瓜肉果訶子各二錢黨參倍用久痢不止脾虛成疳本方去蓬莪朮蘆薈青皮五靈脂加訶子蓮肉各三錢久瘧不止脾虛成疳本方去蘆薈五靈脂加黃耆鱉甲柴胡製半夏神麯各三錢黨參倍用食積成疳形瘦腹緊潮熱見生人則哭本方去蘆薈五靈脂加黃耆茯苓冬朮製厚朴製半夏枳實神麯麥芽三稜鱉甲各二錢腦疳本方去蓬莪朮砂仁青皮廣皮加羌活防風膽星甘草升麻各二錢脊疳蛔疳本方去蓬莪朮砂仁青皮廣皮當歸川芎加苦楝皮貫衆蕪荑檳榔各二錢丁奚疳哺露疳專用本方無辜疳本方去蓬莪朮砂仁五靈脂加黃耆鱉甲檳榔各二錢二使君子肉健胃殺蟲預防諸疳使君子肉一半炒一半生每當夏季伏日令小兒服使君子肉一歲一生一熟至七歲則服七生七熟每年三伏共服三次則小兒無疳積之患且使君子健脾殺蟲性質和平無病有病均可服用洵妥法也惟食後忌飲熱湯否則或厄逆或作瀉然亦無大害三五疳保童丸治小兒乳食無節生疳青黛苦楝根皮夜明砂布裹洗五倍子蘆薈黃連龍膽草白蕪荑仁乾蟾酥炙去皮各一分麝香少許蟬蛻去嘴爪土豬膽五個拌諸藥焙研為末水煮粟米糊和丸如麻子大一歲兒每服三丸不拘時米飲送下每日三次忌食豬肉四五疳消積丸治小兒五疳十積面黃肌瘦牙疳口臭青筋腹大川黃連蕪荑龍膽草各三錢焦麥芽山楂肉廣陳皮神麯炒焦各一兩共研細末水泛為丸每服二三錢熟湯送下五萬應丸治腹內有蟲及食積氣塊痛小兒疳病檳榔一兩三稜醋炒蓬莪朮醋炒陳皮麩炒黃色橘紅雷丸乾漆炒煙盡使君子肉麥糵面炒神麯炒黃色各五錢蕪荑二錢五分高良薑陳壁土炒縮砂仁去殼各二錢鶴蝨微炒木香不見火胡黃連炒甘草炙各三錢共研細末醋打米糊為丸如緑豆大每服二三十丸空腹時淡薑湯送下六安神丸治心疳麥冬去心焙馬牙硝茯苓山藥寒水石甘草各五錢硃砂飛一兩龍腦二分研為細末煉蜜為丸如芡實大每服一丸七異功散溫中和氣治久咳不已面腫氣逆脾胃虛弱飲食少思人參茯苓白朮甘草陳皮八參黃丹治驚疳挾熱夜臥驚悸人參胡黃連各一兩乾蠍二十一個天漿子乾者微炒十四個天竺黃五錢青黛硃砂各一分龍腦一錢研為細末拌勻煉蜜和丸如黍米大每服十丸人參湯送下九珍珠散治心疳真珍末麥冬去心茯神各五錢天竹黃胡黃連羚羊角屑川大黃炒當歸微炒犀角屑各三錢牛黃雄黃各一錢硃砂甘草炙各二錢金箔銀箔各五十片麝香少許共和勻為散每服五分茵陳煎湯調下十茯苓丸治小兒心疳驚疳赤苓茯神蘆薈琥珀黃連各三錢鉤藤皮遠志肉薑製焙乾蝦蟆灰各二錢石菖蒲一錢麝香少許研為末粟米糊丸如麻子大每服十丸薄荷湯送下十一茯神湯治心氣不足驚悸頻哭小兒生下羸瘦多驚茯神一兩人參當歸酒洗各五錢甘草炙二錢清水煎服十二桃花丸治小兒心臟積熱生疳寒水石一兩炭火燒熱研為細末硃砂飛五分和勻水浸蒸餅見第三章第五節第三十一方為丸如粟米大每服三五丸冷水送下十三四味肥兒丸治小兒嘔吐不食腹脹成疳或作瀉不止或食積脾疳目生雲翳口瘡齦爛發熱瘦怯遍身生瘡及一切疳證黃連炒蕪荑神麯炒麥芽炒各等分研為末水煎米糊和丸如梧子大每服一二十丸十四五味異功散即異功散十五益黃散治小兒脾胃虛寒乳食不化腹痛泄利婦人妊娠嘔吐泄瀉産後泄瀉陳橘皮青橘皮訶子肉煨甘草炙各五錢丁香二錢研為細末每服二三錢清水煎服十六參苓白朮散治脾胃虛弱飲食不進多困少氣胸中痞滿噫嘔腹逆喘嗽消渴大便不實及久瀉癰疽潰後不思食者人參茯苓於朮山藥石蓮肉白扁豆桔梗砂仁薏苡仁甘草一方有陳皮神麯無桔梗十七神效換肌丸治脾疳川黃連炒鱉甲酒炙肉豆蔻煨使君子麵裹煨神麯炒麥芽炒各五錢訶子肉二錢五分麝香五分研為末丸如芥子大每服二三錢米湯送下十八大胡黃連丸殺蟲進食治小兒驚疳腹脹肌瘦發黃煩熱飲水多睡吼啀大便或瀉或祕好食泥土生米等物療瘡癬胡黃連黃連苦楝子各一錢白蕪荑五錢蟾頭燒存性研一分麝香另研一錢青黛另研一錢五分蘆薈另研一分先將前四味研為細末豬膽汁和丸如胡桃大中置巴豆仁一枚外用油紙裹之同米一升許蒸至米熟為度再入後四味少加曲糊和丸如麻子大每服十丸或十五丸十九蘆薈丸治疳氣羸瘦面色痿黃腹脅脹滿頭髮作穗揉鼻咬甲好食泥土痢色無定寒熱往來目澀口臭齒齦爛黑遍體生瘡及婦人熱結經閉作塊上衝梗痛常服長肌退黃殺疳蟲進乳食蘆薈麝香硃砂水飛各一錢干蝦蟆一兩同皂莢燒存性青黛二錢五分大皂角去皮弦子一兩共研末令勻湯浸蒸餅為丸如麻子大三歲兒每服二十丸二十木香散治食疳下痢無度南木香銼肉豆蔻去殼各一兩乾蟾酥炙二個胡黃連使君子去殼五靈脂各一兩巴豆七個麝香一分研為細末拌勻滴水於石臼中搗一二百下丸如黍米大每服二丸至三丸二十一地黃丸治小兒腎虛囟不合體瘦骨露及腎疳天柱倒熟地黃洗焙八錢澤瀉洗二錢牡丹皮去心白茯苓各三錢山茱萸肉牛膝鹿茸酥炙山藥各四錢研為末煉蜜和丸如梧桐子大二十二耆歸湯治小兒稟賦素弱痘瘡出不快及肝虛目視不明黃耆蜜水塗炙一兩全當歸酒洗焙白芍川芎各五錢甘草炙三錢每服二錢清水煎服二十三天麻丸治肝疳風疳疳眼天麻青黛川黃五靈脂夜明砂微炒川芎蘆薈各二錢龍膽草防風蟬蛻去足各一錢五分全蠍焙二枚麝香少許乾蟾頭炙焦三錢研為細末豬膽汁浸糕和丸如麻子大每服十丸薄荷湯送下二十四生熟地黃湯治疳眼內有朦霧生地熟地各五錢川芎赤苓枳殼炒杏仁水浸去皮尖川黃連半夏曲天麻地骨皮甘草炙當歸各二錢五分銼散每服二錢加生薑三片黑豆十五粒清水煎服二十五熊膽天麻丹治風疳羸瘦搖頭揉目百般拘急熊膽天麻羌活蟬蛻使君子去殼胡黃連各一兩蘆薈乾蟾酥炙黃各五錢搗籮為細末粳米飯和丸如黍米大每服十丸二十六蘆薈丸治疳癖肌肉消瘦發熱潮熱不思飲食口乾作渴或肝疳食積口鼻生瘡牙齦蝕爛蘆薈胡黃連黃連炒焦木香白蕪荑炒青皮各五錢當歸茯苓陳皮各一兩五錢甘草炙七錢共研細末米糊為丸如梧桐子大每服七八十丸二十七地黃清肺飲治小兒肺熱疳𧈟咳嗽多啼壯熱惡寒生地黃紫蘇北前胡防風赤苓黃芩當歸天冬去心連翹桔梗甘草炙各二錢五分桑白皮炒五錢銼散每服二錢二十八益氣丸治少氣氣極人參麥冬各七錢陳皮甘草炙各五錢五味子二十一粒研為細末丸如芡實大每服一丸二十九化𧈟丸治諸疳生蟲不時啼哭嘔吐清水肚腹脹痛唇口紫黑腸頭濕癢蕪荑蘆薈青黛川芎白芷梢胡黃連蝦蟆灰各等分研為末豬膽汁浸粉糊和丸如麻子大每服一二十丸三十補肺散治久患咳嗽肺虛氣促有痰噁心阿膠一兩五錢銼炒白茯苓馬兜鈴糯米各五錢甘草炙四錢杏仁二十一粒湯泡去皮尖研為末每服二錢清水煎服三十一麝香丹治小兒肺疳皮毛枯燥咳嗽上氣胡黃連一兩半夏五錢蘇子微炒五味子各一分乾蟾一枚塗酥炙微黃色麝香細研蘆薈細研硃砂細研各一分先以前五味搗籮為細末次入後三味共作一處拌勻棗肉和為丸如黍米大每服五丸至七丸三十二阿膠散治肺虛有火嗽無津液咳而哽氣者阿膠一兩五錢麩炒成珠牛蒡子炒香甘草炙各二錢五分馬兜鈴焙五錢杏仁去皮尖麩炒七個糯米一兩加生黃耆五錢研為末每服一兩小兒一二錢三十三胡黃連丸治肺疳不欲乳食時腹痛胡黃連當歸訶子皮木香各五錢青橘皮蘇子杏仁炒微黃各一分麝香一錢研入研為細末粟米飯和丸如緑豆大小兒三歲以下每服三丸粥飲送下三十四錢氏地黃丸見前節三十五生脈散治熱傷元氣肢體倦怠氣短懶言口乾作渴汗出不止腳欹眼黑津枯液涸人參五錢麥冬去心三錢五味子二錢長流水煎不拘時溫服三十六調元散見前節三十七九味地黃丸治腎疳熟地黃四錢五分赤苓山茱萸肉川楝子當歸川芎丹皮山藥使君子肉研為末煉蜜和丸如梧子大每服七八十丸三十八熊膽散治走馬疳熊膽細研莨菪子炒令微黑蝦蟆灰白礬各五錢生硫黃麝香細研雄黃細研蘆薈細研各一分研為末拌勻再研為細末每服一字荊芥煎湯調下如有瘡處宜薄敷之如鼻癢取少許吹入一日二三次三十九勻氣散治小兒驚膈嗽冷疝內吊腹痛氣滯枯梗五錢甘草二錢砂仁茴香陳皮各一錢白薑一分研為細末每服五分或一錢四十醒脾散調理百病木香白朮濕紙裹煨人參茯苓草果炙甘草陳橘皮厚朴縮砂水煮紫蘇子研為末每服一錢加薑棗清水煎服四十一青金丹治小兒諸積病滑石白丁香天南星各二錢七分青黛五分輕粉水銀各二錢川巴豆七十二個同拌合用軟飲為丸如緑豆大四十二保童丸消滯進食長肌肥兒治五疳腹脹胡黃連草龍膽炒各五錢使君子木香蘆薈細研各一錢大麥糵巴豆三七個去皮心同麥糵炒令紫色去巴豆不用以糵為末五錢川苦楝炒紫色一分研為細末醋煮米糊和丸如緑豆大每服十丸至十五丸四十三疳積散治小兒鬾病病乳夾乳夾食或病後飲食失調或平居飲食過飽致成疳積面黃腹大小便如泔大便瀉黃酸臭頭皮乾枯毛髮焦穗甚至目澀羞明睛生雲翳形體骨立夜熱晝涼及丁奚哺露等證厚朴厚而紫色有油者佳一兩廣陳皮去白甘草去皮蘆薈淨末各七錢青黛三錢百草霜二錢蕪荑五錢旋覆花一錢五分共為細末和勻每一歲用藥一分空腹燈芯湯調下服後病即愈當用肥兒丸調理如脾氣未實用啓脾丸四十四啓脾丸治脾積五更瀉消疳黃脹腹痛常服生肌健脾益腎人參白朮茯苓山藥蓮肉各一兩陳皮澤瀉山楂甘草炙各五錢共研細末煉蜜為丸如彈子大每服一丸四十五青黛散治小兒疳痢不止下部發癢青黛蟾灰胡粉微炒黃連微炒麝香細研各二錢五分赤石脂五錢訶梨勒皮一兩微煨搗籮為散每服五分乳汁調下四十六殺疳丸治疳痢不止雄黃麝香牛黃蘆薈硃砂龍骨燒令赤色密陀僧燒紅胡黃連各二錢五分青黛五錢金箔十片肉豆蔻二枚蟾酥熱水化如泥一錢二分五釐共為細末入蟾酥研令勻湯浸蒸餅和丸如黃米大四十七肉豆蔻丸治疳痢不吃乳食四肢瘦弱肉豆蔻一枚木香五錢人參訶子肉煨硃砂麝香各二錢五分研為細末令勻軟飯為丸如麻子大每服三丸米飲下四十八蕪荑丸治小兒疳痢久不瘥蕪荑五錢研末羊肝一具先以羊肝切片以蕪荑末摻在肝內線纏合米泔水中煮令熟搗爛糯米飯和丸如麻子大每服五丸粥飲送下四十九白龍骨丸治小兒疳痢不止白龍骨白石脂雞屎礬燒令汁盡黃連微炒胡粉微炒白茯苓阿膠搗碎炒令黃燥各五錢共為細末煉蜜和丸如麻子大每服五丸粥飲送下五十白朮散治小兒疳痢腹脹疼痛日夜二三十行白朮微炒一兩當歸微炒地榆微炒木香赤芍甘草炙各五錢為粗末每服一錢清水煎服五十一胡黃連丸治疳痢腹痛胡黃連五錢沒藥木香各二錢五分共為末糯米飯和丸如緑豆大每服五丸五十二肥兒丸甲消蟲進食治小兒食積五疳肉豆蔻煨使君子肉焙麥芽炒黃連薑汁炒黑色神麯炒各五錢檳榔二枚木香二錢一方加白朮五錢山楂肉枳實各二錢研為細末蒸餅調和稍加白蜜為丸如彈子大每服一丸五十三肥兒丸乙治小兒脾疳人參二錢五分白朮土炒胡黃連各五錢茯苓三錢黃連二錢使君子肉四錢神麯炒麥芽炒山楂肉各三錢五分甘草炙蘆薈各一錢五分共研末黃米糊為丸如黍米大每服二三十丸五十四肥兒丸丙殺蟲退熱治小兒脾虛疳積面黃體瘦肚脹腹大一切積滯厚朴雞內金茯苓各四兩新會皮青皮各二兩五穀蟲縮砂仁胡黃連各三兩白朮炒六兩麥冬炒白扁豆山楂肉炒焦各八兩檳榔一兩五錢乾蟾炙十一具六神麯十二兩共研末煉蜜為丸每丸重二錢五分每服一丸米湯化下忌食油膩濕面生冷按肥兒丸之名為疳熱腹脹羸瘦而設蓋因疳而瘦疳除則兒自肥也若本無疳熱之病而誤以為常服可以肥兒則損削元氣流弊頗大不可不知五十五六神丸治疳瀉渴飲無度木香丁香肉豆蔻使君子肉訶子各五錢蘆薈一兩煨熟研為末棗肉和丸如緑豆大每服三五丸食前溫米飲送下五十六褐丸子治疳氣腹脹如鼓及乳癖食癖蘿蔔子炒一兩五錢黑牽牛炒一兩胡椒二錢五分木香蓬莪朮濕紙裹煨切作片子各五錢共研細末麵糊為丸如黍米大每服二十丸五十七肥氣丸治肥氣當歸頭蒼朮各一兩五錢青皮炒一兩蛇含石火煅醋淬七錢五分三稜蓬莪朮鐵華粉與三稜蓬莪朮同入醋煮各三兩研為末醋煮米糊和丸如緑豆大每服四十丸五十八分氣飲治小兒腫脹作喘桔梗赤茯苓陳皮桑白皮大腹皮枳殼炒半夏曲紫蘇蘇子微炒甘草炙各二錢草果仁一錢銼散每服一錢五分加生薑大棗清水煎服五十九使君子散治蛔疳使君子瓦上炒十個甘草膽汁浸一宿白蕪荑各一分苦楝子炮去核五個研為末每服一錢清水煎服六十蘆薈丸治蛔疳蘆薈安息香胡黃連枳殼麩炒各一錢使君子炒三七枚蕪荑一分定粉即鉛粉一名粉錫一錢五分麝香少許共研細末獖豬膽汁和米糊為丸如緑豆大每服五丸至七丸六十一三根散治蛔疳蟲動啼叫不止每至月初間尤甚狀如神祟貫衆根棠梨根酸石榴根各一兩栗刺故綿乾漆各五錢燒灰存性搗籮為細末每服一錢清水煎服六十二下蟲丸追蟲取積苦楝根白皮酒浸焙貫衆木香桃仁浸去皮焙蕪荑焙雞心檳榔各一錢鶴蝨炒輕粉各五分干蝦蟆炙焦三錢使君子肉五十個煨研為末飛麵糊和丸如麻子大每服二十丸天明時清肉汁送下六十三金蟾散治脊疳積疳乾蟾大者塗酥炙令焦黃一枚夜明砂微炒桃白皮樗根白皮地榆黃柏訶梨勒百合白蕪荑微炒人參黃連川大黃各三分胡粉三錢丁香三七粒檳榔一分共為細末每服五分粥飲調下六十四地骨皮丸治脊疳地骨皮紫參黃耆大黃微炒郁李仁湯浸去皮尖微炒各五錢龍膽草子芩枳殼麵炒木香豬苓海蛤細研各等分為末煉蜜和丸如緑豆大每服五丸六十五殺疳丸治脊疳羸瘦腹中有蟲沒石子瓜蒂鶴蝨蟾頭炙令焦黃蘆薈青黛各五錢麝香膩粉一作汞粉一作鉛粉各一分搗籮為末糯米飯和丸如黍米大每服五丸粥飲送下六十六蘆薈丸治脊疳蘆薈青黛硃砂麝香熊膽胡黃連貫衆地龍微炒黃連蟬殼去足微炒雷丸各五錢蝦蟆塗酥炙令焦黃一枚搗籮為末蝸牛肉研丸如麻子大每服五丸六十七青黛丸甲治脊疳青黛硃砂夜明砂定粉各一分蟾酥熊膽羚羊角屑犀角屑各五釐黃連五錢麝香一錢搗籮為末軟飯和丸如緑豆大每一歲服二丸六十八青黛丸乙治乾疳青黛三錢牛黃蘆薈硃砂麝香雄黃胡黃連蛇蛻燒灰龍膽草蟬蛻微炒各一分蟾一枚塗酥炙焦黃搗籮為末令勻水煮麵糊和丸如黍米大每服三丸粥飲送下六十九天竺黃散治小兒乾疳天竺黃牛黃雄黃硃砂蘆薈麝香蟾頭炙令焦黃胡黃連犀角屑木香甘草炙微赤各一分龍腦一錢搗細籮為散研令勻每服五分溫湯調下七十牛黃丸治乾疳牛黃五分雄黃黃連蘆薈天竺黃各一分龍腦麝香各一錢甘草五釐炙微赤搗籮為末研勻糯米飯為丸如緑豆大一歲兒每服一丸粥飲送下七十一胡黃連丸治乾疳胡黃連末五錢硃砂波斯青黛蘆薈各三分麝香一分蛇蛻皮燒灰一條蟾酥一杏仁大研為末用豬膽汁一枚酒一盞熬膏為丸如緑豆大每服三五丸七十二使君子丸甲治腹內蟲痛口吐清水使君子肉瓦上焙檳榔酸石榴根皮東向者佳大黃半生半泡各七錢五分除檳榔銼曬不過火餘三味再焙共為末砂糖水煮麵糊和丸如麻子大每服三十丸至五十丸七十三使君子丸乙治小兒臟腑滑瀉疳瘦下痢腹脅脹滿不思乳食常服安蟲補胃消疳肥肌使君子肉麵裹煨一兩陳皮去白一分厚朴薑汁塗炙五錢甘草炙銼訶子半生半煨去核青黛非兼驚及帶熱渴者不用各五錢研為細末煉蜜和丸如小雞頭米大每服一丸七十四厚腸丸治小兒哺食不能克化腹脹體瘦便色無常陳皮半夏蒼朮人參各三分麥芽枳殼神麯末各五分青皮厚朴各二分研為細末水煮麵糊和丸如麻子大每服二十丸七十五聖惠木香丸治內疳木香蟬殼微炒去足麝香黃連黃丹微炒熊膽夜明砂微炒乾蟾塗酥炙微焦各一分赤石脂五錢肉豆蔻一顆去殼田父炙令微黃五錢共為末水浸蒸餅和丸如麻子大每服二丸七十六蘆薈丸治內疳疳痢時作時止蘆薈雄黃沒石子蟬殼微炒去足丁香熊膽蛇蛻各一分麝香蟾酥各一錢黃連五錢共為細末煉蜜和丸如米粒大每服三丸七十七胡粉丸治內疳下痢昏沉多睡胡粉微炒青黛各五錢黃連末一兩麝香一錢研為細末豬膽汁一枚和丸如米粒大每服五丸七十八清胃散見前第三節七十九甘露飲治胃熱未宣齦腫出膿目赤腫痛飢煩不食口瘡咽痛瘡疹已發未發及脾胃受濕瘀熱在裡濕熱成疸肢腫胸滿氣短身熱二便祕澀干熟地黃去土天門冬去心焙生乾地黃麥門冬去心焙枳殼麩炒山茵陳石斛甘草炙黃芩鮮枇杷葉刷去毛各等分研為末每服二錢清水煎八十青霞散外用治小兒口齒疳蝦蟆一個燒灰甘草炙青黛各一分研為細末加麝香少許先用鹽湯漱口拭乾以雞翎蘸藥敷之八十一黃礬散外用治齒齗宣露骨槽風小兒急疳齗肉爛惡腫痛黃礬一兩研入坩鍋燒通赤生乾地黃梧桐葉升麻各五錢干蝦蟆頭二枚炙焦研為末每用五分干貼良久吐津甘草湯漱口一二次立效八十二湯氏五福化毒丹清膈涼血治上焦壅熱煩渴瘡疹餘毒口齒出血牙宣口臭𧈟鼻唇舌生瘡玄參洗焙桔梗各一兩赤苓人參風化馬牙硝青黛甘草焙各一分麝香五分除馬牙硝麝香另研外余共研為細末次和青黛等煉蜜為丸如芡實大金銀箔為衣每服一二丸薄荷湯化下牙宣口臭者食後生地黃汁化下瘡疹餘毒生犀角磨水送下八十三澤瀉散治小兒肺積鼻生𧈟瘡及鼻下赤爛川澤瀉生川鬱金甘草炙梔子仁炒各一分研為末甘草湯調下外用青金散敷之八十四枇杷葉散治鼻疳赤爛枇杷葉去毛陰乾一兩山梔子五錢百部檳榔各二錢五分研為細末每服三錢兒小者二錢熟湯調下八十五蟬殼散外用治小兒鼻疳癢蟬殼微炒青黛蛇蛻皮燒灰麝香滑石各等分搗細籮為散研令勻每用如緑豆大吹入鼻中一日三次疳蟲盡出八十六青金散外用治小兒疥癬遍身瘙癢膿水淋漓經年不愈松香二兩蛤粉五錢青黛二錢五分研為末油調搽用或乾摻之加輕粉枯礬各三錢尤效八十七瀉肝散瀉肝通絡木賊草威靈仙家菊花羌活蟬蛻去足生大黃甘草炙石決明各等分樟腦或作龍腦少許研為末每服二錢獖豬肝一兩批開去膜摻藥在內線纏米泔煮熟嚼下八十八殺疳散消疳防風龍腦牡蠣白芷細辛五味子各一錢研為末每服一錢食後粥飲調下八十九退翳丸治目生翳膜蟬蛻白菊花夜明砂車前子連翹各五錢黃連一兩蛇蛻一條炒研為末米泔煮豬肝和丸如梧桐子大每服三十丸薄荷湯送下九十羚羊角丸治肝肺壅熱眼生胬肉赤脈澀痛及赤眼障翳癢痛羞明小兒風疳羚羊角屑生甘草白何首烏瓦松各一兩生乾地黃鬱金各二兩共為細末煉蜜為丸如梧桐子大每服十五丸九十一消疳無價散治小兒疳眼石決明一兩五錢煅爐甘石童便泡一日夜燒透以能浮水者為佳滑石海螵蛸煅去殼各五錢雄黃二錢硃砂一錢冰片五分共為細末量兒大小或三四分或五六分用不落水雞肝一副竹刀切破上開下連摻藥在內用線扎好加淘米水入砂罐煮熟連湯食盡雖疳積眼瞎可以復明九十二蕤仁膏外用治風熱眼赤絲亂脈癢痛無定蕤仁去殼皮心膜油五錢酥一栗子大和勻研攤碗內用艾一小團燒煙出以碗覆於煙上熏之煙盡再研令勻入硃砂麝香各五分瓷器收貯每用如麻子大點兩眥頭一日二次如點老翳加硼砂末少許九十三龍腦丸治小兒腦疳羸瘦煩熱龍腦麝香雄黃各一錢胡黃連末牛黃硃砂熊膽蘆薈蝦蟆灰各一分共研為粉以水化熊膽和丸如麻子大每服三丸九十四龍膽丸治腦疳及腦熱瘡龍膽草升麻苦楝根皮焙赤茯苓防風蘆薈油發灰各二錢干青黛淨黃連各三錢研為末獖豬膽汁浸糕糊丸如麻子大每服二十丸九十五吹鼻龍腦散外用治小兒腦疳龍腦麝香各少許蝸牛殼炒令黃蝦蟆燒灰瓜蒂黃連細辛各一分共為細末每取少許吹於鼻中九十六柴胡飲治骨蒸疳氣五心煩熱日晡轉盛口乾無味渴多身瘦胸滿痰緊食減神昏小便黃色北柴胡人參當歸黃芩赤芍甘草炙各一兩生大黃桔梗北五味子半夏各半兩研為末每服二錢九十七蘆薈肥兒丸消五疳小兒無辜疳五穀蟲蘆薈胡黃連川黃連薑汁炒各一兩銀柴胡一兩二錢扁豆山藥各二兩山楂二兩半蝦蟆四個肉豆蔻七錢檳榔五錢使君子二錢半神麯二兩麥芽一兩六錢鶴蝨八錢蕪荑一兩硃砂另飛麝香另研炒研共為細末醋糊為丸如黍米大每服一錢九十八鱉甲散治小兒無辜疳項細腹大毛髮乾立作穗鱉甲三分去裙襴塗醋炙黃檳榔三顆沉香漏蘆牛蒡子微炒使君子赤芍訶黎勒皮甘草炙微赤各五錢搗籮為散每服一錢九十九蠍虎丹截疳祛毒雄乾蠍虎微炙一枚蝸牛殼蘭香根澱花麝香雄黃各一分龍腦五釐研為細末拌勻煎米醋打白麵糊和丸如黍米大每服十丸一藍葉湯治小兒無辜疳血痢不斷藍葉一兩地龍人參烏梅肉冬瓜仁黃連赤茯苓蝸牛殼微炒各五分搗籮為細末每服一錢一一漏蘆散治無辜疳肚脹或時瀉痢冷熱不調漏蘆一兩搗細籮為散每服一錢用豬肝一兩鹽少許清水煮熟空腹時頓服粥飲下一二醍醐散吐瀉後調脾胃進飲食治丁奚哺露虛熱煩渴氣逆心惡陳皮去白縮砂仁厚朴麥芽烏梅各五錢良薑乾葛烏藥各二錢五分草果仁二錢甘草炙三錢碎散每服二錢加薑棗鹽各少許清水煎一三烏犀丸治小兒疳熱腹內生蟲肚大手足疲弱丁奚尫羸黑牽牛青皮各二兩使君子肉七錢五分苦楝皮雷丸各二錢五分鶴蝨五錢同入鍋內炒焦研為末水煮麵糊和丸如黍米大一四沉香檳榔丸和脾助胃進食清神寬胸快膈順氣調中悅顏色壯筋骨治面黃肌瘦乳癖腹脹痛吐利瘧腫諸疳蟲積沉香檳榔檀香南木香丁香皮三稜神麯炮蓬莪朮炮麥芽炒厚朴蒼朮米泔浸炒使君子肉瓦上焙乾青皮去白陳皮去白縮砂仁益智仁薑汁炙香附枳殼麩炒高良薑各五錢甘草炙一兩五錢共為細末水煮麵糊和丸如麻子大每服三十丸一五木香莪朮丸和脾益胃寬膈快氣悅色清神進食莪朮炮製三稜炮銼醋製香附各四兩檳榔薄銼生牽牛各一兩青木香炒穀芽青皮各五錢蓽澄茄丁香南木香各四錢共為細末水煮麵糊為丸如緑豆大每服十許丸一六養臟湯治泄痢膿血有如魚腦後重脫肛臍腹㽱痛人參白朮炒焦各一錢五分肉桂訶子肉木香肉豆蔻罌粟殼蜜炙各五分清水煎分兩次服忌食生冷魚腥麵食油膩等物夜起不瘥者加附子五分不應加一錢一七麝香進食丸治小兒乳食不消心腹脹滿煩熱喘急嘔吐痰逆腹鳴泄瀉下痢赤白腹痛後重食症乳癖痃氣痞結巴豆霜一錢二分當歸米汁浸一宿炒硃砂另研代赭石煅醋淬七次枳殼炒木香各五錢麝香另研五分共研末麵糊為丸如麻子大一歲兒每服一丸一八聖惠人參丸治小兒哺露或失衣當風或冷水洗浴以致腹脹瀉痢或寒熱如瘧不思食物或食而不消化或消化而不生肌肉四肢羸瘦人參麥冬去心焙半夏湯洗七遍去滑黃耆大黃微炒白茯苓柴胡黃芩各三分訶梨勒皮煨甘草炙鱉甲去裙襴塗醋炙令黃各一兩芎藭五錢搗籮為末煉蜜和丸如麻子大每服三五丸一九千金消癖丸治五疳癖積蘆薈阿魏另為糊青黛木香厚朴薑炒檳榔陳皮生甘草各一錢使君子肉胡黃連山楂肉香附醋炒三稜醋炒莪朮醋炒各二錢水紅花子神麯炒麥芽炒各四錢人參白朮土炒茯苓各三錢上為細末將阿魏一錢麵糊和丸如緑豆大每服三五丸一一木香硇砂丸治脾胃虛寒宿食不消婦人痃癖積聚血塊刺痛木香硇砂另研丁香官桂附子泡乾漆炒煙盡細墨大黃乳香另研蓬莪朮青皮京三稜沒藥另研豬牙皂角乾薑泡各等分巴豆霜減半研為末以好醋一升化開硇砂去滓置銀器中慢火熬次下巴豆霜大黃熬成膏將藥末與膏子和丸如麻子大每服二三十丸按一九及一一兩方俱為攻伐之猛劑用之中病即止當服用時即身體壯實者亦宜與四君子湯四物湯等同進免傷正氣一一一紅花膏外用消癖積沒藥五錢血竭麝香阿魏各三錢當歸赤芍各一錢水紅花料一捆煎汁去渣熬膏一碗共為細末入膏內攪勻青布攤貼患處一一二阿魏保生膏外用治痞塊積聚先用麻油二十兩浸榆桑桃槐柳枝各二十一段熬枯再下萆麻仁巴豆各一百二十粒大風子肉土木鱉番木鱉各五十個穿山甲炙二十片白附子當歸白芷各五錢大黃二兩甘草三錢核桃肉一斤熬枯濾去渣復入淨鍋內熬至滴水成珠下飛淨血丹八兩成膏再下乳香去油沒藥去油兒茶血竭阿魏各五錢冰片一錢麝香三錢水紅花熬膏四兩攪勻老嫩得宜收貯勿泄氣每用狗皮攤貼凡不能服藥者但將此膏貼心口上即化痞消積開胃進食年老之人亦宜一一三蘭香散外用治癘風及鼻疳赤爛牙疳齦爛蘭香葉燒灰二錢銅青輕粉各五分研為細末和勻貼於患處乾者香油調敷一一四白粉散外用治諸疳瘡烏賊骨三錢白芨二錢輕粉一錢為散漿水洗拭乾敷之一一五熊膽膏外用治疳瘡不瘥熊膽蚺蛇膽蘆薈各五錢黃礬一分麝香牛黃各一分龍腦一錢研為細末和勻井華水三合攪勻盛銀器中重湯煮成膏每用少許塗患處第七節雜證兒科特證種類繁多就其重要者言之則已有臍風丹毒口證變蒸弱證疳證等類然此外名目尚多病情各異既為小兒所特有者不得不另闢一節以述之名之曰雜證計有臍濕胎驚胎風胎黃胎毒夜啼客忤哯乳諸項茲逐條分述於後一臍濕小兒斷臍不慎或衣服尿片受濕侵及臍眼重則病邪走竄發為臍風輕則病於局部腫濕不幹遷延日久亦成危證故治之不可不早一見臍濕即宜以枯礬龍骨等分加麝香少許研為細末敷於臍中每二三時看一次如有稠水流水即以藥棉收干換藥再敷或用乾薑白石脂煅灰同胡粉各等分研末時時敷臍中或用張渙封臍散或用紅綿灰黃牛糞灰龍骨發灰干胭脂各等分為細末摻臍干則油塗臍濕初起簡易方用粗糙紙燒灰存性敷臍最效惟宜勤加更換勿使再受濕氣乃可逐漸收功也亦有臍濕之後焮赤成瘡以致潰爛謂之臍瘡治法與臍濕略同總宜使局部清潔不至蔓延擴大亦不足為患也瘡上宜用胡粉龍骨各一錢川連倍之共研細末時時敷用臍中出血者白石脂砂研極細末或龍骨枯礬為細末加血竭少許乾摻之以愈為度又有臍突一證通常因小兒過於啼哭努張其氣而臍眼不加緊封以致愈啼而臍眼愈突因衣服之摩擦遂致受傷宜以帛緊束勿使外露其有因風濕入內光浮如吹捻動微響驚悸作啼者內服宜用犀角消毒飲或白芍藥湯加薏仁外用煅牡蠣五錢大黃五錢朴硝一錢共為末多用田螺洗淨浸水調一二錢敷臍上其水從小便出即愈小兒陰囊腫大者亦可通用二胎驚小兒生下即病壯熱吐哯翻眼握拳咬牙噤口身腰強直嘔吐涎潮搐掣驚啼囟開腮縮此胎驚也病原由妊娠之時飲酒嗜欲忿怒驚撲或外挾風邪內傷胎氣致成此狀視其眉間氣色赤而鮮碧者可治青黑而黯者不救治宜解散風邪為先再以化痰調氣方用青金丸鉤藤飲甚者銀硃丸利之或其驚常發者瘥後宜服太乙散調治凡小兒百日內發搐真者二三次必死假者頻發不為重宜試其口氣出熱者為假可治其驚發痰升不省人事者宜白金散啼叫不已者宜祛風散並用塗頂膏塗於囟門大抵小兒臟腑脆弱不可隨便取用硃砂銀粉之重墜蜈蚣蠍尾之毒物宜疏風行滯達痰開肺宣竅之品循序漸進不效方可酌議前述之峻劑則貽誤取咎庶可免歟參看第五章三胎風小兒生後身熱皮紅狀如湯火潑傷者謂之胎風病原由妊娠之時脾胃積熱或父母本有宿疾遺傳胎兒治宜清胃散逍遙散與乳母服之小兒亦服少許其身無皮膚而不焮赤者宜粳米粉敷之身無皮膚而焮熱發赤者宜石膏粉敷之若腦額生瘡腳上生瘡未滿月而撮口握拳腰軟如隨者此必父母俱患梅毒胎兒感毒甚深瀰漫血中比生則一齊發作法為不治亦有幸而得愈者或肌肉腐潰常年不痊或筋骨穿爛形體不全固不免終其身為一廢人也參看第一章第四節第六段四胎黃小兒生下後身體略現黃色者此生理自然之變化初無大患者也若遍體面目皆黃狀如金色身上壯熱大便不通小便黃如梔汁乳食不思啼哭不止者此由産婦孕時濕熱傳於胎兒所致宜母子同服地黃湯不自乳食與乳母服之甚則犀角散若色淡黃而兼白者此胃怯也宜白朮散微黃者不必服藥即欲服藥酌用三黃湯以清胃熱數日之後其黃自退矣又有遍體紅赤者用生地花粉甘草連翹等分煎服外用浮萍藍葉水苔搗爛絞汁調朴硝土砂塗之其赤亦退五胎毒小兒生下後頭上生瘡或如干癬或膿水淋漓或結靨成片謂之胎毒此證多由稟受胎熱或欲火之毒或飲食之毒所致發於耳邊髮際漸延頭面作癢者此肝膽之實熱治宜柴胡清肝散發於眉際延及遍身四肢膿水淋漓者此肝脾之實熱治宜清胃散小柴胡湯立效散之屬發於頭額者屬心經之熱治宜連翹心梔子仁川連牛黃之類頭面生瘡作癢出水者此腎經虛熱宜地黃丸並解毒散外治用陳石灰黃柏滑石各五錢研細末桐油調搽或用紫甘蔗皮一兩兒茶五錢血竭二錢梅花冰片四分共為末豬膽汁調搽或用雞蛋二三枚蒸熟去白留黃加亂髮一團如蛋大於鐵器中炭火干煎初甚乾枯少時發焦蛋有油出俟冷取油和苦參末搽之數日即愈簡易方用黃連黃柏黃芩等分為末濕則乾摻干則油塗之六夜啼小兒夜啼多由乳母不善調護以致俾夜作晝不能安眠其有不因於此者則為病病有寒熱驚滯四因因寒而啼者脾氣寒冷陰盛於夜則腹中作痛故面青手冷腰曲而啼治宜用炙黃耆當歸甘草赤木香等分為末塗乳頭上令兒吮之因熱而啼者心火煩盛面赤手暖口中氣熱仰身而啼見燈火愈甚治宜用鉤藤茯神甘草燈芯辰砂木通各一錢煎湯服因滯而啼者乳食停滯作痛啼而不哭直聲來往淚液殊少治宜用生麥芽山楂各一錢煎湯服因驚而啼者心氣不足神不安穩哭而不啼連聲多淚宜從驚治或服天王補心丹以調之單方蟬蛻用下半截不拘多少研末薄荷湯送下治一般夜啼有效總之夜啼一類多由驚熱之相併愈欲其睡愈不得睡非一面服藥一面使之逐漸改變固未易奏功也七客忤小兒神氣虛弱忽觸非常之物或見不識之人與兒神氣相忤以致口吐青黃白汁腹中疼痛水穀不化面易五色其狀似癇但目不上插脈多弦急而數甚至心腹脹滿絞痛氣衝心胸悶亂欲死不急治之亦能殺人初發時宜視其口中懸雍左右當有青黑腫核如麻豆大或赤或白即以針刺破或用指爪摘去以綿裹叉頭拭去血即愈通治宜備急丸安神丸張渙辟邪膏之屬客忤夜啼者時生恐懼睡中驚惕或兩手抱母驚啼不已治宜先用百解散散表次用蘇合香丸琥珀抱龍丸之屬以驅邪鎮心大率客忤之證必先熱於內然後忤觸於外或神氣先虛忤乃乘之若健全之小兒雖偶有所觸不過略現驚恐固不足為患也尚有觸犯穢氣而現上述證狀者謂之中惡治宜芳香化濁與客忤大率相同八哯乳哯不嘔而吐也小兒吐乳過飽或動搖之均足致此不足為異惟頻哯不已則宜治之因過飽胃弱不化而哯者宜用麥芽陳皮白朮神麯之類因熱而哯者面色多赤二便微祕宜用川連茯苓陳皮竹茹之類因寒而哯者面色青白糞清多沫宜用白豆蔻半夏生薑砂仁之類胃氣虛弱傷中頻哯宜用伏龍肝煎湯飲之立止附方一封臍散外用治臍風臍濕當歸五錢洗焙天漿子三個微炒亂髮一錢燒灰存性搗籮為細末用麝香一字拌勻每用一字至五分敷臍上時時用之二犀角消毒飲治痘瘡發疔胃熱咽腫便祕小兒斑疹丹毒因熱作驚犀角七分連翹鼠黏子各一錢荊芥六分甘草防風各五分忍冬一錢五分清水煎服三白芍藥湯治小兒臍突冷疝腹痛壞症傷寒白芍藥酒炒一兩澤瀉五錢生甘草一錢二分肉桂一錢共研粗末每服二錢誤汗誤下加人參南木香各二錢臍下痛加生薑一片食鹽五釐四青金丸治小兒胎熱化痰涎鎮驚邪人參天麻煨茯神白附子炮牛膽南星炒各二錢炙甘草一錢五分青黛一錢研為極細末煉白蜜和丸如梧子大鉤藤皂莢子煎湯化服五鉤藤飲治小兒胎驚夜啼鉤藤鉤茯神茯苓川芎當歸木香甘草炙白芍各一錢研為末每服一錢加生薑大棗清水煎服驚啼加蟬蛻防風天麻驚搐加蠍尾五分六銀硃丸見前第一節七太乙散治胎驚天漿子去殼微炒蠍稍各二十一個防風天麻硃砂各五錢麝香一錢研為末每服五分人乳汁化下一方有天南星白附子茯苓八白金散治諸癇潮發不省白殭蠶湯洗炒微黃天竺黃二錢五分牛黃一錢麝香龍腦各五分研為細末拌勻每服五分薑汁調放溫灌之九祛風散治胎癇多啼胡黃連五錢全蠍犀角天竺黃麻黃去節各二錢五分各研細末和勻每服五分加麝一字乳汁調下十塗頂膏外用治天釣風蕓薹子生烏頭去皮臍各二錢研為末每用一錢新汲水調敷頂上十一清胃散見前第三節十二逍遙散治肝氣抑鬱血虛火旺頭痛目眩頰赤口苦倦怠煩渴寒熱咳嗽兩脅作痛臍部脹痛小腹重墜婦人經水不調脈弦大而虛柴胡七分白朮蜜水拌蒸茯苓當歸各一錢白芍藥酒炒一錢五分甘草炙陳皮各八分薄荷葉五分煨薑三片清水煎服十三地黃湯治濕熱鬱結經絡阻滯生地黃赤芍天花粉赤苓川芎當歸豬苓澤瀉甘草茵陳各等分銼散清水煎服十四犀角散治小兒胎黃犀角茵陳栝蔞根升麻煨甘草龍膽草生地黃寒水石煅等分清水煎服十五白朮散治吐瀉已久虛熱而渴並治霍亂煩渴虛損氣弱及酒積嘔噦白朮人參白茯苓藿香木香甘草炙各一兩乾葛二兩研為末每服三錢十六三黃湯見前第三節十七柴胡清肝散治肝膽三焦風熱怒火憎寒發熱寒熱往來耳衄頭瘡鬢疽發脅陰縱婦人陰癢等證柴胡黃芩人參甘草各三分梔子炒黑川芎各五分連翹桔梗各四分清水煎服十八小柴胡湯治傷寒惡風往來寒熱胸脅苦滿默默不欲食心煩喜嘔口苦耳聾脈弦而數或胸中煩而不嘔或渴或不渴身有微熱或腹中痛或脅下痞硬或心下悸小便不利或咳凡屬少陽經半表半裡之證之宜和解者柴胡黃芩人參甘草生薑半夏大棗十九立效散外用治鬢瘡耳瘡瘡疥定粉即粉錫松香黃柏黃連枯礬各一兩研為細末用清油調搽二十地黃丸即六味地黃丸見前第五節二十一解毒散治癰瘡初起犀角屑川升麻朴硝赤芍木通各一兩石膏二兩玄參麥冬去心生甘草各五錢每服四錢清水煎服二十二天王補心丹寧心保神益血固精壯力強志清二焦化痰涎祛煩熱除驚悸治思慮過度心血不足神志不寧津液枯涸咽乾口燥健忘怔忡大便不利口舌生瘡等證生地黃人參茯苓遠志石菖蒲玄參柏子仁桔梗天門冬丹參酸棗仁甘草麥門冬百部杜仲茯神當歸五味子研為細末煉蜜為丸二十三備急丸治中惡客忤鬼擊鬼打面青口噤胸腹刺痛脹滿氣急卒死暴厥以及寒氣冷食稽留胃中胸腹滿痛便祕巴豆去皮心膜油研如脂一錢乾薑生泡去皮二錢川大黃濕紙裹煨三錢先以大黃乾薑搗為細末入巴豆霜合搗千杵和蜜為丸如小豆大每服三四丸未醒更服三丸按此方峻猛用者宜慎二十四安神丸治心經虛熱睡中驚悸夜啼人參酸棗仁炒茯神半夏各一錢當歸酒洗橘紅赤芍炒各七分五味子五粒甘草炙三分研為末薑汁和丸如芡實大每服二三丸二十五辟邪膏治小兒客忤經犯鬼物粗惡暴氣吐下青黃赤白者降真香銼白膠香沉香虎頭骨微炒鬼臼去毛草龍膽人參白茯苓各五錢搗羅為細末加水磨雄黃飛五錢麝香一錢拌勻煉蜜和丸如雞頭實大每服一丸乳香煎湯化下又另丸如彈子大用緑絹袋盛貯佩兒衣帶上或於臥室常燒之以辟邪惡之氣二十六百解散治胎驚丹毒之火毒攻裡者乾葛二兩五錢升麻赤芍各二兩生甘草一兩五錢黃芩一兩麻黃七錢五分肉桂二錢五分研為粗末每服二錢加生薑蔥白水煎服二十七蘇合香丸見前第四節二十八琥珀抱龍丸治小兒諸驚四時感冒風寒溫疫邪熱致煩躁不寧痰嗽氣急及瘡疹欲出發搐常服祛風化痰鎮心解熱和脾胃益精神琥珀天竺黃檀香人參白茯苓各一兩五錢生甘草三兩枳殼枳實各一兩硃砂飛淨五兩山藥一斤膽南星一兩金箔一百片遵古法為丸如芡實大用瓦瓶入麝香同收毋使泄氣每服一二丸蔥湯或薄荷湯化下第四章痧痘論治第一節痧疹概要一痧疹起源痧子越人稱為瘄北人謂之疹子秦晉之間曰粳瘡南人俗語曰麩瘡閩粵之間皆號麻蓋一病而俱數名也近今吳人於小兒出瘄皆稱痧子成人出瘄則號疹子其實人不論長幼凡初次發出者皆痧子也其後復發者皆疹子也疹與痧雖屬一類之病然究有小別痧子點密而較細疹子點稀而較粗痧子先天之毒為多疹子後天之毒為多故北人稱痧曰疹亦有微誤至於病之起源可以賅括稱之曰毒蓋兒居母腹以母之氣血為氣血夫人孰無飲食之所傷六淫之所侵毒之伏於母體者胎兒莫不感之且當成胎之時精華者供榮養糟粕者棄胞中則積漸所蘊皆足成毒胎兒日處其間又安能免於為毒所染故胎兒各組織中悉含有毒素可以斷言比其生也其新陳代謝之作用倍增於往時故其毒有宣泄之必要於是或生而遊風丹毒一時蜂起或生而腮腫口腐雜然並作此皆毒之泄露也然毒之盛者聚者自隨初生去毒之法由人力以逗之外出然毒之輕者散者則一時不易發出伏蘊於內待時而動於是乎痧子一症遂為小兒人人所必經之症矣至於痧疹觸發之期最盛於春夏則以時當降藏之後天氣動地氣泄時行之邪襲於外含蘊之毒遂動於中是以痧疹之發必有誘因或一門皆染或闔境流行職是故耳再者凡痧子之發必密布周身無微弗至則正因胎兒各組織中悉含有毒素故無處不泄也若有一部未發為一部之毒未透是以驗痧者恆視透齊與否以定施治之標也二痧疹病理痧疹之發既為人身宣泄邪毒之路故其發也由內達外由血分而達於氣分始於脾終於肺也何以言之考脾主一身肌肉肺主一身皮毛痧疹之發既由肌肉以達膚表而脾為藏血之臟肺為主氣之臟故知其發於血達於氣始於脾終於肺也準是更可知痧疹當隱現於皮膚之間即為邪毒已外傳於肺之證若盛發之時則邪毒方悉趨於肺以尋出路其有發而不易透達者是肺之不宣也其有旋出即沒者是肺不任邪或肺氣之閉塞也是故治痧之法主重在肺極痧之變亦以邪毒陷肺為最劇至於痧出將沒尤當以清肺為急蓋嚮者餘毒未免留戀肺臟清之正以杜其後患也由此觀之治痧自始至終總不離於肺此法之常也至若變症蜂起則邪有不得泄而內陷者或熱甚侵肝者或熱甚灼心者則須兼脾肝心肺四臟分治以消息之正昔人所謂痧疹一症四臟俱受其傷也三痧疹症狀痧疹將發其初並無顯著之現狀即偶有發熱不過似尋常之感冒而已繼則身熱益甚口渴而燥或間有惡寒者咳嗆時作涕淚俱有不時噴嚏此痧候也如是者多或七八日少或二三日氣急煩悶眼赤腮紅隨即見點矣甚者乾嘔噁心或兼泄瀉或兼吐利其點初見不多依次遞增每間數時熱較甚則氣益粗而痧點益增當其壯熱之時謂之潮潮甚者恆倦臥重者則竟譫語悶亂焉每日三五潮每潮一次則痧點增多一次潮三日則顆粒全透無微弗至毒發已淨自漸退隱矣其隱也亦以漸大約三日後顆粒平而五六日後則隱不復見當痧疹退隱之後全身表皮漸次更換甚者周身起落屑之狀輕者亦略有如粉屑之剝落此生理自然之作用無足異者至痧點透齊後有三四日不沒者或沒而遲遲者則以內有濕熱故不易回也痧子顆粒雖多少不一巨細稍異然總以鮮明紅潤者為佳粒細顆突者為佳至粒少而巨或赤紫乾燥晦暗皆火盛毒熾宜為早防若渾身夾紅色成片則為夾斑若色白則為血不足若黑色則九死一生矣且既沒之後尤須慎避風寒嚴戒勞碌忌口靜養方無餘恙否則辛辣早嗜令生驚搐鹽醋過早令咳不止雞魚早嘗令天行時即重出不避風寒令膚燥癢此皆終身為患不可不戒也四痧疹治法痧疹當未發之時未必能斷為痧疹也此時切其脈浮數襁褓兒無脈可尋則用大拇指按其腕之外側驗之聽其氣息有時微粗可與輕清表劑自無或誤蓋諸病發熱初起使非虛熱內傷之屬率從表解也惟熱有輕重表有分寸大概熱盛而渴而燥者宜乎辛涼熱不甚而煩而悶者宜乎辛散熱而挾濕濕在上者宜汗濕在下者宜佐以利水此治痧之初起也及其熱甚之後咳嗆迭作眼淚汪汪鼻流清涕不時噴嚏便知痧候宜急用透達清肺之劑庶使邪毒易泄逮至眼赤腮紅痧點隱現尤當以前法為準所以使邪毒泄而易暢也在此時期中有兼見之症不一而足膈悶懊憹者宜舒氣散結頭痛昏暈者宜辛散祛風嘔吐嘔痰者宜快氣消痰下利泄瀉者宜側重透達若大便不爽則宜涼潤微利若氣急喘滿則宜開肺泄邪此治痧之初發也至於痧子發現之後迭經透達點已出齊仍宜辛散之劑以達余蘊清涼之劑以保肺臟然清涼有不可驟下者若點稀色白宜養血助氣辛散有不可恆用者若點密色紫或暗而成片宜清血解毒至痧回之後大抵清涼之劑蕩滌餘邪虛弱者宜補益脾胃此治痧之大概也上述痧疹治法其簡易者也至於痧症有凶險者不可執一以例之甲痧疹有不能透表者一因風寒鬱遏則皮膚乾燥毛竅竦栗宜越婢湯葛根解肌湯之屬甚則氣粗喘促腹中脹痛煩擾不寧者宜越婢湯去棗重用石膏或麻杏石甘湯之類二因火毒熾盛則頭上顆粒隱隱紅紫其他各處或有或無此火毒熾則津液少以致不能暢透宜白虎湯加荊芥玄參之屬三因中氣本虛則唇色淡白二便如常雖有蘊熱無力透達宜消毒飲加木通車前茯苓使內化為主四因內熱深蓄燔灼血分雖透而不齊但見點子扁闊焮赤成塊塊上覆有小粒平塌不起亦有一片如風毒者顆粒不尖二者雖透然熱邪之逗留尚多防有他變宜竹葉石膏湯去半夏使內化為主乙痧疹有已透表而早沒者一外為風寒所遏邪反內攻而沒早者宜消毒飲加蔥頭熱服復透者吉面本紅潤而驟變蒼白宜越婢湯去棗以使復透按透而早沒邪已在肺故宣肺為急若肺邪不得泄必致喘滿二遍身青紫熱腫喘脹氣急者此毒滯血凝半匿表肌宜涼膈散去芒硝加麻黃石膏以發越之三內挾痰熱火鬱不發或腹脹喘急不省人事者宜白虎湯加玄參竹葉四身熱煩滿腹脹喘促溺澀臍突者宜涼膈散加葶藶五誤食酸收之物致伏匿壯熱喘咳煩悶者宜豬膽汁制甘草煎成續續與之使得吐或微汗為止六誤食辛溫以致喘咳聲喑者宜消毒飲加石膏馬兜鈴之屬凡痧疹出未三日而回者皆為早沒出一日或半日而沒者為凶丙痧疹有邪毒內陷者最為危候一痧疹未出之時僅見發熱未必能斷為痧也然發熱一二日忽然煩滿神昏驚搐狂妄此邪毒不易透達即防內陷之變宜清裡解表並進以治之二痧疹旋出即沒唇焦舌燥譫語謬妄此毒陷於胃也宜犀角解毒湯三痧疹搦手搖頭尋衣摸床者或鄭聲復語側身靜臥者此毒陷心也宜至寶紫雪之類或天麻羚羊犀黃之屬四痧疹似透非透氣促而喘喘而身熱隨即面紅見點者易治喘而咳者易治若喘而痰聲呼呼咳不得出喘而張口抬肩喘而無涕者皆為毒邪陷肺也裡熱甚者宜竹葉石膏湯去半夏冬日量加麻黃以發之咳不能出痰不能豁者宜蟬衣牛蒡菖蒲膽星前胡麻黃之類便艱者枳實大黃皆可酌與至喘而鼻煽為肺氣將絶鼻鼾沉睡為肺氣壅塞皆屬險候此痧疹重症之大概也五痧疹脈法痧疹屬陽邪故宜見陽脈本來陰症見陽脈者吉陽症見陰脈者危痧疹尤甚凡脈之洪浮滑數弦皆陽象也脈之細澀沉伏遲皆陰象也故痧疹脈伏使非熱極見陰即屬元氣怯弱脾胃衰敗均為危症次之即脈之細弱者雖非危證亦防變端然有不可一概而論者則其人本屬陰臟脈必一生常細或其人脾胃無甚實熱脈亦未必洪數此則當另求真象於脈外者也考普通痧疹之脈大率初起浮數繼則洪數熱方進者必見弦大胃熱有積者必見洪實至於胃家虛熱多見洪滑內有痰濕獨見滑象血分熱極數而兼促此其綱也至部位之分則右寸獨浮大者常為肺熱過甚左寸獨浮數者當防熱入包絡至於兩關寧以較實為佳左關屬肝左弦當防血熱之盛右關屬脾右弦當防積濕或胃熱之甚若言兩尺則命門與腎所屬過於洪大裡熱必盛過於細小邪毒難透均所不利惟小兒痧疹大都不全恃乎脈法然有時不得不取資憑證決疑者因録之以備一格六痧疹舌苔痧疹大都有苔其色白者屬肺熱色黃者屬胃熱黃而膩者為濕黃而糙者為濕熱純黑者為心絶黑而濕者為熱淫血分黑而燥者為熱淫氣分皆為危候驗苔之外又當驗本痧疹以舌本紅者為佳蓋亦陽證應見陽象之謂也惟紅甚變紫變黑則為火亢心絶亦屬危症至部位之分大都紅於尖者心肺熱紅於邊者肝膽熱紅於根者下焦熱若舌紅出血則急當寒涼清血舌白不紅則宜保全脾胃也七治痧須知治病用藥貴乎圓活臨證處方重乎機變況痧子一症病變繁復輕者著手固易重者到處荊棘故關於痧子之宜忌痧子之順逆不可不一一辨明俾便臨證時有所取捨也謹録如干條於下一痧疹只怕不能出若出盡則毒便解故治痧疹者當察時令寒暄以藥發之如時大寒則用桂枝葛根無汗而不易透者麻黃亦在所必用也二痧疹之發由於陽邪熱毒故已有透露之機切忌辛溫之劑考辛能助熱溫能助毒故大抵痧疹欲出之際雖寒勿用桂枝雖虛勿用參術也三痧疹小而碎少陰心火也心肺位於上心火旺則肺受之故治痧疹專以肺為主咳嗽者火炎則肺葉焦舉也鼻流清涕鼻為肺竅火逼液流也目中淚出者肺熱則移於肝肝開竅於目故熱自肝之竅泄也心熱者宜連翹心梔子心竹葉捲心燈芯之屬肝熱者菊花桑葉鉤藤龍膽之屬至於肺熱則仍以宣泄為主非熱甚或邪毒陷肺者禁用寒涼也四痧疹喜清涼痘喜溫暖然痧疹初出亦須溫暖托出是以痧疹禁居陰涼之地並忌見風五發熱六七日知是痧疹卻不見出此皮膚堅厚腠理閉密或曾有吐利乃伏也宜用麻黃湯發之六痧疹發出一日即沒者乃為風寒所沖必至毒邪內陷也此時如膚白身熱不甚者宜麻黃湯以發之如身熱煩悶或譫語悶亂則毒已內歸宜大青湯羚羊散之類以清裡七痧疹發熱吐利乃火邪內逼純是熱症不可作寒論上焦多吐黃芩湯加茅根蘆根枇杷葉下焦多利黃芩湯香連丸吐利俱作黃芩湯多加茅根蘆根八痧疹不忌瀉泄瀉為邪有出路也惟二便不利頗多凶證故治法大忌止瀉然不瀉者則不必故意使瀉以免纍及無辜也九痧疹小便赤澀在初發熱盛時是為正候熱退則小便自利若痧後見之為餘熱留戀膀胱宜導赤散以清之十痧疹得嚏最為吉兆其初起而嚏者為毒有泄路也正出時而有嚏者其候必輕沒後而有嚏者則邪毒盡解可無餘患若嚏而多涕此濁壅得泄亦為佳象至無嚏而鼻塞不通者此必有邪毒留滯不易外達宜辛涼透達為主十一痧疹吐蟲此因胃中痰熱膠固蟲無所養而上竄也能食即止痧疹下蟲此證多見於疹後因胃熱少食蟲不能安而下也但須調其飲食自愈十二痧疹方出咽喉腫痛乃毒火上蒸肺熱熏灼所致宜甘桔湯加玄參牛蒡連翹若咽喉紅腫腐爛周身斑點如錦紋者乃血分邪毒沸騰宜大劑寒涼以資挽救十三痧疹色喜通紅若淡白者心血不足色太紅或殷紫者血熱也黑色者死投犀角大青湯以冀萬一十四痧疹有汗自出者正喜其表之自解痧疹有鼻衄或齒衄自出者正喜其邪有泄路皆不可止惟得汗固佳過汗則亡陽故虛弱之人不宜過表衄固不必止然過衄耗血亦宜止之十五痧疹咳嗽連聲不斷此邪由肺泄也故方出之時咳甚最佳若透齊之後方在回沒咳甚不斷上氣喘息宜清咽滋肺湯以清肺熱咳嗽多痰者去麥冬加橘皮茯苓十六痧疹聲喑多由肺胃熱邪不能盡達於表咳甚傷咽所致治同上法若喑而咽喉腫痛者宜去麥冬玉竹加山豆根射干之屬十七痧疹發搐喉中必有痰鳴為痰熱聚於心包之證宜清熱透肌湯加栝蔞仁竹葉若無痰鳴或作搐自齧者此正虛邪陷之死症也十八痧疹唇舌破裂由心脾之火上衝所致其色必多深赤初發或正出時見此者宜白虎湯加黃芩黃連玄參荊芥薄荷之屬若沒後見此為心脾俱為毒乘死症也十九痧疹咬牙由胃熱所致故多兼作渴而手足發熱喜飲涼水宜按證酌加清胃滋肺之品若手足不熱甚至厥冷喜飲熱湯而咬牙者多為陽盛格陰之危症後必下血咽喉作痛痰鳴而死即與白虎湯亦多難救二十痧疹胸高氣促由肺熱熾盛而作脹為肺經壞症多致不治二十一痧疹不食由胃中邪熱熾盛容熱則不能更容食也不可強與雖數日不食但能少進米湯亦無大害在初發正出時宜白虎湯加荊芥痧透熱清則能食若回後不能食者宜清胃元氣萎頓者則需培補二十二痧疹身冷至為凶候蓋痧疹屬陽邪陽症見陰象是為逆證宜用透達之劑兼溫養脾胃用後發熱痧透者可治至裡熱熾盛外見陰象則宜用大劑寒涼不可不細辨之二十三痧疹世人習知不透為可危不知透後亦有危證皆由裡熱不清或邪去正傷所致故痧疹將沒不可疏忽失治二十四凡看痧疹之法多於耳後或頂上腰眼先見其頂尖而不長其形小而勻淨頭面多發胸背多發者為順四肢多而頭面不出者為逆至於襁褓中出痧點粒較少不必服藥附方一關於外治者一痧疹不透氣喘欲死者用脂麻即胡麻子五合以滾水泡之用木盆置帳中趁熱熏頭面即發二痧痘倒黶出不快者用胡荽四兩切細好酒二盞煎一二沸入胡荽再煎少時候溫每吸一大口微噴從項至足勻遍勿噴面三痧疹因觸犯霧露風寒胸膈煩悶隱現不能出者用乾象糞捲入粗糙紙內燃熏之或用干豬矢亦可四痧疹透緩小米連殼煎水乘熱熏之甚良五痧疹不透用沉香木香檀香不拘多少於大盆內焚之抱小兒於煙上熏之即起二關於內服者一預防痧疹之法用絲瓜一枚風乾歲除日新瓦面上煅灰攤地上去火氣研末以百沸湯沖服每歲如此服至三四次小兒永無痧疹之患二櫻桃四斤入瓷瓶內密封埋土中過二三月俱化為水遇痧疹不透危急者取此汁一杯略溫灌下極驗三痧疹表虛肌實不能疏透宜一味蔥白濃煎時時與之但得微汗即解四痧疹初起用茅根或蘆根煮湯時服甚妥五痧疹初起方自制治發熱煩悶口乾有淚防風薄荷象貝淡芩淡豆豉荊芥牛蒡子蟬衣連翹竹茹有汗或口渴甚者去防風加白殭蠶泄瀉者加葛根目糊多眵者加鉤鉤或桑葉驚搐啼叫者去防風加鉤鉤茯神燈心便艱者加栝蔞知母六痧疹見點方自制治痧疹見點發熱口渴咳嗽面浮腮赤小便赤澀白殭蠶牛蒡子連翹荊芥赤苓蟬衣前胡薄荷知母梔子心火舌尖燥胸煩加黃連肺火口乾咳不爽加淡芩肝火狂熱躁怒加梔子壯熱乾燥或見衄血者加玄參或鮮生地胃熱口氣加石膏痰多或嘔吐加貝母杏仁陳皮泄瀉去知母梔子加葛根挾食挾積者則改用麥芽神麯七痧疹透緩方自制治痧疹透緩咳嗽氣急舌白口乾煩悶神昏天麻前胡鬱金竹茹連翹殭蠶櫻桃核牛蒡子豆豉象貝透遲咳艱熱不甚汗不出者去天麻加麻黃熱甚口渴便艱或傍流者去天麻加麻黃石膏大便結而不下者加大黃枳實咽痛加山豆根射干或山慈菰板藍根點色紫而不顯者加赤芍八痧疹內陷方自制痧疹內陷點現復隱或紅紫成塊神昏氣促譫語悶亂羚羊角天麻知母茯神防風玄參淡芩燈芯毒盛口臭者加黃連血分熱極者去防風加大青犀角大便閉結者加酒炒大黃痰盛氣促者加膽星竹茹譫語悶亂者加至寶丹九越婢湯治痧疹不透毛竅竦栗麻黃石膏生薑甘草大棗十葛根解肌湯治麻疹初起發熱咳嗽或乍涼乍熱葛根前胡荊芥鼠黏子連翹赤芍蟬衣木通生甘草十一麻杏石甘湯治風溫表裡俱熱無汗自汗頭疼身痛身重多眠鼻鼾艱語煩悶惡熱脈浮者麻黃杏仁甘草石膏十二白虎湯治陽明證汗出渴欲飲水脈洪大浮滑不惡寒反惡熱者石膏知母甘草粳米十三消毒飲治麻疹發斑牛蒡子連翹甘草升麻山豆根紫草各等分研為細末清水煎服十四竹葉石膏湯治傷寒胃虛而熱煩渴作嘔去半夏治痧疹熱甚煩悶竹葉二把石膏一斤半夏五合人參三兩甘草二兩麥冬一升粳米五合十五涼膈散治溫病表裡實熱及心火上盛心癰膈熱中焦燥實煩躁多渴頭昏目赤面發毒熱唇焦咽燥舌腫喉閉吐血衄血頷頰結硬口舌生瘡痰實不利涕唾稠黏大小便祕諸風瘛瘲胃熱發斑譫語狂妄小兒急驚痘瘡黑陷一切臟腑積熱等證大黃芒硝連翹淡芩甘草梔子仁薄荷加竹葉一方加生石膏十六清裡解表湯自制治壯熱神昏驚搐或煩悶似痧疹不得出者大黃芒硝連翹淡芩梔子防風荊芥殭蠶蟬衣石膏麻黃胃無熱積去大黃芒硝加石膏知母虛者加白芍白朮當歸甘草其他羚羊犀角銀花黃連黃柏之類均可量症酌加十七犀角解毒湯治痧毒倒黶胃爛犀角連翹桔梗生地當歸薄荷防風黃芩甘草赤芍牛蒡荊芥川連十八至寶丹治中風卒倒中惡氣絶痰飲不語神魂恍惚頭目昏眩睡眠不安唇口乾燥傷寒譫語心肺積熱伏熱嘔吐邪氣攻心大腸風祕血氣不通寒熱交錯中熱疫毒陰陽毒山嵐瘴毒水毒蠱毒中一切物毒婦人難産悶亂胎死不下産後血暈口鼻血出惡血攻心煩躁氣喘吐逆小兒諸癇急驚心熱卒中客忤煩躁不眠風涎搐搦犀角硃砂玳瑁琥珀麝香龍腦金箔銀箔安息香犀牛黃十九紫雪丹治煩熱不解口舌生瘡狂越躁亂瘴疫毒癘一切實火閉結小兒驚癇百病解熱藥毒發石膏寒水石磁石白滑石犀角羚羊青木香沉香玄參升麻丁香甘草朴硝消石金葉二十麻黃湯治傷寒太陽病無汗身疼痛胸滿而喘及肺經咳嗽喘急胸滿風寒濕痹肺經壅滯昏亂哮吼麻黃桂枝甘草杏仁二十一大青湯治毒邪內陷大青木通玄參桔梗知母山梔升麻石膏用路東黃土末濾水煎大便閉口乾腹脹加酒大黃二十二羚羊角散治毒邪內陷羚羊角防風麥冬玄參知母黃芩牛蒡炒研各八分甘草二分加淡竹葉十片清水煎服二十三黃芩湯治熱邪下行於腸而自利黃芩甘草芍藥大棗二十四香連丸治下痢赤白白多於赤木香五錢黃連二兩共研細末陳米飯或煉蜜為丸如緑豆大二十五導赤散治心移熱於小腸小便赤澀莖中作痛熱淋不利生地五錢木通甘草梢淡竹葉各一錢研為末每服三錢二十六甘桔湯治咽喉腫痛甘草桔梗各一錢又方加山豆根玄參牛蒡子荊芥等分麥冬加倍二十七犀角大青湯治斑出大盛大熱心煩狂言悶亂不能發透犀角二錢大青錢半黑參升麻黃連黃芩黃柏梔子各一錢甘草八分無大青用青黛清水煎服二十八茅花湯治衄血防風荊芥甘草牛蒡子炒生薑茅花二十九黃連湯治多汗黃連黃柏黃芩黃耆生地歸身麥冬浮麥清水煎去渣調蒲扇灰服三十清咽滋肺湯治麻後餘熱咳嗽聲喑黑參牛蒡子荊芥玉竹貝母栝蔞根馬兜鈴桔梗麥冬各等分甘草減半清水煎服三十一清熱透肌湯治麻疹未透熱甚而咳黑參石膏牛蒡子荊芥防風前胡葛根杏仁各等分甘草減半清水煎服第二節痧證分類痧疹之種類大率如下一灌膿漿之痧疹號行漿疹子其狀頗似痘而實則不同痘必有頂盤疹雖有漿而顆粒必不堅根盤必無紅暈此由平日其人濕盛或脾胃虛弱所致若貫膿後不結痂者此元氣虧損也當大補脾胃為主不可誤認邪熱未盡而與清熱退火之劑二疹夾痘乃痧疹之中夾有痘瘡者此由毒氣太盛故一齊湧出疹以風邪外感之毒為多痘以胎毒內發之毒為多二者相雜症號難治蓋治痘宜溫治疹宜涼也然細察虛實寒熱亦有活法可求譬如虛者熱不盛而疹痘俱少者則宜參用治痘之法以托痘為主實者赤暈發焮者則宜用治疹之法或頻進化斑湯則疹毒自解而痘自起三奶疹子小兒初生未滿月忽遍身發紅點也此證由於胎中受熱又適染時行症而起故生下便發小兒臟腑嬌嫩不必服藥宜以治痧痘套方大劑與乳母飲之更令乳母避風寒忌房事食淡茹清切忌冷水瓜果雞魚炙煿酸醋五辛糖蜜香鮮之物犯之則皮毛閉塞毒氣難泄遂變黑而死如渴極欲水只與蔥白湯以滋之更有發斑一證形式與疹不同治法亦有稍異考痧疹為點形斑為片形痧疹顆粒突起視之有形摸之有物斑則一片紅紫視之有形摸之無物此斑與疹之分別也然發斑亦有焮腫者大都斑而兼痧疹其上微突者為疹其下成片者為斑也斑有陽斑陰斑之分凡其色淡者微如蚊迹者但胸背或手足間有稀少微紅之點而其人安靜者此陰斑也陰斑決不夾於痧疹之中可姑置勿論若陽斑者或由胃熱或由血沸或獨發或痧疹透後血分鬱熱亢甚亦多發斑大都以鮮明紅赤為順色紫為重色黑如煤者百無一痊也故病至發斑大忌用辛溫以助其熱勢輕者猶可用辛涼則參照治痧疹之法以治之亦可通用至於重者則概宜寒涼之劑以平其炎炎之勢或酌通瘀之劑以泄其壅塞之毒倘誤用溫劑勢必紅斑變紫紫斑成黑也此外有所謂風疹者由脾虛血熱或受風邪而作其形浮腫成片成塊愈搔愈甚宜疏氣除濕之品不可專用風藥又有癮疹由脾家蓄熱更兼風濕故隱隱發點粒似腫非腫多發癢或不仁以其隱現於肌肉故曰癮疹時或壯熱惡寒有若似疹實則非疹也宜宣發風濕主之又有痱疹即夏月痱子之極盛者其粒大如粟米皮膚盡赤多生項下夾窩內胯肥兒易患之外科書謂之暑毒宜居涼爽之處不必服藥若爪破皮易變成膿瘡宜用藥敷撲以免潰爛又有凍疹因寒冬天地之氣閉塞交春風動易襲虛人之皮毛則髮色白形如魚子之疹點惟不遍及一身周時收沒即無痕點亦宜宣發風濕主之凡此數者雖非正痧疹而有似之者故同類而共論之附方一保元加減湯治痘家虛者及行漿疹子灌膿後不結痂通常痘疹及水痘白㾦之類不可用炙黃耆三錢人參三錢炙甘草一錢肉桂五分當歸二錢白朮二錢猶有餘毒者加連翹緑豆宜升者加升麻宜利氣者加陳皮宜收者加白芍二化斑湯治毒留肺胃人參甘草知母石膏桔梗連翹升麻竹葉牛蒡地骨皮一方有玄參犀角粳米無桔梗連翹升麻竹葉牛蒡地骨皮人參體實去人參熱甚加鮮生地犀角三消風散治脾熱風濕癮疹凍疹茯苓蟬衣川芎殭蠶人參藿香防風荊芥甘草清水煎服四調中散治風疹藿香枳實砂仁甘草蒼朮茯苓陳皮青皮半夏厚朴清水煎服五苦參湯治痱疹水煎作洗湯臨洗入豬膽汁四五個苦參菖蒲六鵝黃散外用治痱疹作粉撲用緑豆粉滑石黃柏輕粉第三節痧後證治痧疹一證出時能透盡毒淨病期能確守禁忌本無所謂余恙也然人事疏忽十常七八稟賦虛弱不任疾病又比比然也故痧後余恙基於前因而起者不在少數內有四大證為害甚烈一曰痧後勞痧既收沒邪毒猶鬱於肌肉間晝夜發熱漸至發焦膚稿羸瘦如柴此因痧期誤服辛溫毒未清解或由本元虛弱餘毒留心或由過用寒涼毒未透淨均宜清火解毒之法及扶胃健脾之劑以治之遲則口鼻氣冷睡臥露睛手足厥冷搐掣必至不救即本羸瘦而遍身壯熱瘛瘲煩躁實由陰虧血耗餘毒入肝而傳心故如此治宜養血清血之劑一曰痧後疳病由余毒未盡陷入胃家或過啖炙煿毒乘火勢忽發走馬疳牙根臭爛血出頰腫環口青黑久則腮穿齒落唇缺鼻壞宜急救勿緩內治以速清胃火為主外治以散毒去腐為主如瘡色白者或瘡色黑者皆屬不治一曰痧後痢病由痧前曾作瀉痢調解未清至是變成休息痢日夜無度裡急後重此餘毒流入大腸也不論赤白總應養血行氣蓋血和而痢自止氣行而後重自除也然須分虛實實者不妨微利虛者只可調和一曰痧後咳痧後氣喘息高連聲不止甚至咳血或嗆飲食此毒歸於肺也名曰頓咳宜清肺除熱為主如胸高肩聳手擺頭搖口鼻出血面色青赤或枯白或晦暗皆不可治至於有肺氣極虛毒遏發喘不至嗆食咳血者不得純乎責之肺熱宜解毒之外兼補肺氣此四者皆為痧後重證病關生死切忌妄治而此四證之外有燒熱不退者血虛血熱也只須滋陰補血其熱自除有身熱不退嘔吐而煩者毒猶未盡留戀於肺胃間也有大便祕者餘火內結也有泄瀉者積熱移於大腸也久則必傷脾有痧退熱除不能食者胃氣弱也有耳內腫痛潰流膿水者餘毒入耳也有痧透不徹痧後餘毒阻塞靈竅或舌本謇澀不能言者或耳中轟不能聽者皆當按症施治以本症治法為君以解痧後餘毒為佐又有痧疹沒後三四日又出至五六次八九次不止者由發熱時風寒侵襲邪郁肌肉前雖藉藥發出終屬勉強故留流不散而屢發也宜照前痧疹治法治之最後總以清理肺胃為主此痧後證治之一斑也附方一痧後清理方自制治痧疹餘毒未清服之以免滋生余患桔梗連翹淡芩茯苓銀花梔子知母口乾者加天花粉咳甚者加貝母枇杷葉濕熱重者加川連苡米大腹皮寒濕重者去知母加川朴薑半夏或桂枝茵陳久咳不止者加旋覆花沙參咽痛者加牛蒡子山豆根大便實者加大黃或川連血熱者加鮮生地丹皮痰熱者加天竺黃杏仁或栝蔞皮貝母竹茹夾食加神麯麥芽陰虛火旺加玄參地骨皮胃中虛熱舌乾無苔加石斛地骨皮肝熱目赤加龍膽草甘菊小便短赤加川楝子車前子惡寒者加桂枝或紫蘇脾弱瀉利者加白朮雞肫皮失血者去桔梗加鮮生地茅根肺虛或元氣弱者加人參黃耆之類二金花丸治痧後邪毒猶鬱於肌肉間發熱便艱黃連黃柏黃芩大黃三清火消毒湯治痧後晝夜發熱漸至發焦膚稿羸瘦黃芩黃連山梔玉金龍膽草雄黃地骨皮燈芯當歸連翹川芎蘆薈使君子隨加四胃苓湯治痧後胃弱羸瘦發熱茯苓豬苓白朮澤瀉蒼朮陳皮甘草川朴或加肉桂少許五當歸養榮湯治痧後遍身壯熱瘛瘲煩躁由於陰虧血耗者當歸山梔川芎生地麥冬甘草竹葉燈芯便結加大黃六黃連安神湯治痧後當身壯熱瘛瘲黃連當歸龍膽草全蠍去毒菖蒲茯神七馬乳飲治走馬牙疳用白馬擠乳飲之八清胃湯治痧後疳牙根臭爛血出頰腫環口青黑升麻生地黃連當歸丹皮九文蛤散外用治痧後疳用米泔水洗瘡敷之雄黃枯礬蠶蛻紙灰倍用文蛤為細末十痧後痢疾方自制治痧後痢疾腹中微痛裡急後重當歸炭淡芩炭金銀花白芍鴉膽子濕重酌加川朴或川連滯下酌用檳榔大黃十一三黃湯治痧後下赤白痢滯下兼實者炒川連炒黃芩蒸大黃十二香連丸治痧後下赤白痢為調和之劑黃連一兩用吳萸五錢同炒去萸用木香三錢為丸十三痧後頓咳方自制治痧後忽一陳作咳連聲不止甚或嗆出飲食日久不愈者旋覆花包炙橘紅炙款冬北沙參萊蔔子淡芩蜜炙桑皮人參麥冬貝母枇杷葉之屬可隨證加入十四痧後耳痛方自制治痧後耳痛膿水內潰柴胡生地赤芍牛蒡子當歸連翹梔子花粉防風川芎甘草青皮清水煎服外用胭脂枯礬冰片兒茶為末吹入耳中以綿杖子拭淨膿水十五寧肺湯治痧後咳嗽清肺除熱黃芩桑葉貝母知母杏仁花粉天冬沙參枇杷葉十六麥冬清肺湯治痧後肺虛頓咳麥冬人參甘草赤芍桔梗陳皮檳榔赤苓按方中赤芍可改白芍桔梗咳甚者可不用應易旋覆花發熱微渴者加連翹十七四物湯治痧後血虛血熱方見第三章第五節渴加麥冬犀角咳加栝蔞霜痰加貝母陳皮忌參朮半夏十八四苓散治熱移大腸新瀉熱瀉茯苓豬苓澤瀉蒼朮炙甘草一方有陳皮無蒼朮甘草久瀉傷脾酌加木香砂仁訶子肉豆蔻十九痧後靈竅阻塞方自制治痧後靈竅阻滯或舌謇或耳聾等證干菖蒲蟬衣連翹心桑枝白殭蠶竹葉心其他如全蠍穿山甲膽星礞石龍膽草麝香龍腦硃砂之類可酌加之第四節痘證概要一痘證起源昔人云太古無痘周末秦初乃有之是知古時天地之氣中和人間嗜欲淡薄故疾病稀少並痘證而無之也逮後世變日亟刀兵水旱之結果胥足以釀時氣疫癘而人生嗜欲日增更足以薄元氣藏內邪兩者相因病變遂日以繁而痘證亦其一也考痘證之原由於先天蓋當成胎之時父母欲火之遺毒蘊藏於胎兒骨髓深處觸於歲時流行之毒即感之而外發是以母體受胎教者即有痘發多屬易治而孕期縱欲無度者每逢小兒出痘最易夭亡也然古時之痘多為併發性蓋既有內蘊之毒復增時氣之毒二者相合其病必劇是以後世發明種痘之法其宗旨要在逗先天之毒外出務使其不與時行之毒併合觸發所以減輕其病意至善也其法系取痘苗塞入鼻中以鼻為肺竅使苗氣內達數日後其氣由肺傳心心主血脈由心傳脾脾主肌肉由脾傳肝肝主筋由肝傳腎腎主骨髓至傳腎後引動先天所伏之毒其蘊遂逐漸透露由腎而肝而脾而心而肺以迄於痘點發現是為種痘所以別於感時氣而觸發之天花也自種痘之法發明後病者全活較多風行甚久咸稱便利然猶有未能滿人意者則種痘者發痘之時毒雖較輕而周身密布則與天花相似也體弱者不易起脹或起脹後不易灌漿治法亦多周折且風寒謹避百日將息亦覺多纍而灌漿期中偶有不慎仍有成面麻之患故此法遂又漸有淘汰之傾向適於是時西法牛苗傳入中土用以引痘其出也僅發痘於所種之處發痘之時絶無危險且忌口而外又無其他繁重之禁忌以故人人樂用推行世界至今世界天花一證絶少發生不可謂非牛痘苗之功也二痘證病理痘證之發既為人身宣泄邪毒之路故其發也由內達外與痧疹同其有不同者則痧疹之伏毒較淺痘症之伏毒深藏骨髓而發動於腎也惟其發動於腎故恆牽涉於腎間之元陽元陽虧者其痘不獲烘托之力常致痘出不快陷為逆症此所以有痧喜清涼痘喜溫暖之説然邪毒熾盛劫陰耗液又莫此為甚故痘症號稱難治以其下藥寒溫兩有不易也且痘之出既始於腎而終於肺則全身傳遍殆莫不有關於是治痘又最重時期依時消息表散清涼溫化尤須變化於瞬息之間方為能治痘者此痘證之變有如此者故歷代醫家莫不以弭痘為亟逮近世牛痘之法發明而弭痘之法不可謂非告一成功矣然或以痘為小兒大證當天行時人人避之尚恐不亟今無故而與之庸非自擾不知牛痘之妙正在於無故而與之譬如捕盜乘其羽翼未成而擒之固不難也譬如去莠及其滋蔓未延而除之固甚易也故天痘之患正在毒發遲而禍甚牛痘之輕正在毒發早而禍淺也又牛痘引種大都在兩臂兩脛頗具至理蓋兩臂乃手少陽之經脈兩脛乃足少陽之經脈少陽主樞引苗氣內達莫捷於此及其毒從內泄引挈而出亦莫捷乎此故牛痘自始至終不過旬余也然自盛行種痘之後亦有已種而仍發天花者此由伏毒泄而未盡與未種痘而發之天花不同且病邪出路仍遵向日之徑則其發泄較易無須仗乎烘托理至淺顯故治法要宜以少偏清涼或辛散為主溫補在所不宜也治痘之法至今為之一變此不可不知者也三痘證症狀痘症之發其初亦並無何等顯著之兆比其將出始則微有惡寒或身熱或身熱咳嗆至是須驗其是否耳冷鼻尖冷尻冷足冷如冷者是痘候也再驗其耳後有紅絲赤縷突出脈洪大而弦數則痘將報點矣痘之初起先見紅點數日報點初報點時常先於胸窩見紅色粒子或面部見紅色粒子兩顴之間現出花紋耳尻與中指獨冷斯皆痘瘡之特徵也其他若眼目困倦有水狀或睛黃或胞赤睡則常驚惕小便赤大便閉此皆痘瘡所恆有之見證其得之也或以時氣之感染或由傷風或由飲食嘔吐或由跌撲驚恐為其誘因此痘證初起之大概也痘症初起約三四日或五六日而報點又二三日或三四日而起脹起脹者顆粒次第湧高根腳與皮膚之界發為腫狀蓋為灌漿之預備也漿灌三日毒已盡化至此時期即結靨而漸愈此痘證經過之大概也然痘證有輕重勢有險順且隨期變易不可捉摸往往發熱時順而報點時轉險者或報點時順而起脹時轉險者或起脹時順而膿漿忽不灌因以轉險者或經過皆順而結靨時轉險者是在臨證之隨時變化焉大凡發熱之候熱而非如灼如焚或惡寒戰栗二便如常飲食能進氣息微粗而不喘腰腹不痛者此順症也若壯熱灼手氣逆而喘譫語悶亂腹脹便祕或惡寒微熱大便溏泄食少神疲此重症也至發熱而肌膚焦燥口氣穢惡喘急音啞或面青搖頭吐食戴眼點來隱現則為危症報點之候點粒根窠紅潤頂尖礙手頭面稀少肢體朗布身熱而微涼涼而又熱二便調勻此順症也若見點色淡或紅點如丹身熱如烙或頭白似㾦根窠不紅頭尖皮薄腹痛腰痛大便泄利者此重症也至點粒一齊擁出鮮紅繁密或瘡色慘暗毛焦皮燥或多見於眼胞唇內前後陰或多見於舌喉胸背者或肌肉如被杖昏睡不食者則為危症起脹之候身熱作潮逐漸起脹頭圓根紅光澤綻實見此現象易於灌漿此順症也若到起脹之候身涼不熱隱而不易起皮薄而亮根腳不紅或泄瀉或微癢此重症也至起脹色白皮薄光潤易破根窠全無紅色或熱甚痘色紫黑壅而不起或面浮肉腫而痘不起者則為危證灌漿之候起脹之極隨即灌漿中陷者盡起頂平者盡峻飽滿光榮先脹者先作漿次脹者次作漿循循有序色如黃豆二便如常四肢溫和此順症也若根窠紅而不潤灌漿不滿大便泄瀉或稠密焦紫不起頂者或灌漿時忽作痰喘者或煩躁不得眠者此重症也至灌漿時內含清水或乾枯退縮根窠瘀紫或身灌而頭面不灌咳嗆喘急大便或泄或閉則為危證結靨之候痘漿灌足之後其色漸變蒼老先從人中面部次第結靨漸至胸腹兩腿身無大熱亦不畏寒飲食增加二便通調此順症也若身重發熱不易結靨或結靨如血色或潰爛難收或寒戰抽搐者則為危證此辨痘證順逆之大概也至於痘證愈後元氣必然虧損允當以調補為急而痘期之禁忌較痧疹尤煩略有疏忽變端即起此皆不可不知故並於後附述之焉近時引種之牛痘症狀頗為平淡種後一二日局部略見紅腫以後逐漸高脹灌漿約至第十日左右而膿漿灌足此後漸次乾燥收靨至第二十日左右而痂落在經過期中發熱有盛有不盛然至多不過一星期而已小兒自第六個月至第十個月為種痘最適宜之期以後三年一種五年一種均無不可惟種痘期內所應注意者局部宜清潔不可任其破潰而忌口多日尤為必要蓋一則免破爛成瘡二則免痘後餘毒不清以致無效也四痘證治法痘證於初起一二日發熱時宜解表使痘易出三四五日清涼解毒使痘易長六七八九日溫補氣血使易灌漿十及十一二日清利收斂使痘易靨此治痘之常法也然亦有先期而速或後期而遲者不可執一而論先期則痘出甚速無須藉乎狂表後期則起脹灌漿遲遲正有賴於透托又痘未盡出不可清涼因痘得寒將有凝滯之患熱毒未盡解不可溫補因毒得溫將有蘊蓄不能化漿之慮大抵痘證面紅者吉身溫者吉大便堅者吉神志清明者吉倘屬順症自可不必多藥初起只須微表點粒即逐漸透達疏朗分布繼則漸次起脹只須略用清化內毒易解起脹必足逮漿灌充盈正無須藉乎溫補若微覺低陷則補托即起至痘證面色不紅或青或白身熱不揚大便溏薄又或面赤如火身熱如灼大便不通神明狂亂皆為重症大約面白便溏當斟酌於溫補發散之間面赤便難當斟酌於攻下清血之間此治痘之大概也上述痘證治法其簡易者也至於痘證之變化獨多尤甚於痧不可不另為條敘之甲初起之變化初起發熱其熱乍進乍退者身溫微熱者自屬順證若一驟發壯熱悶亂狂躁一熱便見紅點者必由毒盛大便堅者宜涼膈散下之大便溏者宜辛涼辛溫合濟之二發熱時肢體骨節俱痛者此感六淫之邪也宜表散兼透毒之劑三發熱時遍身作癢者此表虛客冒風寒毒不能出宜桂枝湯加黃耆防風白芷蟬蛻四發熱時惡寒身振振動搖者此氣弱不能逼邪外出邪正交爭故振也宜升麻湯加人參穿山甲桂枝防風五發熱時腹痛攻擾躁渴者此毒勢壅遏熱氣內蒸宜蜜調玄明粉下四五錢或涼膈散下之大便一利即痛減痘發六發熱時腰痛者最為重候蓋痘證其邪由里達表為吉此為邪逆於裡也宜急用石膏六七錢人參一錢茶葉一撮煎好入玄明粉三五錢加生白蜜熱服或可救或用百祥丸若虛而腰微痛者不在此例七發熱時或吐或瀉此毒邪奔越分泄也若精神不減為吉吐瀉即止為吉若見點後猶吐瀉不止宜四苓散加枳殼橘皮山楂虛者宜異功散加藿香木通八發熱時唇口上下紫黑燥裂疼痛者此毒攻脾臟宜急投犀角消毒飲加石膏玄參九發熱時咬牙竄視者此心經熱甚也宜導赤散加黃連赤芍若咬牙悶瞀為肝經風熱宜羌活湯加青皮柴胡十發熱時聲音變易者宜消毒飲加連翹桔梗咽喉痛者甘桔湯加牛蒡子十一發熱時小便黃赤短澀者此熱毒不透滲入膀胱也宜導赤散加荊芥連翹牛蒡子十二發熱時衄血者邪從衄解也若血不止宜犀角地黃湯十三身不熱者宜審其兼證是虛是實熱深厥冷者宜大寒之劑氣弱邪不能透而身不熱者宜補中益氣湯保元湯之類十四發熱一日遍身即現紅點稠密如蠶種摸過不礙手者不治頭面一片紅如胭脂者遍身有成紅塊者皆不治十五發熱時即煩悶嘔吐舌下常流清水或時沉默喜睡或時躁擾不寧或腹痛狐疑頻頻叫喚須驗其舌下青筋或下唇有黑白細點者此屬蟲宜先與椒梅丸誘入蟲口即以紫草承氣湯下之十六發熱時痰喘氣急或目閉神昏眩暈顛仆悶亂搐搦者此屬痰宜大黃甘草湯使上吐下瀉以滌其痰乙報點至起脹之變化點紅而稀頂尖而礙手脹則頭圓根紅光澤綻實自屬順症若一痘初發熱即報點如丹身熱如烙漸至乾焦紫黑煩躁悶亂唇焦口臭者雖在冬月亦須大劑白虎化斑湯石膏非數兩不應二身無大熱見點細如白㾦氣怯無力目閉無神面色及口唇反鮮澤嬌豔光彩倍常此氣虛無陽肺胃之精華渙散於外宜重用人參二三兩生耆兩許以升麻五味續續灌下或保元湯加減三痘疹腹痛多屬食積宜透表之中佐以消積若腹脹泄瀉不可驟止又不可任其多瀉只宜和之四雜痘一齊湧出者水楊柳桃枝槐枝各三條同紫背浮萍煮湯遍洗即出痘毒而正痘現五痘瘡紅紫干滯黑陷焦枯者此表熱而實大便祕結小便赤澀身熱鼻乾唇燥煩渴者此裡熱而實治宜涼血解毒用紫草紅花連翹牛蒡木通蟬蛻荊芥或芩連之屬如表熱者則宜清涼解表而分利次之裡熱者重於解毒而兼清涼六痘證見點三四日隱於肌膚不長髮者此氣血虛也宜快斑湯或透肌散催之至身面俱起四肢不能起發者宜桂枝湯加防風黃耆七痘雖長起而顏色淡白頂陷者此氣虛也宜參耆內托散加糯米若雖不白亦不紅活而頂陷者此血虛也宜四物合保元湯起脹遲遲漿清不滿者宜獨參湯八色赤而兼癢血虛有熱也宜四物湯去生地加犀角連翹九痘頂色白連肉紅腫而痘反不腫此毒不能灌注於痘也宜急用化毒湯加生地川芎調二寶散救之十色紅根散不長髮者此血熱而氣不相依宜大鼠黏子湯加紫草十一熱證方形虛證又現元氣本來虛弱而毒氣猛烈以致痘出不快狂言亂語音既礙用清涼之藥以解毒又恐犯溫補以助火此為最難措手之候可急用雄雞一隻生剖開腹去腸雜以燒酒噴之敷於臍上其痘自出其語亦止若遍身疼痛者此毒出腎經用黑大豆一升煮熟擂敷腰上即止此外治之效方也丙灌漿之變化膿漿充足由面部起先後作灌痘中有飽滿光榮之狀自屬順症若一稠密焦不起頂者此血熱毒盛也當視其皮之厚薄皮厚者宜化毒湯加連翹玄參煩渴便祕犀角地黃湯若皮薄如水疱必有癢塌黑陷之變毒盛者宜辛涼合寒涼解毒之法消息之虛者頂白宜參耆內托散加當歸芍藥使血活氣行自可轉紅二氣虛之證用內托補劑暫起灌漿未滿而復平塌者宜用大劑保元湯加川芎當歸木香官桂糯米漿色淡白食少便溏者同三頭面稠密身上稀少色白不能起頂灌漿者宜參耆內托散若藥力在上先頭面漿滿四肢不灌者宜前方加糯米芍藥以牛膝下引至足四咽中有瘡灌漿時瘡瘢新嫩觸之即痛痂皮沾滯痰涎纏裹飲食難入或嗆水嘔谷者宜甘桔湯加牛蒡子天花粉頻頻飲之語言清亮者可治聲啞語言不出者難治五灌漿時喜笑不止者此心包熱甚也宜保元湯加人中黃黃連六灌漿時忽然倒黶或血熱毒盛不能起脹伏陷喘脹便祕者宜攻毒湯七灌漿時發熱自汗者若二便不通脈沉滑數疾此熱毒內郁宜承氣湯酌去芒硝若手足厥冷自利嘔吐脈沉細微弱或浮大而虛此陽氣欲脫宜理中湯加熟附子八灌漿時痛不止者此氣滯也宜保元湯加山楂木香若痘色朗綻而兩臂腫痛者宜前方加桂枝羌活防風當歸忍冬犀角連翹九灌漿時癢塌不止者此血熱也宜四聖散加生地干首烏以涼其血破者以白龍散敷之十痘瘡抓破其人能食大便堅抓破之處復灌成漿原無痘處續出大小不等者可治宜內用十全大補湯苦參丸間服外以滅瘢救苦散合百花膏塗之十一灌漿時干空無水者此氣虛伏陷也宜補中益氣湯若人事清爽飲食如常可起若喘脹噦煩悶外剝者不治十二痘本稠密色淡灌漿時昏睡妄語者此血虛神無所依也宜保元湯加當歸地黃茯神棗仁麥冬十三灌漿時身發壯熱者渴欲飲水者此瘡多毒盛表裡氣血俱虛之故宜加味四聖散去木香加當歸芍藥亦有漿半足而熱甚煩渴引飲不已者此津液外布而肺胃枯涸也宜大劑保元湯合生脈散頻進漿滿則渴自止十四灌漿時而泄瀉者最為危候蓋病久津液已衰脾胃已弱再患泄瀉則僅存之氣重竭於內方張之毒難化於外必生變症宜急用人參白朮散去葛根加木香官桂黃耆不應則用不二散十五灌漿已成並無陷伏忽然腹痛煩躁喘促此必傷食或腹有燥屎宜按證治之丁結黶之變化結黶之後只須慎寒暖慎飲食初無重大之變化其有劇變者一必由灌漿後觸犯穢惡或誤服藥餌如倒黶黑焦身熱似灼概宜五福化毒丹加減二結黶時潰爛者此毒當發而發遲致毒蓄肌肉或未當發散而發散早致毒邪暴出故肌肉熏灼腐爛甚至內氣並虛滑泄自利宜急用木香散或白朮丸以治里外以白螺散或白龍散加麝少許敷之三痘漿清而忽然乾黑或未成痂者潰爛已成痂者只是嫩皮此為倒黶若當黶不黶復入於裡元氣素弱不食自利者宜木香散異功散之屬如大便久祕忽然腹脹喘呼此毒盛薄蝕元氣復入於裡宜急下之用排毒湯四將黶之時熱不止而脈滑數者痘未盡也宜托裡快斑湯服後再出贈痘其熱自除五結痂乾厚忽然寒戰乾嘔煩渴者此正氣將復不能禁持之故宜生脈散六結黶太遲為虛黶黑太過為熱俱宜按證治之以上所述為痘證四大時期變化之大概也五痘證脈法痘證屬陽邪故宜見陽脈與痧疹同凡小兒七歲以上五至為平七歲以下六至為平過則為數邪氣實也不及為遲正氣虛也人迎緊者外感為多氣口數者內傷為多浮而數者為表熱沉而緊者為裡熱浮而遲為氣衰沉而細元氣微惟無論沉浮能略帶洪實者終吉弱而無力者終凶此其綱也至時期之分大都自發熱以迄起脹毒從內出其脈宜浮大而數不宜沉細而遲既黶之後毒從外解其脈宜和緩而不宜洪數但要和平有神切忌虛大無力若見浮而無根數如雀啄細而欲散縈縈如蛛絲索索無胃氣遲而欲絶滴滴如屋漏沉而時見如魚躍者皆死候也又六部之外有衝陽脈者胃脈也太溪脈者腎脈也胃為後天之主腎為先天之根故痘證以此二脈為最關緊要二者之中以太溪為尤重倘病至六部無脈生死難辨宜急診此脈若悠悠不斷不急此元氣尚在猶或可活若二脈先絶縱六脈猶存亦為凶候此痘證脈法之大概也六痘證舌苔痘證大都有苔與痧疹同大約自發熱以至報點皆為白嫩之苔或白厚之苔自起脹以至灌漿皆為黃嫩之苔或黃糙之苔然有不盡然者或一起即白苔迄灌漿止而無甚變化如痘證雖發熱而能食二便照常縱白苔稍厚黃苔稍干皆非重證殊不必因苔而濫施補托或猛用克伐也至苔見干黃氣息粗盛或見焦黃其質深絳則氣鬱血熱雖欲疏達必參辛涼雖欲提托必寓滋陰又有舌忽脹大者總由心火胃熱舌喑者風痰為患舌生芒刺急宜涼下重舌木舌弄舌者總宜視舌之紅絳一以敗毒清熱為治俱宜慎用辛溫以防劫津也有舌縮者宜分寒熱熱者刺破舌尖血多紅紫而流利寒者刺破舌尖血多紫暗而似凝惟痘證舌縮總以熱為多至若灰苔或由寒濕內積或由內傷火衰報點以迄起脹見此大率熱勢不盛必以補托為先祛濕為後若黑苔則無論發熱以至結痂見此皆為危候也七治痘須知痘證變端瞬息不同較痧疹尤為復雜上列審證之法雖見一斑然宜忌順逆猶未詳盡特再採諸家之説節録若干條於下一痘證發熱體實者慮其邪盛而不易報點體虛者慮其氣弱而不易報點然報點之後經過有起脹灌漿結黶三時期每期亦均有變端之可能危症或可起於頃刻故治痘用藥貴在隨時消息朝夕不同不足為異不若痧證透後絶少危症也二視痘吉凶全在形色當其報點之後顆粒逐漸顯明尖圓堅厚者吉也起脹之形發榮滋長者吉也灌漿之形飽滿充足者吉也結黶之形斂束完固者吉也若初出空如蠶種或密似針頭起脹黏聚模糊肌肉虛浮灌漿形色暗晦或清薄或乾枯結黶枯朽剝蝕或焦黑或散漫者皆為凶也三痘證形色之辨固為重要然形色相較色尤重於形寧可有色無形不可有形無色蓋形屬乎氣氣可旺於斯須色屬乎血補血難圖速效故察痘之色宜以光明紅活為上乘若形平塌而色紅活證雖劇必有可治若色晦滯而形光圓證雖輕必尚有可慮也又以面部之形色言痘證面赤者多吉面青者多凶也四痘證吉凶又可驗之於部位大抵從正額及兩顴先見者多順人中口鼻先見者多險一説口鼻年壽先見兩三點者為順若未見點而口唇目胞預為浮腫者亦險至報點起脹之時頭面漸次浮腫者此毒氣發越欲作膿血也如瘡尖而圓磊落紅活者亦屬順證又可驗之於耳紋耳紋以少為順條勻直上者順分枝纏繞者凶若橫過髮際者多屬危證耳紋之色以水紅色者為順淡紅色者次之大紅色者為火甚紫黑青色者多屬危證五痘證吉凶又當驗之於老嫩痘證自始至終喜老而惡嫩蒼淳者色之老也肥實者形之老也濃厚者漿之老也厚堅者黶之老也嬌豔者色之嫩也浮虛者形之嫩也稀清者漿之嫩也薄軟者黶之嫩也總之老者多順而易於成功嫩者多險而難於施治六痘證吉凶又可辨之於疏密密者多凶疏者多吉然疏者若譫妄大熱唇舌燥裂煩躁不寧大小便祕此毒壅不出陽邪遏於裡雖疏未得為吉密者若鋪排磊落大小勻淨眠食皆安二便如常或密於手足雖密亦未足為害也七痘證身痛者多屬重證或由熱毒內作或由血虛不能營養大抵初發時即痛者為血氣凝滯毒壅而作痛也灌漿時忽痛者為血虛熱盛不能勝邪也收黶後忽痛者為血液枯燥餘邪未淨也至於痘瘡上作痛在灌漿未成之前由毒氣變化未成鬱而作痛此其常也毒化膿成其痛自己若肉如刀割膚如錐刺叫號不寧者則皮傷肉敗多屬危症八痘證發熱最忌腰痛腰痛失治易致不能起脹或起脹後旋即黑陷故腰痛較身痛尤為劇證大抵痘未出而驟熱腰痛者此腎臟火毒熾盛也宜急用百祥丸或水調玄明粉以下奪其毒勢發熱時腰痛者宜羌活當歸湯或人參敗毒散斟酌進之痘出胸腰疼痛叫喚不寧者宜用豆豉三兩胡椒一錢共搗爛又將生薑四兩搗汁調勻炒溫敷痛處以定其痛勢至腰痛時腰下見紫黑成片如蚤齧者為腎壞不治之絶症九痘證腹痛多由熱毒或食積所致然亦當分察虛實與時期大概痘未出而腹痛者若發熱煩躁作渴飲冷大便堅實者此熱毒壅滯宜用疏利之品若腹中有塊者此氣滯也宜用運化兼發散之品痘乍出乍隱而腹痛者此伏毒也痘未出盡便祕而痛者此燥屎與毒相併也俱宜七物升麻湯痛時身不甚熱口不作渴時或發寒時或嘔吐腸鳴自利六脈虛細面青手足冷者此脾胃虛寒也宜黃耆建中湯加木香青皮痘已出盡而腹痛者氣已虛而血仍熱宜以紫草飲發之至靨後發熱糞黑腹痛者此蓄血也宜犀角地黃湯清利之毒氣瀰漫便血日夜無度腹痛啼哭者宜牛黃湯解之如見氣粗口臭唇舌青白身發戰動而痛者此毒歸臟腑胃爛成膿或發熱時心腹絞痛脹滿疼痛其痘陷伏者均為毒惡之氣攻刺腸胃之危證法在不治十痘證腹脹多由毒郁腸胃若胃中伏熱小便赤澀而脹者宜導赤散加滑石紫草面黃煩躁小便利大便黑者為瘀血在黑宜犀角地黃湯加穿山甲若痘乾紫而脹不大便者為血熱毒盛宜紫草承氣湯至腹脹而大便利者半屬虛脹切忌克伐凡痘證腹脹口中如爛肉臭者或當起發之時倒陷而腹脹者皆為不治十一痘證腸鳴失氣皆屬危候蓋腸鳴為胃敗而中氣下陷失氣為脾敗而穀氣下脫痘瘡見此則生養之氣俱慮不足也亟宜大補中氣而佐以升提或可挽救十二痘證溺血痛者易治不痛者難治此證因蓄毒蘊於心經心失其主血隨毒激故奔散妄馳法當清心解毒酌用導赤散切忌升麻黃耆之屬若小便澀結血條如棉線欲尿則號哭痛不可忍者急用炒山梔末青龍鬚草汁調服再以木通湯飲之自愈若黑如豆汁者法在不治十三痘證泄瀉常虞氣陷故恆較痧疹之泄瀉為可慮大抵痘未出而先瀉者此邪並於里腸胃熱甚而傳化失常宜清熱解毒即痘出一二日而瀉者亦為挾熱只宜疏托不必止瀉痘已出齊而瀉者此邪並於表正氣方逐邪氣故不能運化水穀法宜補氣若四五朝後泄瀉數行痘色頓減者宜升發之痘起脹時驟瀉不止危在旦夕者宜異功散不應急用豆蔻丸或白朮散以止之若熱毒作瀉必有熱之見證宜加味四苓散九十朝後已結黶而作瀉者宜解毒調中使餘毒自下傳導而出不宜收澀以免後患總之痘證泄瀉仍以察形色為主若漿色不正根盤不化血散不斂此毒在內宜重透托若漿色頗正根線緊繞者雖瀉無礙惟瀉之次數不宜過多日瀉一二次者不可輕止日瀉十數次者亦不可不慮也十四痘證痢疾多因濕熱鬱於腸胃氣血受傷所致若不速治則外膿內痢表裡俱虛元氣易陷變成重症急宜治痘為主兼用參耆補托惟實症腹痛滯下者則不妨微利之十五痘證發癢其候不同有初發時便爬搔不停者此邪氣欲出皮膚閉密其火遊移往來灼膚而癢非惡候也宜升發之使皮膚縱緩腠理開通邪氣得泄則瘡出而癢去有痘將收斂而癢者此時其膿已成邪氣散而正氣復營衛和暢致令身癢亦非惡候宜謹護之勿令搔破復潰破者以白龍散或敗草散敷之其有起脹灌漿血已化水水未成膿之時其毒未化而渾身搔癢不寧者此為惡候宜急按症狀施治大抵氣虛者能作癢血熱者亦能作癢須視其痘色紫赤飲食能進而痘形充足者則屬血熱治宜涼血解毒如色不紅活乳食不進痘形不足者此屬虛寒治宜溫補此又治癢之大法也十六痘瘡倒陷有毒陷血陷黑陷白陷灰陷頂陷之別寒熱各異虛實迥殊宜詳為辨別之十七痘證禁條繁多尤忌觸穢蓋人身榮衛遇香則通行觸穢則凝滯痘瘡一證既全賴氣血和暢方易成功若榮衛凝滯則熱毒無由發泄必至變證百出即過於芳香亦能走竄元氣均不可犯如四五朝痘犯穢惡變成焦紫倏時喘急者宜取嫩絲瓜皮蒂焙研為末蜜調服下以通利解穢色變灰白爬癢難忍者宜附子黃耆煎服以溫暖烘托觸犯香類痘頂焦黑奇癢者宜用升麻蒼耳子濃煎浴之酌用生地防風蟬蛻當歸白芍人參黃耆赤豆紅花橘皮甘草之屬水煎服觸犯尸氣痘瘡陷伏口中吐沫者急用芫荽大棗熟艾燒煙燻之並用芫荽生薑酒煮汁入辰砂少許調服其他如月經房室葷腥油氣以及漆氣煙氣鑼鈸金鎮生人六畜等俱在禁忌之類十八痘證預防諸穢宜用棗子燒煙燻之既可解不正之氣更能榮衛和暢開胃進食如為房室經水生産諸穢所犯者但頻燒自解若防發癢則以樺皮相和燒之為酒厭者則以葛根茵陳燒煙解之為五辛厭者則以生薑燒煙解之為尸氣及癘氣所犯者則以大黃蒼朮燒煙解之為狐犬牲畜厭者則燒楓球解之又總解諸穢以乳香燒煙燻之以胡荽酒噴之十九痘證有成膿而潰爛者因痘出太甚皮膚不固膿汁淋漓疼痛不已不可著席者宜臥芭蕉葉上用敗草散貼之或白龍散裹帛撲之痘出已定而膿汁淋漓不能幹斂大便不通者宜牛黃丹利之若膿血雜流者宜百花膏生肌散之屬黶後患此為餘毒失於解利宜消毒散痂久不落者用百花膏夏月痘爛生蟲及為諸蟲咬傷臭惡不可近者宜蟬花散外用生寒水石細末乾摻之至有焮裂出血者大便不通宜四順清涼飲小便如血宜犀角地黃湯總之潰爛出血皆為有餘之火所致身必發熱惡寒者則絶少也二十痘證瘡色黑陷多由邪火太熾真水枯涸所致宜奪命五毒丹一字金丹外用胭脂蘸拭瘡上痘初出時毒盛攢聚成片形色黑潰者急用針刺破吮去黑血以四聖散塗之毒壅心者用玳瑁水磨濃汁一盒入獖豬心血一皂子大以紫草濃煎湯作一次服之總之痘瘡黑陷實者可酌用承氣湯虛者可酌用十全大補湯均外用胡荽酒噴衣或用水楊煎湯浴之二十一痘瘡毒火有上走空竅者則痘瘡入目在白睛上者不必治久當自去在黑輪上者宜急治之初見點時有痘叢生目中者急用移痘丹移之若痘已入目宜用決明散目生翳者宜用撥雲散目紅腫者宜用細茶葉緑豆銀花三味口嚼敷之目痛者宜用翳子草搗爛左眼痛塞右鼻孔右眼痛塞左鼻孔至痘瘡出多達灌漿時自然眼閉不開若干黶後仍不開者此毒氣上攻於目急宜清解甚者涼隔散加荊芥牛蒡蟬衣以下之至痘證有目睛上釣者在七日以內者多難救治七日以後可十全六七也二十二痘證毒火有上蒸於肺以致喉頭結痘失音者宜射干鼠黏子湯黶後餘毒猶盛上攻咽喉致腫痛乾澀聲音不出者宜甘露飲痘生鼻孔先用皂角末吹入再用黃蠟塞之或用硼砂檀香共為末吹之痘生舌上用硼砂兒茶人中白焙過共為末摻之二十三痘證陰陽之辨最宜體察入微凡痘屬陰寒者身肢不熱口鼻皆冷面唇溺尿爪甲俱色現青白厥利冷不臭痘色灰白根腳無紅暈者是也凡痘屬陽熱者身必壯熱面唇皆赤口乾好飲神氣昏憒吐血衄血痘色紫黑焮赤枯焦者是也至陽極似陰則惡寒戰栗必有氣臭煩躁便祕等熱象可尋而陰極似陽則面紅氣浮而必有痘色嬌淡口氣清冷等寒象可求也二十四痘證治法宜有標本先後之分瘡出稠密由於氣不勻血不周者則當活血勻氣兼行解毒及利久不止漸成壞症者當以救里發表兼進此標本兼治之法也氣血充實但瘡壅而不易出者則專以托裡解毒為主瘡勢太盛咽喉腫痛者則專以清利咽喉為主大小便祕煩躁喘呼者則專以利下為主瘡勢太甚自利頻數不止者則單治自利為主此急則治標之法也瘡已起發而氣不足者即補其氣血不足者即補其血此緩則治本之法也瘡勢太甚煩渴不止者則以解毒為主而兼治其渴此先本後標之法也痘陷泄瀉則先救其里後攻其表此先標後本之法也以上各條能擴而充之治法自井然不紊矣附方甲關於外治者一痧痘倒黶出不快者用胡荽酒噴法見前或用水楊枝煎湯並可止痛二痘瘡欲出之時預防入目用黃柏膏黃柏一兩緑豆粉紅花各二兩甘草四兩研為細末生油調膏塗眼四周神妙或用胭脂取汁塗眼四周目紅腫者用金銀花胭脂人乳汁取燈芯蘸點之生翳者硼砂為末燈芯蘸點之三痘生前陰者用鴨涎沫之男子用公鴨嗄氣數次即消女人用雄黃研末清油攪勻鴨毛蘸擦之四痘證癢塌用川椒艾葉紅棗去核芫荽茵陳乳香白芷梢陳香櫞安息香各二錢共為細末作紙燃熏照雖癢塌之痘火到癢除或用荊芥穗為末撒紙上捲成筒糊黏紙頭熏照癢處略燒癢處亦佳五痘瘡癢破結黶痂不易落者宜淡蜜水調滑石末以雞羽掃瘡上其痂易落且無瘢痕痘將結黶乾硬而痛者宜以酥揩抹之或豬脂熬膏塗之六白龍散用水牛糞曬乾燒枯存性搽患處治痘破損及痘後餘毒又用枯白礬黃丹龍骨各五錢麝香一錢研為極細末治膿耳聤耳先用棉杖子拭盡膿水然後摻入勿令風入七白螺散治痘濕不收用陳年土牆內白螺殼不拘多少去土洗淨火煅赤取出存性研為末乾摻之八百花膏落痘瘡痂用石蜜不拘多少略用湯和時時以鵝翎刷之九滅瘢救苦散滅瘢痕用蜜他僧滑石各二兩白芷五錢研為細末濕則乾摻干則白蜜調敷十敗草散解痘瘡毒用多年屋上爛茅草或牆上爛草不拘多少擇淨者磨為末摻之十一吹口散治口疳牙疳及痘生口內用青黛黃連孩兒茶冰片研為末吹之十二除夕黃昏時用大烏魚即鱧魚一尾小者二三尾煮湯浴兒循身俱到不可嫌腥後以清水洗去可免痘患乙關於內服者一預防痘症之法宜服三豆湯或辰砂散或代天宣化丸則痘毒自輕將來雖出自亦易起易收無陷伏郁遏流連之患三豆湯預防痘瘡並治痘後癰毒紅腫赤小豆黑大豆緑豆各一升甘草三兩生銼先將三豆淘淨同甘草用水或雪水八升煮豆熟為度去甘草將豆曬乾入汁再浸再曬汁盡為度逐日取豆水煮任意食之辰砂散辰砂一錢絲瓜三寸近蒂連子燒灰存性研為末蜜水調下或以紫草甘草湯調服預防痘瘡多者可少少者可免代天宣化丸人中黃甲己年為君黃芩乙庚年為君黃柏丙辛年為君梔子仁丁壬年為君黃連戊癸年為君苦參佐荊芥穗佐防風佐連翹酒洗佐山豆根佐牛蒡子酒淘炒佐紫蘇葉佐製法先取視其年所屬取其藥以為君其餘主歲者為臣為君者倍之為臣者半之為佐如臣四分之三於冬至日修合研為末取雪水煮升麻和竹瀝調神麯為丸辰砂雄黃為衣竹葉湯下二小兒出痘預防失音體弱者宜預服十奇散熱壅毒甚者宜甘桔湯加牛蒡子玄參荊芥之屬使氣道肅清自無此患十奇散滋養氣血調和脾胃拔瘡毒速出黃耆人參當歸各一錢薑川朴桔梗川芎防風白芷甘草各一錢桂心三分甘桔湯見本章第一節三出痘而口噤不語者用吳茱萸煎湯服之四桂枝湯治太陽病頭痛發熱有汗惡風或微惡寒脈浮弱而數衛氣不和宜發汗者桂枝芍藥生薑甘草大棗五升麻湯發表治時邪頭痛足冷發熱肢疼脈數陽明經熱下利及痘疹初起或在疑似之間或未經解利而瘡毒已發宜與解散者升麻白芍甘草各二錢生葛根三錢加生薑蔥白六百祥丸治小兒瘡疹黑陷寒戰喘脹便祕咬牙戛齒身黃紫腫紅牙大戟不拘多少陰乾漿水煮軟去骨日中曬乾復納汁煮汁盡焙乾研末棗肉或滴水和丸如黍米大每服一二十丸不拘時芝麻研煎湯送下七四苓散見本章第三節八異功散治小兒氣虛氣滯脾胃虛熱口舌生瘡或弄舌流涎驚搐痰嗽睡時露睛手足並冷飲食少思吐瀉不止人參白朮茯苓甘草陳皮各等分銼散清水煎服九犀角消毒飲治痘瘡發疔胃熱咽腫便祕犀角七分連翹鼠黏子各一錢荊芥六分甘草防風各五分忍冬一錢五分十導赤散見本章第一節十一羌活湯治痘疹未報點時熱甚頭痛腹脹羌活防風各八分荊芥紫蘇各七分川芎四分赤芍六分枳殼八分山楂一錢木通五分生甘草三分加白蔥生薑清水煎服十二消毒飲見本章第一節十三犀角地黃湯治傷寒溫病熱傷血分吐血衄血蓄血瘀血溺血婦人倒經血崩赤淋小兒痘疹以及喉痧重證痧透咽爛火灼液虧者犀角屑生地黃丹皮芍藥小腸淋瀝出血或衄血食後臨臥時用茅根煎服熱盛如狂善忘加大黃黃連黃芩瘀血停胸加醋製大黃腹中有瘀血未下加桃仁紅花酒製大黃口鼻出血加大薊茅根藕汁扁柏童便並磨京墨攪令黑色服小便溺血加小薊十四補中益氣湯治氣虛氣少氣高氣喘內傷勞倦陰虛發熱頭痛口渴表熱自汗畏風惡寒體倦語懈食少無味心煩脈大一切中氣不足者黃耆人參甘草當歸身橘皮升麻柴胡白朮加生薑大棗十五保元湯見前十六椒梅丸治痘為蟲閟不得發出秦椒三錢烏梅黃連各一錢共研細末飴糖為丸如黍米大十七紫草承氣湯治痘瘡乾紫喘滿便祕紫草枳實厚朴大黃十八大黃甘草湯治食已即吐及痘為痰悶不得發出大黃甘草按食已即吐宜用大黃四倍於甘草專取大黃之沉降也痰悶痘閉宜用大黃再倍於甘草反借甘草之上溢也十九白虎化斑湯治痘為火悶不得發出生石膏知母生甘草蟬蛻麻黃生大黃黃芩連翹玄參竹葉二十快斑湯治痘毒盛起發遲而作癢紫草甘草木通人參芍藥蟬衣二十一透肌散透肌膚發斑疹紫草茸緑升麻粉甘草各一錢細切清水煎服二十二參耆內托散治癰疽不潰或潰後感冒風邪及痘疹觸穢伏陷寒戰咬牙飲水瀉渴者人參黃耆當歸川芎紫草厚朴防風桔梗白芷肉桂木香甘草二十三化毒湯治小兒痘瘡紫草茸升麻甘草一方加蟬蛻地骨皮黃芩木通二十四二寶散治痘瘡色紫發熱鼻衄小便如血口渴讝語及痘頂色白肉紅腫而痘反不腫或黑陷不起犀角生玳瑁磨汁頻服即愈痘頂色白或黑陷不起研為末入豬心血少許紫草湯調下二十五大鼠黏子湯治痘色紅根散不長髮鼠黏子錢半當歸七分黃耆連翹各一錢柴胡黃芩地骨皮各八分二十六攻毒湯治痘出不快伏陷倒黶大便實者大鱔魚頭丹雄雞頭鮮筍尖各三五枚加生薑三五片飲汁二十七承氣湯治陽明實證大黃枳實芒硝厚朴二十八理中湯治中焦脾胃虛寒不能運化嘔吐泄瀉不飲不食胸痹胸痞腹痛痰多傷寒直中太陰自利不渴寒霍亂四肢逆冷自汗脈虛便血痢等症人參白朮甘草乾薑二十九四聖散治小兒痘出不快黑陷倒黶不起發不紅活小便不利紫草茸黃耆各一錢甘草五分木通六分熱甚色紫者倍紫草茸加黃芩黃連紅花大便閉者加枳殼氣虛少食者加人參三十加味四聖散治痘灌漿時熱渴引水或作癢者紫草茸一錢甘草五分黃耆炙一錢木通七分川芎五分木香三分人參一錢蟬衣七枚三十一生脈散治熱傷元氣肢體倦怠氣短懶言口乾作渴汗出不止腳欹眼黑津枯液涸人參麥冬五味子三十二不二散治痘瘡起脹灌漿時泄瀉不止蓮肉一兩鴉片二錢各研細末和勻每服三四分米飲調下不但止瀉亦治煩癢三十三人參白朮散治霍亂吐瀉人參白朮白茯苓炙草木香藿香乾葛三十四五福化毒丹清膈涼血治上焦壅熱煩渴瘡疹餘毒口齒出血牙宣口臭唇舌生瘡玄參桔梗茯苓人參風化馬牙硝青黛甘草麝香三十五木香散治痘瘡泄瀉後虛寒癢塌木香大腹皮肉桂半夏青皮柴胡人參茯苓炙草訶子肉丁香自汗癢塌去大腹皮青皮柴胡加黃耆白朮糯米薑棗下三十六白朮丸治脾肺氣虛白朮人參黃耆茯苓山藥百合甘草前胡加薑棗三十七排毒湯治痘後餘毒發癰能食便祕大黃白芷木香穿山甲欲托加黃耆防風三十八托裡快斑湯治痘起發遲而熱不止及痂後發熱紫草黃耆鼠黏子連翹各一錢木通六分當歸七分青皮桂枝川芎防風各五分木香三分蟬衣七枚三十九羌活當歸湯治腰背痛羌活當歸獨活防風川芎黃柏各一錢柴胡錢半桂枝七分桃仁紅花各八分四十人參敗毒散治時疫傷風風濕寒熱頭眩項強目疼肢疼咳嗽鼻塞聲重瘡瘍邪氣在表應發者以及小兒感冒發熱惡風痰阻胸膈頭目不清風熱瘙癢療脫疽頑核毒瘡人參羌活獨活柴胡前胡川芎枳殼桔梗赤苓各一錢甘草五分一方加人中黃四十一七物升麻湯治四肢大熱大便閉塞升麻犀角黃芩朴硝梔子仁大黃淡豆豉四十二黃耆建中湯治虛勞裡急諸不足桂枝芍藥甘草生薑大棗膠飴黃耆四十三紫草飲治痘疹氣虛血熱紫草茸人參白芍蟬衣甘草穿山甲四十四牛黃湯治痘瘡疹毒入胃便血腹痛啼哭牛黃一分鬱金一兩研為細末每服五分四十五木通湯治心經伏熱小便不通小腹痛木通滑石牽牛子燈芯蔥白四十六豆蔻丸治痘疹氣虛吐利不止肉豆蔻木香砂仁白龍骨訶子肉赤石脂枯白礬四十七白朮散治吐瀉已久虛熱而渴人參白朮茯苓藿香木香甘草乾葛又一方為人參白朮草果仁厚朴肉豆蔻陳皮木香麥糵甘草四十八加味四苓散治痘症熱泄豬苓木通澤瀉赤苓川連黃芩牛蒡子車前子燈芯四十九牛黃丹治小兒生瘡大便不通膿水不幹牛黃生大黃珍珠末粉霜五十消毒散涼膈去痰治急驚風毒赤紫丹瘤壯熱狂躁睡臥不安痘疹咽痛而起發遲及一切瘡遍身疥瘡防風甘草荊芥穗鼠黏子五十一蟬花散治犬咬蟲齧諸傷或諸瘡潰爛夏日生蛆臭惡不可近及小兒痘爛生蛆者蟬殼青黛蛇蛻皮各一兩煅存性細辛二錢半五十二四順清涼飲治小兒血脈壅實臟腑蓄熱頰赤作渴五心煩熱臥睡不安四肢驚掣及腸胃不調大小便澀欲發驚癇或風熱結核頭面生瘡目赤咽痛瘡疹餘毒泄瀉不止赤芍當歸甘草大黃加薄荷五十三十全大補湯升陽滋陰治諸虛百損五勞七傷及潰瘍寒熱作痛膿清而少人參熟地白朮茯苓甘草白芍當歸川芎黃耆肉桂五十四移痘丹治痘出目中初見點時用此移之守宮十枚去頭足配辰砂一錢陰乾珍珠茯神遠志肉各一錢琥珀五分研為末紫草膏和丸如梧子大每服一錢二分欲移在手足官桂威靈仙煎湯下欲專移在足牛膝木瓜煎湯下微汗為度再用川芎藁本荊芥防風白芷各五分蟬殼三分生薑一片蔥白一莖清水煎溫服血熱者加紫草連翹五十五決明散治小兒痘疹入眼決明子栝蔞仁赤芍甘草加麝香少許研為細末五十六撥雲散治眼發濕熱不退翳膜遮睛昏暗羞明隱澀難開川芎草龍膽楮實薄荷羌活荊芥穗石決明草決明蒼朮大黃甘草木賊密蒙花連翹川椒甘菊桔梗石膏地骨皮白芷白蒺藜檳榔各一兩石燕一對為細末每服三錢又方桑螵蛸一兩炙焦研細末入麝香少許治痘瘡入目及生翳膜每服二錢五十七清毒撥翳湯治痧痘翳膜生地黃當歸柴胡牛蒡子白蒺藜天花粉白葛粉薄荷防風川芎密蒙花穀精草草決明甘菊花梔子羌活木賊草川連忌寒涼及眼科點藥五十八奪命五毒丹治痘黑陷倒黶乾枯不起蟾酥少許牛黃冰片各二分硃砂一錢雄黃三分研為細末獖豬尾血和丸如麻子大每服一丸薄荷湯送下移時活動五十九一字金丹治痘毒及痘瘡黑陷倒黶乾枯不起紫花地丁金線重樓山慈姑研細末按此方治危急痘證有起死回生之功六十甘露飲治胃熱未宣齦腫出膿目赤腫痛飢煩不食口瘡咽痛瘡疹已發未發及脾胃受濕瘀熱在裡濕熱成疸肢腫胸滿氣短身熱二便祕澀鮮枇杷葉刷去毛干熟地黃去土天冬去心焙麥冬去心焙枳殼去瓤麩炒山茵陳去梗生乾地黃石斛去蘆甘草炙黃芩各等分六十一治痘瘡黑陷發痘至猛之單方雞冠血治毒壅心肺桑蟲漿治毒壅於脾紫草茸治毒壅於肝人牙散治毒壅於腎穿山甲治毒壅經絡一説毒壅於肺則用桑蟲毒壅於肝則用雞冠血毒壅脾胃則用地龍毒壅心腎無藥可治惟寒閉毒邪於腎則用人牙第五節痘證分類痘證之種類據方書所載都凡百餘種各有專名然繁雜無富反是以淆學者之志惑病家之心茲擇要述之庶免此弊曰痘疔此由感時行疫毒發生於諸痘中其形獨大或黑或白或先紫後黑如疔瘡狀色黃者亦號痘母其在痘初來者多見於頭面中間來者多生於腹背黶後來者多生於足股一經現出則諸毒不能宣發痘瘡不能成漿故為惡候治法宜於初見紫黑獨大之點時即以銀針刺破吸盡黑血然後以拔疔散敷之次日復視若再硬脹仍然刺破以前藥敷之必轉紅活方已若針挑不動手捻有核則為已成須用針從四邊刳開以小鉗鉗出其形如疔有半寸長拔去後仍以前藥敷滿瘡口曰臭痘痘瘡之有臭氣者由火迫所致然陽明之毒因此而泄故臭而紅活膿血流溢者臭而不燥不癢者臭而皮肉不黑爛者臭而口無惡氣者皆非死證宜用芫荽艾葉燒煙闢其穢氣並用升麻湯加紫蘇揩挹其臭處內服定金湯自獲安全曰干皮痘痘之形微紅而乾枯帶黑者此由氣少血枯所致急宜調補氣血曰白漿痘痘之初起發時其頂即有白漿者以挾疫癘之氣所致初起宜刺出其漿若遍身如此者難治曰水晶痘痘之色似蘆花者此由氣血兩虛之故急宜大補曰空倉痘痘之外似肥滿而中實幹枯無膿血者由於氣盛而血虧或以前又失於解毒致毒火內熾宜用川芎黃耆白芷牛蒡肉桂各八分歸身鹿茸各二錢大生地三錢白朮一錢穿山甲四分連進二服俟有漿腳乃去牛蒡而以補血為君補氣為臣其漿自足曰四圍痘痘起發之際四畔有小痘攢簇或形如粟米者此痘不待灌漿即加瘙癢而死曰咽關痘此痘與鎖項痘無異鎖項痘病在環繞而咽關痘病在攢簇曰鎖項痘痘之連串環繞於項者治法與咽關痘同宜於見點之初即用清金攻毒飲並以胭脂膏貼之此由肺熱所致若咽啞嗆水於法為不救曰血痘痘之初出紅紫如硃筆點於周身者此內根已腐外苗必萎曰兩頭痘痘之見標於胸以上臍以下中間則一粒俱無者此由寒毒壅盛氣血相離不能交會故陽參於上則頭面多陰滯於下則腿足密宜於見點時急用生黃耆當歸赤芍桔梗防風荊芥續斷白芷山楂木通黃豆三十粒並煎服至中間痘出方可無虞曰瘟痘瘟痘起發時不語昏睡不知飲食手足牽掣早出晚沒宜急按證治療而以解疫毒為主曰逆痘痘之上身少而下身多者曰樣痘痘之由他人傳染者此外又有水痘一種由風熱鬱於肌表而發初時發熱由紅點而變水泡頂色白亮腳根散大有紅盤漿色淺白頂無痘眼皮薄色嬌不似正痘之根窠圓淨緊束且自見點至起脹灌漿結痂止於五六日之間此由邪氣輕淺之故惟熱甚不解二便祕澀煩悶不寧者宜用大連翹湯近時種牛痘後而再出痘者多為此種有痘夾丹者由血熱所致色紅紫者為極熱色白者為痰濕色青黑者不治治法如丹先發而痘後見者宜紫草升麻牛蒡蟬衣川芎荊芥防風桔梗乾葛之屬升提發散之痘出三四日而後見丹者宜生地牛蒡木通荊芥犀角紫草之屬以涼血解毒挾痰濕者酌用前胡紫蘇半夏陳皮之屬有痘夾疹者其先見疹而中夾粒似水痘者此為正痘因疹出時耗去榮血故白似水痘但宜發散疹子則疹散而痘自齊痘初起時即見疹者法宜透托既可表痘又兼發疹疹出即解自可兩安痘疹並見又兼發斑者總宜散其火邪而兼活血解毒按之痘中夾疹昔稱二虎蹲欄蓋痘多宜補而不宜瀉疹多宜瀉而不宜補故同時並見最宜審慎將事者也附方一拔疔散外用治牙疔痘疔疔毒硇砂白礬硃砂食鹽如法制研細末二定金湯治臭痘黃耆人參白朮當歸白芍生地茯苓甘草白芷防風荊芥升麻加芫荽一握白銀一塊燈芯二十根三清金消毒飲治疫喉腐爛鎖項咽關諸痘生地茵陳黃芩鮮石斛犀角石膏枳殼紫草人中黃麥冬馬勃加蜜炙枇杷葉第六節痘後證治痘證證前施治合法痘後余恙可以盡無所患者不過虛則調補之中略寓清化可也至痘前失治則痘後余恙滋多茲擇要述之如下一痘後不喜食者向不能食痘後愈甚者此脾胃氣虛宜七珍散補之又痘前能進食痘後又驟加以致惡食不食者此脾虛傷食也宜木香大安丸調之一痘後唇不遮齒者此由氣血兩虛急宜大補否則必成慢驚之證一痘後自汗盜汗者此由衛氣弱榮血熱所致宜保元湯當歸六黃湯間服兼服敗蒲散一痘後咳嗽者此肺中餘邪未盡宜甘桔湯合瀉白散加馬兜鈴等清之有鼻淵者宜用絲瓜藤燒灰吹之內服絲瓜黃芩梔子牛蒡甘草之屬一痘後嘔吐者此證多由余熱在胃所致凡乳入口即吐面色青白手足冷二便自利者此冷吐也宜益黃散凡心煩作渴食乳甚急聚滿胸中然後吐出如射面色帶赤手足心熱居處喜涼者此熱吐也宜橘皮生薑竹茹之屬至傷食而嘔聞食嗅即欲吐者宜木香大安丸一痘後腹痛者由大便未通燥屎作痛宜下之由食少便潤忽爾作痛喜用手按摩此為虛宜培補至於傷食作痛者宜木香大安丸一痘後泄瀉者能食口渴脈盛為熱入大腸宜黃芩湯加川連食少不渴脈微小者此裡氣虛不能禁固水穀也宜四君子湯加訶子肉豆蔻之屬一痘後吐蛔者由熱毒聚於腸胃而蛔不安也宜黃芩湯加半夏烏梅川椒之屬一痘後手足拘攣屈伸不便者與外感暴作之抽掣不同此氣血不能榮養筋骨所致宜十全大補湯去地黃茯苓加川斷或川烏之屬一痘後出血者此因餘毒邪熱迫血妄行所致宜清血解毒此外有後痘發熱乳腫發癰三症雖似輕恙最為難治忽視之每成危證發熱由於餘熱留流凡病後餘熱最不易退痧痘之後為尤甚治宜分別虛實凡大便難小便赤能食而煩渴者此實熱也宜先用四順散之屬以解裡熱後用升麻葛根湯加地骨皮以解表熱凡大便不閉小便不赤坐立振搖飲食不進者此虛熱也宜保元湯加知母麥冬甚則可加乾薑附子浮腫多由虛而脾氣不行其皮如鼓按之難下當理氣為主宜人參五皮散其有感濕而腫者多足下先腫其形光亮按之有窩起好飲而小便赤澀當健脾利水為主宜用蒼朮木通厚朴車前滑石瞿麥澤瀉豬苓茯苓皮大腹皮之屬俟小便自利其腫自消因感冒而腫者多頭面先腫而身熱口渴宜用升麻柴胡茯苓木通車前防風大腹皮甘草薑蔥汁水煎服使微汗而腫自退因血不行而腫者其皮膚之內隱隱皆有血路當活血為主用四物湯加人參陳皮香附木通茯苓總之浮腫一證初起能表則表繼則以五皮湯為主方而至浮脹如鼓按之微急者皆脾虛宜培土健運為主發癰由於痘瘡餘毒留藏經絡失於解利外不得泄於皮膚內不得入於臟腑致東流西注一有著處即成癰毒多生於肌肉空虛處或肢節動搖處毒淺者只生結核瘡癤毒重者頭項胸脅手足肢節一齊焮腫作痛流注起伏根深蔓引輕則潰筋脫骨為殘廢之疾重則竟致死亡治宜人參敗毒散五福化毒丹大都腫而不潰者氣血兩虛宜托已成膿者宜清解潰後宜清補兼施而潰後不愈則培土健運扶氣以使其收斂至於詳悉治法則宜參考外科醫籍也附方一七珍散開胃養氣溫脾進食人參白朮黃耆蜜炙山藥茯苓粟米甘草各等分研為細末加薑棗清水煎服二木香大安丸治脾虛食積嘔吐泄瀉木香二錢黃連陳皮白朮各三錢枳實山楂肉連翹神麯麥芽炒砂仁萊蔔子各一錢五分三當歸六黃湯治血虛盜汗內熱晡熱當歸生地熟地黃柏黃芩黃連各一錢黃耆炒二錢四敗蒲散治睡中多汗故蒲扇燒存性研細末烏梅湯下五益黃散治小兒脾胃虛寒乳食不化腹痛泄利陳皮青皮訶子甘草丁香六十全大補湯治氣血兩虛方見本章第四節七人參五皮散治痘後浮腫由於脾氣不行者人參大腹皮陳皮桑皮薑皮白朮茯苓皮官桂麥冬木香澤瀉車前子木通第五章諸驚論治第一節驚風概説驚風之名不見於古逮至近世其説始盛後之附會者益廣增名目巧立治法於是今日之兒科驚風一證遂占重要之位置矣嘗考驚風之立名其初不過就其病狀信手拈取既未探其病源亦未明定範圍故於驚啼作哭名之曰驚手足抽掣亦名之曰驚譫語悶亂名之曰驚角弓反張亦名之曰驚痰湧喘急名之曰驚目痙斜視亦名之曰驚其證既非盡因驚得亦非悉由風來以其形之似驚而狀之如動風者則概加以驚風二字於是世俗之醫遂妄立七十二種之名以炫世而欺人狂藥亂治誤人不淺其實即以所謂手足抽掣角弓反張之驚風而論亦只有虛實二種實證即急驚風虛證即慢驚風是也其他如驚之狀則凡小兒發熱之甚者或發熱過久者不論何證皆每每見之若果悉以為驚風則百病皆為驚風矣此驚風二字之所以不可不辨也本章所述既以世人對於驚風之證確認已久則為便利起見姑仍沿其名別為急驚風慢驚風兩證分論其治法其後則增入類驚一證以資與急慢驚風相比量而參看若繁雜不當之名概無取焉第二節急驚概要一急驚起源小兒臟腑薄弱氣血未充內因飲食之所傷外受時邪之所侵正氣偶衰邪從虛襲初由口鼻以潛入繼由經絡以傳布病勢鴟張熱自內生熱甚侵肝肝升風動於是發為驚狀此為驚風之起因驚風之作既由肝升風動故其勢剽疾筋受熏灼則驟見四肢瘛瘲抽搐無定風循脊背則驟見角弓反張脊硬項強風升巔頂則驟見頭痛如劈目痙神昏痰隨風升則驟見喘息不勻喉中鳴響病勢既疾病狀至急此急驚風之所由名也顧何以別於慢驚風乎曰急驚風之證狀全由邪實所致邪勢益實正氣益亟不治其邪病必不愈慢驚則得之也漸元氣早虧動見虛象無實可攻無熱可清自與急驚風有天淵地隔之別矣至近今有所謂流行性腦脊髓膜炎者雖成人亦有感染而患者究以小兒為多病之急者不過一二日而亡此蓋急驚風之尤重者歲時不正時邪必盛一經感染不易施治此流行性腦脊髓膜炎證之所以多死亡纍纍也雖然驚風之起源既明則觸類旁通活法在人因勢利導病非必不可痊者是在司命者之審慎從事耳二急驚病理小兒為純陽之體諸邪感受化熱至速小兒又多血氣未充肝虛易為邪乘準是二因故急驚之病理率為肝升太過肺失清降昔人所謂木旺無制金氣不伸也因肝升之太過故熱勢上炎病多面紅目赤下肢反冷因肺失清降之權故關竅不通邪無泄路郁久化火上侵腦府中爍肺胃當其初起之時邪循太陽之經故多惡寒項強寒熱無汗繼則由少陽而轉屬陽明或徑襲陽明之經故或由發熱惡寒而漸見壯熱或驟見壯熱不清之證此時雖有汗出邪已內傳故患是症者恆多有汗而熱不解者邪既內傳肝升風動輕者痰升嘔吐肺胃受病重者神志昏瞶心君為蒙故患是症者恆見發熱而渴有痰及神昏不語之狀也至於頭痛項強角弓反張四肢抽掣目竄或痙則以太陽經脈所屬由目內眥上額交巔從巔入絡腦還出別下項循肩膊內挾脊抵腰中入絡腎下屬膀胱循髀外下至踝終足小指此諸證狀之所以疊現也劇者太陽之本病未解邪反愈趨愈深熱勢不退津液告竭神氣不續終至虛脫輕者邪從汗解熱從溲泄則霍然以愈此急驚風病理之大概也三急驚症狀小兒初起有惡寒微熱之象繼則驟然四肢抽掣牙關緊閉項背強硬漸至壯熱無汗面紅目赤痰升氣促此急驚風也甚者頭痛如劈起臥不安角弓反張手足厥冷其間或兼嘔吐或兼泄瀉或大便堅結或小溲不利則因人而互異亦有僅見搐搦之狀而無口噤反張之象者則感寒傷風痧痘將發每多有之非急驚風也急驚風最重之證狀見目睛翻轉手足攣急頭反至背口噤不開者多屬不救此急驚風症狀之一斑也四急驚治法急驚風之原因及病理既如上述則急驚風之治法固可推想而知要不外解表祛邪清熱平肝而已昔賢有云小兒急驚屬肝木風痰有餘之症宜平肝鎮心驅風消痰降火勢清內熱寥寥數字亦足以盡急驚風之治法也惟病有淺深治有先後初起宜發表以祛邪寒重則辛以兼溫熱重則辛以兼涼繼則熱勢內盛宜內清外徹表裡並治重證神昏痙厥宜平肝鎮心危證邪深津耗宜解毒生津此其綱也至於自始至終病變繁復臨機應變則有下列諸法一初起表邪頗重形寒熱不壯手足抽掣項強或頭痛苔薄白者宜葛根湯二初起發熱惡寒驚風煩悶痰熱作搐者宜參蘇飲三驚風一二日寒微熱甚者宜葛根湯去麻黃生薑之辛溫易豆豉蔥白之辛涼肝膽熱甚心肺受灼者加黃芩熱而作嘔者加竹茹黃連濕滯身重者加蒼朮茯苓四驚風形寒壯熱便阻腹脹抽掣口噤表裡俱實者宜防風通聖散寒熱如瘧者宜達原飲疫癘之氣流行頗盛者酌加玉樞丹五驚風數日壯熱欲狂大便祕結者宜用調胃承氣湯熱盛口渴灼筋成痙不宜遽下者宜葛根湯白虎湯合治之六驚風發表祛邪無效其人血虛內寒者手足冷脈遲細宜當歸四逆湯其人體實者汗出不解內熱仍蒸宜葛根湯白虎湯合治之七驚風角弓反張神識似明似昧者宜梔豉湯中加開鬱發表之劑熱重者再加清熱之劑八驚風昏厥者宜辛涼解表清涼退熱加羚羊角以平肝鎮心痰多者加鮮菖蒲竹茹便堅者加天花粉栝蔞血熱者加鮮生地犀角邪重勢盛者犀角宜磨服多用庶能有效其他開泄之劑如至寶丹紫雪丹之類解毒之劑如玄參板藍菊花之類均可量症酌加九抽掣略減神識略清者宜天麻鉤藤以熄風鎮痙生地丹皮以養血清熱羚羊白芍以清熱舒筋玄參麥冬以養陰退火他如石決明西洋參知母石斛之類皆可量症酌加十急驚搐搦之時不可把持不令動宜放臥地上任其動作十一病後餘邪不清血中有熱朝涼夜熱者宜青蒿鱉甲湯清之其有急驚重證僥幸得愈往往筋絡偏廢或變成癡呆者終身不治至於用藥大體初起不可輕易即用走竄開泄之劑病之中期不可過用消導攻下之劑病後不可過用滋膩之劑此其大端也附方一通關散治小兒驚風搐搦關竅不通天南星炮殭蠶炮各一錢麝香少許豬牙皂角一枚赤腳蜈蚣炙一條共研細末以手點薑汁蘸藥少許擦牙二神效搐鼻散治番痧臭毒腹痛如絞氣閉神昏燈芯灰一兩羊躑躅三錢北細辛蟾酥牙皂各二錢牛黃梅片麝香各一錢共研極細瓷瓶緊裝毋令泄氣每用少許吹入鼻中得嚏則生三嚏驚散打嚏醒睡急救卒死半夏一錢豬牙皂角五分研為末每用如一豆許以管子吹入鼻立醒四葛根湯治太陽與陽明合病或利或嘔或小便少或發熱無汗或喘滿不食或口噤不得語欲作剛痙葛根麻黃桂枝白芍甘草生薑大棗五參蘇飲治感冒風寒頭痛發熱憎寒驚風煩悶脘悶嘔惡痰熱作搐咳嗽氣逆涕唾稠黏脈弱無汗人參紫蘇梗葉乾葛前胡半夏赤苓枳殼陳皮桔梗甘草加生薑大棗六防風通聖散治一切風濕暑濕飢飽勞役內外諸邪氣血怫鬱表裡三焦俱實憎寒壯熱頭目昏運目赤睛痛耳鳴鼻塞口苦舌乾咽喉不利唾涕稠黏咳嗽上氣大便祕結小便赤澀瘡瘍腫毒折跌損傷瘀血便血腸風痔漏手足瘛瘲驚狂譫妄丹斑癮疹等證防風川芎當歸白芍酒炒大黃煨蘇薄荷葉麻黃連翹芒硝石膏黃芩桔梗滑石生甘草荊芥穗白朮梔子加蔥白生薑七達原飲治時疫邪氣初犯募原及疫瘧壯熱多汗而渴者黃芩錢半甘草白芍厚朴草果各一錢知母檳榔各二錢加生薑大棗柴胡桂枝葛根豆豉菖蒲蔥白等可量證酌加八玉樞丹治一切喉毒時痧時疫山慈菰五倍子各二兩大戟千金子去油用淨末各一兩蚤休雄黃各五錢麝香三錢共為末每服三五分九調胃承氣湯治太陽證汗後惡熱譫語心煩中滿脈浮者大黃甘草芒硝十白虎湯治陽明證汗出渴欲飲水脈洪大浮滑不惡寒反惡熱及中暍煩熱而渴石膏知母甘草粳米十一梔豉湯開暢胸膈治虛煩懊憹梔子豆豉十二至寶丹見第四章第一節十三紫雪丹見第四章第一節十四青蒿鱉甲湯治溫病夜熱早涼熱退無汗熱自陰來者青蒿二錢鱉甲五錢細生地四錢知母二錢丹皮三錢十五礞石滾痰丸治實熱老痰結核異證小兒急驚熱痰上潮阻塞欲死青礞石煅飛沉香百藥煎川大黃黃芩共為細末水泛丸如梧子大每服一二錢十六已風丹祛諸風退驚天竺黃防風鉤藤白殭蠶干全蠍白附子各五錢研為細末煉蜜和丸如芡實大每服一二丸第三節慢驚概要一慢驚起源莊在田曰慢驚之症小兒吐瀉得之居多或久瘧久痢痘後疹後或因寒食積滯過於攻伐傷脾或稟賦本虛誤用涼藥或因急驚用藥攻降太甚或失於調理虛極生風皆可致此江筆花曰俗所稱慢驚風者脾虛生風也小兒或吐或瀉久則脾虛肝木乘之面色青白手足微搐是內風侮土非外風也陽衰神怠氣息短促是中氣脫乏非驚嚇也是可知慢驚起源由於內虛與急驚之為實證迥異故急驚因關竅不通而噤口咬牙慢驚則因陽衰陰僭而噤口咬牙急驚因邪循脊項而角弓反張慢驚則因脊腦虧乏而角弓反張急驚因熱侵筋絡而四肢抽掣慢驚則因筋絡空虛而四肢抽掣急驚因肝熱生風而兩目扇動慢驚則因肝虛生風而兩目扇動急驚因熱痰阻滯而喉中鳴響慢驚則因津液化涎而喉中鳴響急驚因熱深厥深而四肢作冷慢驚則因陽氣衰微而四肢作冷急驚因協熱下利而大便溏泄慢驚則因脾損火衰而大便溏泄虛實之分至為判然也又小兒驚風有一起即為慢驚者多為吐瀉及瘧痢痧痘之後元氣不復所致有一起為急驚而轉成慢驚者多由其人先天不足邪無所制漸成內傷所致而誤治所致者亦不在少數也二慢驚病理小兒慢驚之起源既明則其病理固可推求而知要不外脾陽不運心肝交疲神衰氣怯內虛生風諸端是矣故慢驚之為患不在病邪之內侵而在正氣之微弱若正氣得能漸長病邪自歸消滅正氣不能伸張病邪必永無衰歇之日也其間病勢雖有似於急驚者然虛實之辨究有不同試比例言之急驚之噤口咬牙為關竅不通故搐鼻不易有嚏嚏出則其噤可減慢驚之噤口咬牙為陽衰陰僭故其噤時而自松並非關竅不通搐鼻常能噴嚏急驚之角弓反張因邪循脊項故反折痙急而有力慢驚之角弓反張因脊腦虧乏故牽引柔弱而無力急驚之四肢抽掣因熱侵筋絡故動作較疾而收引甚急慢驚之四肢抽掣因筋絡空虛故動作較緩而牽引微搐急驚之兩目扇動因肝熱生風故其勢迅疾或上插或閃閃作動慢驚之兩目扇動因肝虛生風故其勢較緩或斜睨或正圓直視急驚之喉中鳴響因熱痰阻滯故熱甚上潮則梗塞欲絶慢驚之喉中鳴響因津液化涎故其聲如鋸而無痰可豁急驚四肢作冷因熱深厥深故必有壯熱而口氣穢濁慢驚四肢作冷因陽氣衰微故多面青額汗而身體微溫急驚溏泄因協熱下利故瀉下多臭穢而色黃慢驚溏泄因脾損火衰故瀉下多完穀而色青此就其病理方面可知其虛實之迥異也至於病至身冷汗黏神識全蒙是內傷至極真陽外越屬不治之證矣三慢驚症狀慢驚風之症狀初起多因吐瀉之後發熱不退睡臥不寧漸見頭昏腦脹四肢抽掣繼則神昏氣喘眼翻驚搐或乍寒乍熱或二便青白甚至口噤咬牙角弓反張腹中氣響喉內痰鳴雖口唇開裂出血而口中氣冷目光昏暗重者面青額汗四肢冰冷或搖頭吐舌或眼合不開或睡則露睛若見身冷黏汗直臥如尸喘嗽頭軟背直口噤頭搖唇縮氣粗痰響面無潤澤之色者多屬不救此慢驚風症狀之一斑也四慢驚治法慢驚初起證狀尚未盡顯者僅見吐瀉時作驚狀治應和脾鎮肝為主宜惺惺散或吐瀉不止脾困不食津液化涎痰聲漉漉者宜湯氏醒脾散惟全蠍蜈蚣冰麝金石之藥則宜慎用其有勢急不得不然者則一用即止隨用四君子湯理中湯之類為調治痰聲不降虛實參半者先用滾痰丸以治其標次則仍以四君子湯加減為之調治慢驚病進現虛寒或假熱之證象者宜逐寒蕩驚湯甚者加進加味理中地黃湯慢驚不已脾土虛寒陽氣衰微者宜六君子湯加炮薑木香或加附子以回陽痰盛者宜青州白丸子元氣虧損馴至昏憒者可急灸百會穴或用海藏返魂丹然近世小兒稟賦日薄體質日脆倘遇慢驚每多不救故與其臨病驚惶毋寧慎之於吐瀉方起之時或感冒初起之時謀諸良醫謹其醫藥之為愈也附方一惺惺散治小兒吐瀉脾弱內虛生驚人參茯苓木香天麻扁豆全蠍炙陳倉米炒各等分銼散每服二錢加生薑大棗清水煎服二醒脾散治吐瀉不止痰作驚風脾困不食白朮人參甘草炙陳皮茯苓全蠍各五錢半夏曲木香各一分白附子炮四個天南星一個陳倉米一百粒研為末每服一錢加生薑大棗清水煎服三四君子湯見第三章第五節四理中湯見第一章第四節五礞石滾痰丸見本章第二節六逐寒蕩驚湯凡因風熱不退及吐瀉而成者總屬陰虛陽越必成慢驚非感風寒可比故不宜發散治當培元固本引火歸元先用辛熱衝開寒痰再進溫補伏龍肝三兩丁香十粒炮薑胡椒肉桂各一錢研勻水煎一小杯灌下七加味理中地黃湯助氣補血卻病回陽治小兒精神已虧氣血大壞形狀狼狽瘦弱至極熟地黃五錢白朮土炒二錢黨參當歸炙黃耆破故紙酸棗仁枸杞子各二錢炮薑萸肉炙甘草玉桂各一錢加生薑三片紅棗三枚胡桃肉二個用灶心土二兩煎水煮藥加附子五分煎水摻入泄瀉不止一二劑後去當歸加丁香六分大熱不退加白芍一錢八六君子湯治脾胃虛弱不能運化胸滿腹脹大便溏泄等證人參白朮茯苓半夏制各二錢炙甘草陳皮各一錢加生薑大棗九青州白丸子治風痰壅盛嘔吐涎沫口眼喎斜手足癱瘓婦人血風小兒驚風痰盛泄瀉半夏七兩天南星三兩白附子二兩川烏頭去皮臍五錢生研為末生絹袋盛之於井水內擺出粉以盡為度如法曬露為丸如緑豆大每服二十丸薑湯送下驚風每服四五丸薄荷湯送下十灸百會穴法治中風偏風口噤言語謇澀角弓反張半身不遂頭風腦痛百會穴屬督脈經在前頂後一寸五分頂中央旋毛中直兩耳尖凹可容豆為手足三陽督脈之會針可二分灸可七壯襯以薑片用陳蘄艾絨小團灼於其上或針入二分用艾絨燒灼針尾處十一返魂丹治小兒癲癇潮發瘛瘲口眼相引項背強直牙關緊急及諸病久虛生風多睡者烏犀水銀天麻檳榔殭蠶硫黃白附子川烏獨活乾蠍萆薢肉桂當歸細辛防風天南星阿膠藿香烏蛇沉香槐膠羌活白花蛇麻黃半夏羚羊角陳皮天竺黃木香人參乾薑茯苓蔓荊子晚蠶沙敗龜版藁本桑螵蛸白芷何首烏虎骨縮砂仁白朮枳殼丁香厚朴蟬殼川芎附子石斛肉豆蔻龍腦雄黃硃砂膩粉麝香烏雞狐肝按此方為藥隊之奇兵以多而雜相製取勝者也第四節類驚概要類驚者何所以別於急慢驚風也類驚本無此名本書亦非欲特創此名增添諸驚之治法所以然者為便於分統系以資歸納計耳急慢驚風既各有其特殊之治法而小兒以神經之怯弱不易鎮靜雖小恙亦輒現驚象其狀似驚而實非驚風者固尚有種種若一一列其名而舉之則治法至繁雜無取若歸於急慢驚風一類中則治法究尚有差別故統於驚風一章而別為類驚一節庶幾綱張目舉統系既合檢查亦易也茲將小兒病之易作驚風之狀者逐一述其證治如下一因熱成驚小兒腠理未固感冒風寒便易發熱初起之時邪易入易出輕加發散即可無事甚者雖頻作驚惕睡中驚醒固為熱重使然並非驚風所致故治法宜發表解肌清熱安神用宣化湯最妥兼有他因則宜從其他因合治之二因痰成驚小兒感冒風寒肺氣失宣痰濁阻滯最易蒸熱因痰熱之交病小兒往往咳嗽驚惕發熱面紅考其主因為風寒入肺治宜宣肺祛邪又因痰氣不降治宜化痰降氣初起之時辛濕疏透最為合度化熱之後辛涼消化亦屬正治大便堅者可下則酌下之小便赤者可利則酌利之方用宣化祛痰湯最妥兼有他因亦宜從其他因合治之三因食成驚小兒恣意口腹食積不化亦易成驚蓋腸胃通暢則清氣可升而濁氣下行自無熏蒸成熱之弊若食積不化腸胃不清則濁氣阻塞鬱而化熱肺胃受其熏灼精神為之不寧驚惕之狀遂見其證腹多脹滿或痛大便或堅結不行或瀉多渣滓舌苔黃膩脈象緊實治宜宣化消積湯最忌因循遲延蓋小兒食積熱鬱腸胃易成疳積傷胃則致吐傷腸則致瀉最輕者亦熏灼成驚不可不慎也兼有他因亦宜從其他因合治之四因暑成驚小兒感受暑熱鬱而不化亦易成驚暑邪之淺者無汗身熱宜從汗解之用宣化清暑湯最妥暑邪之深者發熱口渴多汗欲飲胸膈悶煩精神倦怠者宜白虎湯體弱濕重者宜清暑益氣湯切不可因天時炎熱恣與冷飲蓋小兒飲冷腸胃益薄受暑更易也兼有他因亦宜從其他因合治之五因恐成驚小兒肝膽不足凡耳聞驟聲目見驟色輒易因恐成驚睡時驚惕甚則啼叫輕者酌與撫拍翻拿其驚自已蓋本非疾病不過因神氣之怯弱暫時振蕩不寧故也神定即愈無庸顧忌重者因有內蓄之熱遂乘勢以發動驚搐啼哭有類驚風治宜宣化定驚湯最妥偏於實者身熱便結哭聲壯宜保赤散偏於虛者神氣怯弱哭聲緩宜茯神湯兼有他因亦宜從其他因合治之參看第三章第七節六因吐瀉成驚上節言吐瀉日久易成驚風然非盡吐瀉皆可以成驚風也若以吐瀉之後神氣不寧偶有似驚之狀遂作驚風治之則愈治愈危誤人不淺矣考小兒腸胃至為柔弱稍有積滯傷其胃氣則致吐傷其腸腑則致瀉或吐或瀉當其劇作之時神氣不寧驚狀遂起然此等類驚決無角弓反張之象亦無眼目痙睨之狀或睡臥略露其睛瞳子略為上泛則有之故與驚風迥別治法則吐者宜調其胃氣瀉者宜調其腑氣吐瀉兼作者腸胃並調之不必治其驚但治其本病則驚亦已用宣化健運湯加減治之最妥至於有因吐瀉而肢冷攣急者羅癟麻木者則為寒霍亂證其勢急而且危宜急用附子理中湯救之與尋常之吐瀉又迥異者也兼有他因亦宜從其他因合治之參看第七章附方一宣化湯自制治小兒感冒發熱神魂不安薄荷葉一錢鉤藤二錢荊芥一錢茯神梔子連翹各二錢霜桑葉燈芯各錢半清水煎服感寒重者加蘇葉一錢熱重無汗者加麻黃三分泄瀉煩悶者加葛根一錢淡豆豉二錢咳嗽有痰者加前胡杏仁竹茹象貝母各二錢腸胃有熱加黃芩枳實各一錢二宣化祛痰湯自制治小兒感冒風寒痰氣不降發熱成驚前胡蘇子杏仁象貝母竹茹鉤藤陳皮赤苓金銀花連翹生薑各二錢清水煎服風寒重者加麻黃三分荊芥一錢濕滯化痰者加厚朴一錢半夏二錢風痰上湧者去金銀花連翹加天南星半夏各二錢白附子一錢甚者用青州白丸子見上節四五粒同下大便堅結者加栝蔞三錢不應改加枳實大黃各五分小便不利加豬苓二錢澤瀉一錢三宣化消積湯自制治小兒食積不化腸胃失調濁氣阻滯鬱而化熱神麯麥芽鉤藤梔子各二錢薄荷陳皮枳實厚朴各一錢黃芩燈芯各一錢清水煎服泄瀉多渣滓不化者去黃芩加白朮錢半木香五分腹脹便結者加木香檳榔各一錢甚者加大黃一錢熱瀉酸臭者仍用黃芩再加知母二錢四宣化清暑湯自制治小兒感受暑熱身熱不安藿香佩蘭大腹皮陳皮各錢半香薷白朮厚朴各一錢鉤藤滑石各二錢生甘草五分清水煎服發熱煩悶加淡豆豉一錢梔子錢半熱重加金銀花露荷花露各一杯脾弱胃呆加玫瑰花露一杯煩熱盜汗去香薷加青蒿露一杯五白虎湯見本章第二節六清暑益氣湯治長夏濕熱蒸炎四肢困倦精神減少頭痛身熱氣高心煩自汗口渴便黃溺赤脈虛者黃耆蒼朮各錢半升麻一錢人參白朮陳皮神麯澤瀉各五分甘草黃柏乾葛當歸身麥冬各三分五味子九粒加生薑三片大棗二枚清水煎服七宣化定驚湯自制治小兒肝膽虛怯因恐成驚半夏朱茯神各二錢菖蒲遠志肉龍膽草酸棗仁各一錢石決明鉤藤三錢白芍錢半清水煎服熱重者去酸棗仁石決明加川連三分薄荷一錢挾痰者加竹茹二錢枳殼一錢旋覆花一錢夾食者加神麯一錢麥芽除米麥之食積或山楂肉除肉類油膩之食積各二錢八保赤散治小兒多熱因恐成驚牛黃川連硃砂冰片青黛珍珠大黃人中白百草霜蟬衣各少許研為細末加薄荷鉤藤煎湯送下或加赤金一件同煎服九茯神湯治小兒神虛固恐成驚黨參二錢炙黃耆錢半白芍棗仁炒各八分桂心三分柏子仁炒七分甘草五分砂仁蒸熟地茯神各三錢清水煎服十宣化健運湯自制治小兒或吐或瀉或吐瀉兼作因以成驚半夏陳皮神麯鉤藤茯神竹茹生薑各二錢木香澤瀉各一錢清水煎服熱嘔加川連三分寒吐去竹茹生薑加乾薑一錢熱瀉去木香加檳榔一錢寒泄去神麯加白朮一錢吐瀉交作加白朮一錢劇瀉不止者去神麯澤瀉竹茹加補骨脂淮山藥一錢罌粟殼五分十一附子理中湯治脾胃虛寒飲食不化四肢厥冷腸鳴腹痛霍亂轉筋體冷微汗嘔吐泄瀉一切沉寒痼冷等證附子人參甘草乾薑第六章咳嗽論治第一節咳嗽概説咳嗽肺之病也起因不一變化亦多端其病雖成人小兒皆有患之然以小兒脾胃殊為薄弱肺體更屬嬌嫩一經感染最易流連荏苒日久則釀大患故小兒之咳嗽倍重於成人也至於證狀小兒氣息本短脈息本數一患咳嗽則氣息之短促脈息之急數益現異常之象甚則神氣不定發為驚惕啼哭之狀此證狀之倍重於成人也論其治法亦屬較難蓋小兒問診脈診未易十分準確得病之源知之非易更以小兒內臟之未充身體之未固用藥亦倍費斟酌故咳嗽一證成人與小兒其病雖同而證治實有不同也至於起因大別之有三一曰外感咳嗽一曰內傷咳嗽一曰雜證咳嗽是也外感咳嗽咳之屬於外因者屬於內傷者不與也內傷咳嗽咳之屬於內因者屬於外感者不與也雜證咳嗽咳之屬於內外因相雜者以此分系則一般咳嗽皆包羅其中而於繁雜無當之咳嗽專名如心咳肝咳大腸咳小腸咳等亦可棄而不取矣第二節外感咳嗽一傷風咳嗽甲概況外感咳嗽受病之因全由外邪所致不由內因故與內傷之咳嗽不同其間亦有因外感失治而轉成內傷者然初起固為外感也外感咳嗽之輕者厥為感冒風寒俗所稱傷風咳嗽是也考肺為清輕之體最忌風寒之邪一有所感氣管在上先受其病病則釀痰痰則阻礙呼吸肺體因呼吸之有阻也亟欲祛邪以外出故發為咳嗽以驅之初起之時咳聲常尖鋭而痰色常清白以寒邪初襲猶未化熱痰涎始生猶未化濁也病之中期咳聲常重濁而痰色常稠黃以邪勢方盛進而化熱痰涎積聚熏蒸變稠也病之後期咳聲常清爽而痰色常清白以邪勢已衰氣道已通濁痰既豁僅存稀痰也病之甚者亦有熱勢內侵而呈喘急之象亦有痰不易出而呈驚搐之狀要皆非危篤之證但須因勢利導清熱豁痰使咳聲得暢肺氣得宣稍稽時日亦無不愈至於有因循失治有內外因相雜有一再感冒不已致肺氣大傷者亦可轉成不治之證俗所謂傷風不醒便成癆正指此也乙治法傷風初起大率微有惡寒鼻中噴嚏或惡寒發熱鼻塞不通頭昏目淚飲食無味喉頭作癢咳嗽以起此時風寒之邪方襲治宜解表開肺用藥輕則宜蘇葉前胡荊芥薄荷象貝之類重則宜麻黃防風杏仁秦艽之類風滯經絡身體作痛者酌加羌活桂枝桑枝天麻之類通治宜宣肺祛邪湯繼則熱勢漸張咳嗽漸盛痰色由清而漸稠是寒邪化熱之象治宜解表開肺之中寓以清熱豁痰之意用宣肺滌痰湯加減進之繼則咳聲重濁痰出黃稠外邪完全化熱治宜清肺順氣用清肺化熱湯加減進之餘邪未清猶有微咳者亦宜此方此證雖小兒體質不同病態互異然為期不久七八日至十餘天可以痊愈愈後應服藥調理體虛者宜補養肺氣體實者宜清理餘邪加以補益庶使肺氣強固俾免動輒感冒也二流行咳嗽甲概説流行咳嗽雖由外感所致然與普通之傷風咳嗽不同傷風咳嗽其病勢輕流行咳嗽其病勢重傷風咳嗽為期頗暫流行咳嗽遷延日久傷風咳嗽其感邪淺流行咳嗽其感邪深考流行咳嗽有似時疫之傳染故小兒口鼻感其氣息即可因而致病因之一經流行則沿門闔境無或得免故不似傷風咳嗽之或感或不感也其病一曰百日咳言其咳嗽不易愈往往經百日之久也一曰鸕鷀咳形其咳嗽之艱難連聲而作有如此狀也此證之發動常由天時寒燠不勻變生疫氣一人感之輾轉流傳因小兒肺氣之怯弱故小兒感染為獨多病之初發雖亦由身熱而起然一發即連聲作咳咳多痰少輕者一咳十數聲而休重者一咳數十聲乃至百餘聲方止間歇之時不過十分鐘左右而又作困頓不堪至於嗆食咳血而不能止此病初期較少危險之象若至後期咳益艱而聲益不暢者則肺臟受損漸見難治正昔人所謂金破不鳴已轉成內傷之證也乙治法流行咳嗽之初起或發熱或發熱形寒視其咳嗽連聲而作即為病邪之已受治法在昔殊少成方大率則宜於解表開肺之中變通治之何則蓋普通之咳嗽固可以解表開肺了事而流行之咳嗽則以既挾疫氣感受又深非參以祛疫之劑及保肺之品不為功也初步宜用保肺祛邪湯繼則病勢激進咳聲益劇祛痰保肺之中再參鎮靜寧咳之品宜用保肺滌痰湯發熱脈反沉細咳則從下逆上腰背相引痛必深入以發出之宜用麻黃附子細辛湯如咳嗽日久其勢不衰者則肺氣將乏邪勢方張不補其氣邪必更深宜用四君子湯五味異功散六君子湯中加入祛痰順氣之品方能漸次告痊徒攻其痰肺必益虛邪必益深轉成虛癆陷為不治之證矣故此病後期宜用保肺扶正湯最妥兼有他因則宜就其他因合治之附方一宣肺祛邪湯自制治感冒風寒形寒身熱咳嗽初起蘇葉薄荷各一錢秦艽前胡杏仁象貝母橘紅薑竹茹赤苓各二錢桔梗甘草各五分清水煎服形寒身熱汗不易出氣息不順者去桔梗加麻黃三分頭痛者去桔梗加荊芥防風各一錢身痛者加羌活三分桑枝三錢四肢酸楚者加桂枝三分喉痛者加牛蒡子黃射干各二錢二宣肺滌痰湯自制治傷風咳嗽身熱痰多氣息不平前胡蘇子杏仁象貝母竹茹陳皮薄荷赤苓連翹各二錢清水煎服身熱息粗者加麻黃三分身熱氣喘胃熱口氣者加麻黃五分石膏三錢便難者加枳殼一錢嘔吐者加半夏錢半小便少者加通草一錢三清肺化熱湯自制治傷風咳嗽熏蒸化熱痰濁膠結肺胃並熱者前胡知母栝蔞淡芩蘇子竹茹象貝母赤苓當歸各二錢清水煎服泄瀉者去知母栝蔞當歸加陳皮木香各一錢脾胃氣虛濕重化痰者去栝蔞知母加半夏陳皮各錢半或蒼朮五分熱勢壯盛痰升氣急者加猴棗一分或葶藶子一錢四咳後調理方自制治普通傷風咳嗽病雖愈而餘波未平痰多作嗽沙參白朮旋覆花陳皮黃耆半夏茯苓川貝母各二錢甘草青皮各一錢清水煎服氣虛者去青皮以沙參易黨參腸胃餘熱不清釀化成痰者加栝蔞知母各二錢五保肺祛邪湯自制治流行感冒惡寒發熱咳嗽陳作炙百部炙紫菀各五分旋覆花前胡杏仁蘇子各二錢象貝母竹茹天冬各三錢清水煎服身熱無汗咳不爽快者先去百部紫菀旋覆花天冬加麻黃五分荊芥桔梗秦艽各一錢服一劑以透之再用前方其他萊蔔子白芥子竹瀝製半夏等俱可量證酌加六保肺滌痰湯自制治咳嗽陳作不休面紅身熱有汗不解痛引胸背炙百部炙紫菀各五分旋覆花代赭石竹瀝製半夏前胡當歸各二錢川貝母天冬各三錢清水煎服腎虛而氣易上逆者加生地磁石各三錢咳血者去半夏痰聲漉漉由於水泛者加桂枝五分葶藶一錢茯苓三錢七麻黃附子細辛湯治少陰病始得之反發熱脈沉及腎臟發咳咳則腰背相引痛甚則咳涎及寒邪犯齒致腦齒俱痛麻黃附子細辛八四君子湯見第三章第五節九五味異功散見第三章第六節十六君子湯見第五章第三節十一保肺扶正湯自制治頓咳日久氣虛而咳不止者北沙參人參白朮黃耆麥冬川貝母法半夏旋覆花化橘紅懷山藥各二錢清水煎服咳久肺氣耗散不能收攝加乾薑五味子各五分脾虛泄瀉加於術腎虛泄瀉加補骨脂咳血去半夏第三節內傷咳嗽一痰多咳嗽甲概況內傷咳嗽咳之屬於內因者或由外感失治久則轉為內傷者亦屬之內傷咳嗽之輕者十九皆由於痰多所致或因小兒為肥胖之體外觀飽滿中氣則虛虛則濕濁滯而不運以致化痰或因小兒脾胃薄弱加以乳食飲食之不調宿滯逗留脾失轉運以致化痰或因小兒口腹之欲恣食肥甘胃中濁氣鬱蒸以致化痰或因小兒恣食鮮果茶水水飲停留過多不及下行以致化痰或因小兒屢患感冒肺氣疲乏失其開闔之權以致化痰或因小兒居處陰濕之地陽氣被困濁陰瀰漫以致化痰及其化痰之後均須假肺為出路於是皆發為咳嗽此輕證內傷咳嗽之來由所以皆為痰多也惟痰有熱痰寒痰燥痰濕痰之分故證狀不一治法各異熱痰之狀多見脈洪面赤口乾唇燥其痰或濃而色黃或堅而成塊飲食不化肝胃有熱及感冒後餘邪化熱均足致此寒痰之狀多見脈沉面黑口吐清水其痰或稀而色白或間有黑點脾胃虛寒肺氣怯弱或水飲停留均足致此燥痰之狀多見脈澀面白氣上喘促其痰澀而難出或燥如米粒黏亮而少時令過燥肺中有火或濕邪在肺從火化而為燥均足致此濕痰之狀多見脈緩面黃肢體沉重其痰滑而易出或色白而多飲食不化身體過肥或水飲停留居處陰濕均足致此此外又有痰飲者多因熱病飲水過多不加節制停蓄而致或寒濕之體脾陽不運飲水不化而成其狀脈偏細弦不咳而多嗽日夜吐痰清而且稀甚者喘滿心悸渴飲嘔水此各各不同之見證而可以一言以蔽之曰痰為之祟也夫痰之為病雖不盡為咳嗽或為嘔為瀉或為痞隔壅塞或為寒熱瘧疾或為眩暈或為癲狂或為腫痛或為結核或流注於四肢其隨氣升降遍身上下無處不到乘虛而入停聚則病原無一定之可言然內傷咳嗽之屬於痰之為病蓋有可得而言者若再進究其源則究其痰之來源而病情即無不了如指掌治法亦從可悟到矣乙治法內傷咳嗽之初起飲食起居雖能如常然往往無端咳嗆或吐清痰或吐濃痰繼則飲食不為肌膚咳嗽時作時止甚者咳傷肺絡竟至咯血重者亦有惡寒發熱惡寒者表虛也發熱者內蒸也此時失於調治則病進甚速若轉成虛損之咳嗽則不易治療矣故宜乘其輕淺之時分別施治熱痰宜用貝母栝蔞二冬知母竹瀝天竹黃猴棗之屬然治熱痰非調氣下行則可酌佐陳皮青皮蘇子之類以行其氣咳不爽者亦可略用桔梗以提之寒痰宜用半夏陳皮白朮茯苓生薑乾薑肉桂草果常山附子硫黃之屬然治寒痰亦宜宣通肺氣則可酌佐薄荷杏仁薑製竹瀝白芥子之類以為之導咳不爽者亦可略用桔梗以提之燥痰宜用貝母枇杷葉栝蔞桑白皮杏仁萊蔔子前胡炙款冬天冬玉竹之屬然治燥痰宜養陰清火以生津則可酌佐生地當歸白芍麻仁石膏阿膠玄參之類以潤其源間亦須調氣為輔則可酌佐陳皮青皮澤瀉之類以為之導咳不爽者亦可略用桔梗以提之濕痰宜用南星半夏蒼朮白朮陳皮茯苓苡米枳殼白芥子檳榔厚朴木香沉香之屬然濕而挾寒者宜溫之濕而挾熱者宜清之脾胃弱而濕滯者則可酌佐白豆蔻肉豆蔻山藥人參肉桂之類以補其氣咳不爽者亦可略用桔梗以提之凡內傷咳嗽之初起大率以二陳湯加減治之頻咳不已吐痰多而且稀者多由於熱宜加竹茹川貝栝蔞之屬時咳時止吐痰少而且稀者多兼夾寒宜加杏仁蘇子薄荷荊芥之屬咳嗽之時喉間痰聲雖似濃稠而所吐皆為白沫稀涎者多為虛損咳嗽頻咳不已吐痰多而黃稠者多由於熱宜加前胡知母貝母冬桑葉黃菊花之屬時咳時止吐痰少而黃稠者濕而兼熱宜加檳榔厚朴苡米白朮之屬咳吐黃痰腥臭者為肺癰證與尋常咳嗽不同其由腸胃積滯脾胃不運以致咳嗽者宜平胃散加法半夏貝母麥芽神麯之屬其由頻患感冒動輒咳嗽有汗者宜玉屏風散加北沙參百合馬兜鈴之屬或合四君子湯治之其由過飲不化水停心下以致咳嗽嘔水者宜茯苓飲或茯苓桂枝白朮甘草湯治之其由咳傷肺絡者始宜治咳之中加三七茜草鬱金或桃仁大黃以行其瘀繼宜生地茅根白芍丹皮等以涼其血然後用白芨沙參阿膠冬蟲夏草百合麥冬熟地歸身燕窩等以補肺養血咳嗽久而惡寒者宜治咳之中加白朮桂枝黃耆等以扶其陽氣咳嗽久而發熱者宜治咳之中加桑皮花粉知母淡芩梔子等以去其內蒸另有痰飲一證多由積飲不化日久所致輕者宜小半夏加茯苓湯或茯苓桂枝白朮甘草湯重者宜十棗湯治實證腎氣丸治虛證假令瘦人臍下有悸吐涎沫而癲眩者此有水可從小便去之宜五苓散至論痰飲之變化至為繁復固當與成人之痰飲同其治法也二虛損咳嗽甲概況虛損咳嗽乃內傷咳嗽之重者蓋咳嗽經久而不治未有不轉成虛損者亦有病起甚速始得即成虛損者此必小兒先天太弱早有預伏之因或外感誤用滋膩之品泥邪不化所致虛損咳嗽之來由如此故其證之初起必先肺氣已傷腎氣不能上充水火之升降失調痰濁之積滯不行因之脾胃交困奉生者少營養既日以乏病情自日以進故虛損咳嗽之為病其源在肺其流所及則一身全局莫不有關脾胃與腎尤為吃重又虛損咳嗽痰未必多所患者在飲食之精華不為養身之用徒為成痰之源所患者在痰雖少而易滯不易行所患者在痰之到處乘虛以釀病故虛損咳嗽之為病常面色不華身體瘦怯咳嗽反不如外感之甚亦不如痰多之劇咯痰亦少往往數咳而一吐或清晨入晚略有咳嗽或低咳數聲或乾咳無痰此津液煎熬所成蓋與其他咳嗽迥異者也此時欲攻盡其痰不啻攻盡其津液故治法宜補養脾胃以絶其生痰之源而痰之已成者仍宜廓而清之以養肺庶兒生生之氣日長病可由漸而退也虛損咳嗽之輕者飲食尚可瘦削不甚略有寒熱未至脾胃俱傷者治之尚易更進則飲食減退虛熱時潮大便不實為肺病日進脾胃俱傷治之較難重者潮熱似有似無火升面頰微紅胃口全敗思食而不能納大便溏瀉手足軟弱一舉動則喘而汗出是肺氣將竭脾胃俱敗虛火妄動元陽無根多為不治之證矣昔有肺損肺癆肺痿諸名在小兒為童癆其實皆虛損咳嗽之一類也至於咳血一症壯實之人恆亦有之未必即為虛損而虛損咳嗽亦有至死不咳血者故未可以一概論若咳血因肺體受創病邪易侵及精神恐怖營養減退轉為虛損為較易固事理之所應有則證治當亦相同而可附論於此也乙治法虛損咳嗽之初步常因肺胃失其清肅以致熏蒸成熱熱傷肺陰以致燥痰結肺咳吐不爽治宜川貝知母麥冬款冬天花粉馬兜鈴之屬以養肺清熱腸胃有積則宜白朮木香陳皮神麯之類以行氣化積忌用麥芽萊蔔等耗氣消導之品其夾外感者若標急外邪重而本緩虛損淺則宜就其標治之惟忌攻下以傷腸胃用藥精審者恆有標病已而本病亦驟愈者若本急虛損重而標緩外邪輕則宜就其本治之或略顧其標或竟不必顧其標此為虛中挾實之治法逮虛損病進則肺陰益損內熱蒸動每潮熱一次恆數日始已潮熱一次則病進一次斯時治之合度可使其潮熱一次則病減一次蓋不進則退理有固然宜用滋陰清化湯保和湯滋陰保肺湯之屬凡潮熱熱勢甚者其病淺熱勢微而永不能清者其病深蓋一則正氣尚未大耗而一則正氣已屬衰微也乾咳無痰者宜瓊玉膏清之或本事鱉甲丸加味以補之火邪郁肺亦有乾咳不屬於虛損咳嗽一類又此證出入之關鍵恆在於脾胃之能否鼓舞其正氣倘大便實者多為可治倘大便溏薄多有變端故虛損之咳嗽雖發熱之時宜用川貝知母麥冬生地地骨皮之屬而一遇便溏即當用扶胃保脾之品加而進之或竟乘其未溏之前即用之以預為之防者否則脾陽一敗腎氣下竭更將難於措施是在臨證之隨機用保肺扶脾湯治之最妥潮熱似有似無脾傷泄瀉者宜楊氏八味湯加減治之虛火妄動元陽無根者宜金匱腎氣丸加減治之其有咳嗽之全由虛寒者宜用附子乾薑胡蘆巴之類痰氣上升虛而發喘元氣虧耗真陽欲脫者宜用黑錫丹治之久咳肺氣耗散狂咳無制身振振動搖者宜乾薑五味子五倍子等收斂之以上三證高年患咳嗽者所常有而小兒患之恆不多見以上為虛損咳嗽之通治大抵與外感咳嗽迥乎不同者也又虛損中有肺痿一證其特徵為肺葉萎縮原因有二一因汗下不當胃氣耗傷不能上輸於肺肺失所養日漸枯燥內不能灑陳於六腑外不能輸津於皮毛於是肺葉日痿肺氣益窒咳聲漸以不揚胸中脂膜日乾治宜生肺津潤肺燥開積痰下逆氣終則須補真氣以開通肺竅一因肺為火迫失其清肅而變乾燥凡脾胃上輸之津液不獨不能沾潤轉從熱化而為涎濁致肌瘦神疲咳吐不已久之肺熱枯燥雖投清涼亦扦格不入治宜以半夏少許入清涼生津藥中藉半夏為導驅其濁而清涼之藥力方達於肺凡此用藥之步驟與上述均可相互參看之虛損咳嗽至於張口短氣日久音啞偏臥一側翻身則咳不休六脈沉澀而急細數無神者皆不治至於虛損咳血初起先宜化痰行瘀用紫菀百部二冬甜杏仁參三七白茅根之屬服一二劑繼則宜補肺修絡以止血用保肺歸血湯偏熱者去肉桂乾薑用二冬藕汁童便生地之屬以佐之總之治咳血亦不脫乎標本二者急則治其標緩則治其本治標者治其橫溢之血宜修補經絡消導血瘀如牡蠣龍骨側柏炭地榆炭棕櫚炭血餘炭白芨三七茜草蒲黃之類是治本者治其出血之因宜順氣止血各歸其經如降香沉香陳皮鬱金生地茅根梨汁鮮藕蓮鬚丹皮之類是隨證應用酌加化痰補肺及培養脾胃之品固皆可以應手取效者也附方一二陳湯治胃中寒濕痰濁等證陳皮半夏茯苓各二錢甘草一錢生薑七片一方有烏梅肉一個清水煎服燥痰減半夏生薑加麥冬竹瀝郁痰乾咳去半夏加川貝母火痰加黃連竹茹老痰加蛤粉海浮石二平胃散治濕滯脾胃不能運化積飲痞膈不思飲食心腹脹痛口苦短氣反胃噁心噯氣吞酸面黃體瘦體痛嗜臥壯熱自利霍亂吐瀉能調氣暖胃化宿食消痰飲厚朴陳皮甘草蒼朮三玉屏風散治風邪久留不散及衛虛自汗不止黃耆白朮防風加生薑大棗四四君子湯見第三章第五節五茯苓飲治胸有停痰宿水吐出後心虛氣滿不能食茯苓人參白朮枳實橘皮生薑六茯苓桂枝白朮甘草湯治傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖及心下有痰飲胸脅支滿目眩茯苓桂枝白朮甘草七小半夏加茯苓湯治痰飲多汗小便不利卒嘔吐心下痞水停胸膈眩悸半夏生薑茯苓八十棗湯治太陽中風表解里未和及懸飲支飲或因水而咳大棗十枚芫花甘遂大戟各等分先煮大棗去滓後納芫花甘遂大戟藥末服以棗肉和丸名十棗丸九腎氣丸治虛勞不足消渴小便多熟地山藥山萸肉茯苓丹皮澤瀉附子桂枝十五苓散見第三章第五節十一滋陰清化湯治痰熱熟地生地天冬麥冬當歸鱉甲阿膠白芍茯苓山藥貝母天花粉五味子甘草十二保和湯治虛癆咳嗽肺燥成痿嘔吐膿血知母川貝天冬去心麥冬去心款冬花各一錢天花粉苡仁炒杏仁去皮尖各五分馬兜鈴紫菀桔梗百合阿膠蛤粉炒當歸百部各六分甘草紫蘇蘇薄荷各四分五味子十二粒加生薑三片入飴糖一匙清水煎服痰中帶血加蒲黃生地小薊茜根藕節十三滋陰保肺湯滋陰保肺知母黃柏鹽水炒橘紅紫菀各七分麥冬去心天冬去心各一錢二分桑白皮枇把葉去毛炙各錢半當歸白芍生地阿膠蛤粉炒各一錢五味子十五粒甘草五分清水煎服十四瓊玉膏填精補髓調真養性補百損除百病治虛勞乾咳生地四斤搗絞取汁白茯苓十二兩白蜜二斤煉去滓人參六兩先以生地黃汁同蜜熬沸用絹濾過將人參茯苓研為細末入前汁和勻桑柴火煮熬修膏勿犯鐵器十五本事鱉甲丸治勞嗽及鼻流清涕耳作蟬鳴眼見黑花一切虛證鱉甲地骨皮各三錢五味子二兩共研末煉蜜為丸如梧桐子大加熟地當歸白芍麥冬阿膠茯苓治乾咳無痰十六保肺扶脾湯自制治虛損咳嗽痰時稀時濃潮熱往來大便溏泄黃耆蛤粉阿膠珠百合麥冬潞黨參白朮茯苓各二錢半夏陳皮川貝母馬兜鈴各錢半百部紫菀各一錢清水煎服泄瀉日久加乾薑五分肉豆蔻補骨脂一錢甚者再加罌粟殼五分形寒者加桂枝五分蒸熱不退者先加銀柴胡一錢服之再去柴胡加地骨皮丹皮各一錢十七楊氏八味湯治脾胃虛寒氣不升降心腹刺痛臟腑虛滑吳茱萸乾薑陳皮木香肉桂丁香人參當歸清水煎服十八黑錫丹升降陰陽墜痰定喘治真元虧憊上盛下虛心火炎盛腎水枯竭三焦不和嘔吐痰喘四肢厥冷不省人事黑鉛熔去渣硫黃沉香附子胡蘆巴陽起石破故紙舶上茴香肉豆蔻金鈴子木香肉桂巴戟十九保肺歸血湯自制治虛損咳嗽痰中帶血肉桂乾薑各五分牡蠣龍骨黨參地榆炭代赭石熟地懷山藥各三錢冬蟲夏草馬兜鈴百合燕窩獺肝降香各一錢清水文火煎服二十肺露治吐血衄血乾咳無痰久咳成肺痿等證孩兒參天冬麥冬百合川貝母絲瓜絡阿膠珠各二錢玉竹白茯苓北沙參代蛤散冬瓜子各三錢桑白皮炙知母款冬花丹皮地骨皮各一錢五分葶藶子馬兜鈴各一錢共為末用獖豬肺一具去心血灌血潔淨一半灌入肺中一半撒在肺上蒸露再將枇杷葉蜜炙十二兩嫩蘆根十兩另蒸露和入每服一二兩隔水燉溫逐日服一二次按此為虛損咳嗽虛痰多之妙方補而不膩涼而不寒潤肺清金化痰止嗽推為要藥惟有外邪者忌之二十一蠶豆花露治肺熱咯血蠶豆花蒸為露飲之或煎服亦可二十二枇杷葉膏治肺熱咳嗽咯血大枇杷葉刷去毛蜜炙煎熬成膏開水沖服二十三薏苡仁粉治肺痿吐血薏苡仁研為細末蘸熟豬肺食之或用薏苡仁煮粥日日食之二十四人參蛤蚧散治肺痿失音唾吐膿血滿面生瘡遍身黃腫人參二兩蛤蚧一對酒浸酥炙杏仁五兩去皮尖炒甘草炙三兩茯苓川貝母去心知母酒炒桑白皮薑汁和蜜炙各二兩研為細末瓷器內盛每服三錢蜜湯調下第四節雜證咳嗽甲概況雜證咳嗽咳嗽之屬於內外因相雜者有因哺乳及飲食不慎誤嗆氣管氣管受傷以致發為咳嗽者有因糖醋衝犯鹹酸過食或風寒束其外痰涎塞其內以致成為哮證者有因火邪郁肺痰不得豁以致發為乾咳者有因外邪不解肺氣不降以致成為肺脹胸高喘咳者有因感受風寒未經發越停留肺中蘊發為熱或濕熱痰涎垢膩充塞肺竅以致成為肺癰咳吐膿血者大致不越此數端惟內外因相雜之咳嗽其病證之重雖不如虛損咳嗽之甚然原因復雜究較單屬外感者為難治故哮證一成往往終身不除一遇風寒即便發作而肺脹肺癰雖經治愈亦往往有遺留之恙故均號稱多變之病證醫者所宜深切注意者也乙治法小兒哺乳誤嗆氣管以致咳嗽者必乳汁過多不及吞咽所致哺乳時宜手按乳房毋使直注而下不必服藥咳嗽自可漸已如為鄭重計可略進甘桔湯或射干消毒飲之類飲食不慎誤嗆氣管以致氣管受傷作咳不止者宜清潤之用射干消毒飲去玄參荊芥加蜜炙款冬花蜜炙冬桑葉蜜炙枇杷葉之屬重者喉間作水雞之聲氣道不利呼吸困難是為哮證治宜降其痰而肅清其氣道不可過涼恐風邪難解不可過熱恐痰火易升遇厚味而發者用清金丹遇風寒而發者用蘇子飲哮而上氣喘急夜不能臥用阿膠馬兜鈴甘草半夏杏仁人參桑白皮煎湯服寒熱夾雜之哮先用麻黃杏仁蘇子前胡以豁其痰再用降氣之品或用越婢加半夏湯治之胸有停水而哮酌用十棗湯以行其水風痰驟升而哮酌用千緡導痰湯以疏其痰凡哮之通治方用千金湯最妥若汗出如油氣息上奔出多入少者是謂之喘其證與哮蓋迥不相同也乾咳者火邪郁肺痰不得出宜先用桔梗柴胡以開提肺氣再用生地玉竹甜杏仁白蜜之類以潤之或用逍遙散加苦桔梗以開之肺脹者外邪不解喘咳脹悶其人上氣目如脫狀宜越婢加半夏湯心下有水小青龍加石膏湯主之痰夾瘀血阻礙氣機者酌加當歸赤芍丹皮桃仁之類以行其血肺癰者初作口中辟辟燥咳胸中隱隱痛宜服犀黃丸或用薏苡仁淡芩絲瓜甘草川貝赤芍栝蔞仁桔梗陳皮升麻丹皮以消之或用金匱皂莢丸以瀉之喘不得臥面目浮腫者宜葶藶大棗瀉肺湯既成之後咳吐膿血宜葶藶薏苡瀉肺湯或排膿散肺癰咳吐膿血不止其勢危急者用陳芥菜滷汁沖水飲或用蕺萊煎湯打雞蛋食均效肺癰初起未可斷定以生大豆試食不覺腥者是以甘草桔梗各三錢煎服後稍安者是宜趁其未傷而瀉之自易挽回若畏其峻而守王道之方日久肺葉朽爛膿血傾囊吐出則為難治矣又雜證咳嗽雖顯有餘之象實為不足之徵故不問內傷外感為熱為寒但以人參保定肺氣自可無慮昔賢曾定有人參清肺人參瀉肺人參定喘湯三方以人參之力握其樞而斡運之虛實之治悉寓其中事實雖不盡然其理頗有可採録仍於後俾備參考附方一甘桔湯見第四章第一節二射干消毒飲治麻疹咳嗽聲喑咽喉腫痛射干玄參連翹荊芥鼠黏子甘草三清金丹治食積痰壅哮喘咳嗽遇厚味即發者萊蔔子蒸熟曬乾一兩豬牙皂角燒存性三錢共研細末生薑汁浸蒸餅為丸如緑豆大四蘇子飲自制治素有哮證遇風寒則發蘇子三錢薑汁製竹瀝一兩法半夏沉香川朴各一錢喘逆無汗加麻黃五分五越婢加半夏湯治肺脹咳而上氣其人喘目如脫狀脈浮大麻黃石膏半夏甘草生薑大棗六十棗湯見本章第三節七千緡導痰湯治風痰哮半夏七枚天南星陳皮赤茯苓枳殼各一錢皂莢蜜炙甘草蜜炙各一寸加生薑五片清水煎服八千金湯治哮麻黃桑白皮蘇子杏仁白果黃芩半夏甘草款冬花清水煎服九逍遙散治肝氣抑鬱血虛火旺寒熱咳嗽兩脅作痛柴胡七分白朮蜜水拌蒸茯苓當歸白芍各錢半甘草陳皮各八分薄荷葉五分煨薑三片清水煎服十小青龍加石膏湯治肺脹咳而上氣煩躁而喘心下有水氣脈浮者麻黃白芍細辛乾薑甘草桂枝半夏五味子石膏十一犀黃丸療癰疽石疽乳岩瘰癧痰核惡核橫痃流注肺癰小腸癰一切腐爛陰疽犀黃三分麝香錢半乳香沒藥各一兩研為細末用煮爛黃米飯和丸如粟米大十二皂莢丸治肺癰初起咳逆上氣唾濁皂莢刮去皮酥炙八兩研為末煉蜜和丸如梧子大或棗肉和丸如緑豆大每服數丸棗膏和湯送下十三葶藶大棗瀉肺湯治肺癰喘不得臥胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞及支飲不得息葶藶大棗先服小青龍湯一劑繼進此方服後即吐膿血忌食鹽醬等物十四葶藶薏苡瀉肺湯治肺癰初潰唾膿血葶藶酒炒研八分薏苡仁五錢貝母去心一錢六分甘草節一錢五分陳皮一錢二分黃耆酒拌勿炒桔梗忍冬白芨各一錢生薑一片清水煎食後緩緩服初起去黃耆白芨加防風潰後膿盡加人參久不斂去葶藶加合歡皮十五排膿散治內癰膿從便出枳實十六枚芍藥六分桔梗二分杵為散以生雞子黃一枚以藥散與雞黃相等揉和令相得飲和服之十六排膿湯治內癰膿從嘔出甘草桔梗生薑大棗十七人參清肺湯治肺胃虛寒咳嗽喘急坐臥不安及久年勞嗽吐血腥臭人參阿膠地骨皮知母烏梅罌粟殼甘草杏仁桑白皮各等分清水煎服十八人參瀉肺湯治肺經積熱上喘胸膈脹滿痰多大便澀人參黃芩梔子枳殼薄荷甘草連翹杏仁桑白皮大黃桔梗清水煎服十九人參定喘湯治肺氣上逆喉中有聲坐臥不安胸膈緊痛人參麻黃阿膠蛤粉炒半夏曲五味子罌粟殼蜜炙甘草炙各一錢桑白皮蜜炙二錢加生薑三片清水煎服二十薑汁背心治寒痰壅塞經絡不時發哮生薑搗取自然汁用以漿布背心貼肉著之數易即愈二十一甘草豬膽丸治醋嗆咳嗽甘草去赤皮二兩用豬膽汁五枚浸三日取出火上炙乾為細末煉蜜為丸第七章吐瀉論治第一節吐瀉概説吐瀉胃與腸之病也病於胃則吐病於腸則瀉病於腸胃則吐瀉交作然胃與腸雖以幽門為界而究屬銜接連通者故胃病有時亦能致瀉腸病有時亦能致吐吐與瀉之為病腸與胃恆互有牽涉也且也為胃行其精液者在脾為腸分別水穀者亦在脾則胃與腸之運化皆統屬於脾故吐瀉之為病其關鍵又莫不在脾也其病在小兒患之倍重於成人以小兒消化力薄腸胃俱弱難任吐瀉之戕賊若後天之穀氣一傷則生生之機告絶故自來治兒科者莫不以吐瀉為重證也夫吐瀉雖有虛有實有寒有熱然吐則氣逆瀉則氣陷久吐則胃虛久瀉則脾傷不論虛實寒熱其結果皆足使正氣受劫變端百出一身全局俱受其纍重者上吐下瀉頓時上下俱脫正氣乏絶輕者轉成驚風或漸變疳症此小兒吐瀉一起所以不可不急治之以防變也惟小兒吐瀉緩治雖多變急治常易愈當其初作之時先宜辨其因熱因寒因食因痰之分再察其虛實之偏則治法莫不中肯若拘於暴吐屬實久吐必虛暴瀉宜利久瀉宜止之成見則暴作吐瀉往往有屬於虛寒者而久吐久瀉亦間有挾積挾痰者正未可以一概論是在臨證之能持其大者要者斡旋以為治耳茲就吐與瀉及吐瀉交作三證分論之第二節吐證述要甲概況飲食入胃而上泛回出者謂之吐吐又有嘔吐噦三者之別嘔者吐之有聲有物者吐者吐之無聲有物者噦者吐之有聲無物者嘔與吐常相連屬往往初起為吐吐將盡則繼之以嘔者其證有虛有實而噦則常由於虛縱或挾實不過挾痰挾火虛多而實少者也進而至於無聲無物之干噁心為胃腑氣血兩傷小兒難治之證也今先言嘔食入即嘔刻不能容其勢疾其聲壯嘔黃水而味酸苦者熱也蓋胃中有火不能容食驅逐上行非傾吐不完不止因動肝火而氣逆犯胃者亦如之食入能容漸泛而作嘔其勢緩其聲壯者虛實參半也蓋胃虛穀氣不行火復乘之上逆有以致之水到食管即嘔或嘔而由胃底腸中翻出者虛也蓋到咽即嘔為氣虛不能載物由腸胃翻出而嘔為脾胃虛弱不能運化有以致之此嘔之一類也次再言吐吐而食物不化吐而酸臭觸鼻者是為傷食吐而出水飲痰涎是為停飲蓄痰吐而面唇青白清涎夾乳是為感寒吐而直冒酸臭煩怒多啼是為挾熱此吐之一類也然嘔吐多相連屬故其因可互相參看也至於嘔吐之起源多由小兒乳食不化或露腹受寒或觸穢感熱所致其有突然嘔吐一起即困倦自汗者則由胃氣久傷病因早種所致久吐不愈若不由於胃氣耗傷必因痰濕水飲蓄滯不行阻其飲食消化之路鬱蒸所致噦之起源雖有氣滯痰滯飲滯食滯數因而其本多由胃虛氣弱不能上達所致干噁心之起源多由嘔噦經久胃氣益傷所致乳食虧缺大病之後亦均足致此總之胃為後天之本水穀之海久病不愈必至養生之源竭絶莫挽固在心存保赤者之未雨綢繆也乙治法嘔之初起宜用小半夏湯治之暴嘔挾有胃火者酌加黃連挾有痰氣者酌加竹茹嘔而口渴者酌加蘆根嘔出酸水苦水挾有肝火者酌加左金丸嘔出清水而口渴水入又嘔者酌加五苓散嘔而兼吐食者酌加陳皮神麯之屬因蟲擾而嘔者酌加黃連川椒之屬或用烏梅丸以安之嘔之虛實參半者其勢雖緩然常時止時作宜補胃調中用大半夏湯和之胃陽虛而濁陰上逆者先用逍遙散疏其鬱繼用人參白朮山藥之屬以補之脾胃虛弱不能運化致水到咽輒嘔或由胃底腸中傾翻而出宜六君子湯加砂仁炮薑或加蓽澄茄肉桂之屬肝陰胃液兩皆虛耗服熱藥嘔雖暫止而愈發愈劇舌苔剝者宜滋液養胃熄風鎮逆用六味地黃丸加扁叉斛石決明滁菊西洋參之屬吐之初起常由傷食治宜消積行滯吐而食物不化者宜二陳湯加山楂消肉積麥芽消米麥積神麯消痰食膠結之積枳實川朴消痰濕膠結之積之屬吐而夾水夾痰者宜平胃散加半夏茯苓之屬凡感寒而吐有腹痛吐清涎等證象者治宜祛寒化積用紫蘇煨薑橘紅白豆蔻半夏木香白朮之類凡挾熱而吐有惡食煩怒等證象者治宜清熱降氣用黃連生薑神麯枳實青皮大黃之類凡觸穢而吐有昏悶口臭等證象者治宜芳香化濁用藿香佩蘭厚朴白芷菖蒲神麯香豆豉之類夏月胃氣疲弱者多見之突然嘔吐困倦自汗胃氣暴傷者治宜附子理中湯多加白朮此為吐證之重者宜急救勿緩至於常年嘔吐按時而發謂之反胃在乳哺之小兒為絶少童年或間有之治法大致分寒熱虛三種寒反胃者嘔青手足冷宜二陳湯加丁香附子乾薑肉桂之屬熱反胃者嘔酸苦面紅手足熱宜二陳湯加黃芩黃連之屬虛反胃者嘔宿食不化脈軟無力宜四君子湯或四物湯之屬而隨證應變又可合嘔吐之治法以參看者也噦之治法聲高有力而連屬者屬熱可下聲低力怯而不上達者屬寒宜溫通治之法總宜調其胃氣若偶被冷風所吹而作厄逆者此屬於外因稍飲熱湯氣定自愈可不必服藥干噁心之治法宜用橘紅煎服入薑汁白蜜細細呷之以滋潤之胃熱者加川連竹茹胃寒者加炮薑胃虛者加人參氣逆者加吳萸總之凡治嘔吐當其初起泛惡之時宜引而吐之以去其滯吐後方用藥安之則胃氣不傷久嘔不止必加鎮重之藥以墜之中氣久虛必借穀食以和之或飴糖白蜜以潤之忌用有油之物如桃仁杏仁栝蔞萊蔔子山梔其有不得不用者亦在所不禁之屬此皆不可不知也附方一小半夏湯治支飲痰積膈上喘嗽嘔噦半夏生薑二左金丸治肝火燥盛左脅作痛吞酸嘔吐筋疝痞結一切肝火之證並治霍亂轉筋火邪內熾及噤口痢飲食入口即吐者川黃連六兩吳茱萸鹽水泡一兩共為末水泛為丸每服一二錢三烏梅丸治蛔厥吐蛔久痢烏梅細辛桂枝附子人參黃柏乾薑黃連蜀椒當歸四大半夏湯治反胃嘔吐半夏人參白蜜五逍遙散見第六章第四節六六君子湯見第五章第三節七六味地黃丸見第三章第五節八二陳湯見第六章第三節九平胃散見第六章第三節十附子理中湯見第五章第四節十一四君子湯見第三章第五節十二四物湯見第三章第五節十三五苓散見第三章第五節第三節瀉證述要甲概況大便不實利下無度謂之瀉瀉有溏泄利滑洞五種因虛實寒熱之別而證狀遂有不同也溏者下稠黏垢穢溏薄之物多屬於濕多屬於熱間亦有屬於寒者泄者腹瀉注下多屬於寒然暴注下迫有聲有屬於熱者利者瀉而利也不利者則屬於痢之一類滑者泄下不禁也多屬於寒洞者泄瀉過甚空洞無物也多屬於虛而瀉之寒熱之大別大概其色黃赤而其味臭者為熱其色灰白嫩黃臭不甚者為寒其間夾痰者為痰濕渣滓不化者為食積也惟小兒之瀉食積為多故恆見氣味酸臭渣滓不化之狀瀉出色黃者病淺以胃氣盛也瀉出色青者病深以胃氣衰也更有小兒多病脾弱泄瀉為半化之狀時止時瀉則宜健脾為主因循必傷脾轉成慢驚之證則難治矣又小兒腹瀉恆多大腹膨脹初起膨脹按之堅結者積滯不行而脹也宜攻下之積去宜急和其脾繼則雖脹而不堅能食而不化者虛脹也宜扶脾健胃然腹脹多兼有蟲積故須參看疳證治法以為之變通總之泄瀉者腸之病也其源因脾受水濕不能轉運致使小腸無由分別水穀遂併入大腸而成瀉經稱小腸為受盛之官化物出焉今腸病泄瀉無由出其化物之用則飲食之精微盡為糟粕而下注勢必脾傷水潰津液枯竭終至陷成不治之證故泄瀉一證決不可以等間視之也乙治法瀉證之於小兒非因食積即為脾弱故主治宜以消積扶脾為大法但消積之中食積宜消寒積宜溫熱積宜瀉痰積宜化消積同而用藥各別也扶脾之中濕盛宜滲土衰宜培扶脾同而用藥各別也大凡初起之瀉先宜祛濕消積用二陳湯去甘草加豬苓澤瀉神麯厚朴主之瀉之多稀水者宜多加祛濕之劑瀉之多滓渣者宜多加消積之劑再如溏薄之瀉謂之溏不似水之稀不似食之積所下稠黏垢穢者如屬酸臭多由濕熱宜胃苓湯加黃連暑月用六一散加陳皮澤瀉佩蘭神麯如屬清冷多由於寒宜用陳皮煨薑蒼朮白朮白豆蔻吳萸紫蘇甚者用附子理中湯再如注下之瀉謂之泄若完穀不化困倦少力者多虛而夾濕宜四君子湯合升陽除濕湯若暴注下迫稀而熱臭者多熱而夾暑宜白虎湯或桂苓甘露飲再如瀉下不禁謂之滑大腸寒冷收縮無權宜固腸丸再如泄瀉過甚空洞無物謂之洞虛而兼寒宜萬全丸加人參白朮陳皮黃耆禹餘糧此外有夾火而瀉者腹痛一陳瀉一陳雖瀉而仍覺後重小便赤澀宜黃芩芍藥湯有盛暑傷於外陰冷傷其中內外受迫而瀉者多腹痛足冷自利但小便赤而口氣濁宜連理丸有由寒濕化熱而瀉者裡急後重數至圊而不能便莖中作痛宜八正散加木香檳榔通之有腎虛無火而瀉者天明則泄一注而空宜四神丸有暴注而瀉大便如水中有小結屎欲起又瀉欲止不止者小便多清身冷自汗此屬於寒宜漿水散溫之有夾痰而瀉者宜二陳湯加神麯薑竹瀝蕩滌之此諸瀉之治法也總之治瀉綱領初宜淡滲理濕久則升舉之必滑脫不禁乃可止澀虛寒悉現始進溫補在小兒尤不宜過事消導傷其脾陽庶無貽誤之慮也附方一二陳湯見第一章第四節二胃苓湯和血補血治脾胃受濕飲食停積霍亂嘔吐浮腫泄瀉四肢痠痛小便短少及濕瘧水蠱蒼朮厚朴陳皮白朮茯苓各一錢五分澤瀉豬苓各一錢甘草六分肉桂五分加生薑三片大棗三枚清水煎服三六一散治諸熱證及熱泄煩躁小便不通石淋麻疹色紫黑者滑石水飛淨六兩甘草一兩共為細末每服一錢此方為暑令常飲妙品加辰砂名益元散熱病加豆豉蔥白熱吐用薑汁調燈芯湯下白痢加吳萸血痢加紅曲止泄加炮薑消斑加青黛肺熱咳嗽加薄荷胃熱口渴加石膏四附子理中湯見第五章第四節五四君子湯見第三章第五節六升陽除濕湯治脾胃虛弱不思飲食腹鳴泄瀉四肢困弱溺黃脫肛蒼朮一錢升麻柴胡羌活防風神麯澤瀉豬苓各五分陳皮麥芽甘草炙各三分清水煎服七白虎湯見第五章第二節八桂苓甘露飲治霍亂溫熱病煩渴引飲小便不通大便泄瀉者滑石赤苓澤瀉石膏寒水石甘草炙白朮豬苓肉桂九固腸丸治滑泄龍骨附子訶子枯礬丁香石脂高良薑豆蔻仁縮砂仁木香十萬全丸治滑泄赤石脂炮薑各一兩胡椒五錢共研末醋糊丸如梧子大每服五七丸十一連理丸治胃虛挾食痞滿發熱及暑瀉人參白朮甘草乾薑黃連茯苓十二黃芩芍藥湯治太陽少陽合病自利黃芩甘草炙白芍十三八正散治膀胱結熱熱淋血淋甚至大便閉塞及大小便不利作痛者瞿麥萹蓄草木通山梔車前子大黃滑石甘草加燈芯清水煎服十四四神丸治脾腎虛寒五更泄瀉不思飲食或久痢虛痛腰痠肢冷肉豆蔻曲裹煨五味子炒各二兩補骨脂酒浸炒四兩吳茱萸鹽湯泡淡再炒一兩研為末用生薑八兩紅棗百枚清水煮爛去皮核與藥末搗和丸如梧子大十五漿水散治太陰少陰中暑泄瀉身冷多汗脈弱半夏乾薑肉桂附子炙甘草高良薑第四節吐瀉述要甲概況小兒吐瀉兼作腸胃交病也先吐而後瀉者病由胃及腸先瀉而後吐者病由腸及胃蓋吐則中焦之氣失和胃中濁陰下侵及腸吐有可以致瀉者瀉則闌門傳化失職腸中濁陰上干及胃瀉有可以致吐者然吐瀉交作其病又莫不關涉乎脾蓋脾運不健致水濕不循正道或橫決而上或注瀉而下向使脾能統率有權則腸胃又何致交病哉故治吐瀉之病無論其為吐宜治胃無論其為瀉宜治腸無論其為吐瀉交作宜胃腸並治然皆必須顧其脾脾運則統率有權腸胃自調而吐瀉自止矣然此病之起原因不一在小兒患之大都宿食滯留挾感而發或脾胃素弱感受時邪亦足致此因身體之不同而所感之互異也故吐瀉一證有夾食夾濕夾熱夾寒之別凡夾食積者瀉多渣滓而吐多不化夾濕滯者瀉多臭穢而吐多濁水夾熱者自汗面垢吐瀉熱利而小便少夾寒者四肢厥冷吐瀉清穀而小便利此其大端也此證在夏月秋令患之最多蓋以人當炎令腸胃最弱而感受最易其重者亦名霍亂以其證狀為揮霍擾亂也然真霍亂一證初起必腹中絞痛繼則吐瀉無度終至手足攣急羅紋陷癟者乃是若僅為吐瀉皆似霍亂也亦有小兒脾胃虛弱每食輒易致吐致瀉者是為因虛弱而作與夾積夾感暴起之吐瀉迥不相同更有吐瀉頻作欲生驚風者是為脾胃衰敗之吐瀉尤非夾積夾感之吐瀉可比故吐瀉一證其源雖一而證情之各別虛實之迥殊有如此者欲明源流詎又可不詳為分辨乎乙治法吐瀉交作勃然而起其遠因為腸胃本不清肅一旦傷食傷暑或感冒風寒清濁之氣交亂於中遂為引動此證腹中胃脘大都作痛痛一陳則瀉一陳復吐一陳由於傷食者腹中堅硬繞痛頻瀉則漸減治宜行滯化積升清降濁用沖和湯由於傷暑者瀉利多水身體發熱暑必夾濕治宜暑濕兼顧用燃照湯由於感冒風寒者惡寒身熱治宜行滯化積之中寓以解表用藿香正氣丸瀉多吐少濕盛者宜胃苓湯吐瀉不多熱甚脘悶者宜竹葉石膏湯或桂苓甘露飲瀉少吐多口渴欲飲水逆於上飲後即嘔者宜五苓散加半夏凡因泄水過多筋不能榮而為拘急轉筋之狀者酌加木瓜白芍以舒之由於受寒者四肢清冷吐瀉穢濁而不致洞瀉如注者治宜溫中以行其寒濕用理中湯加蘇梗吳萸下寒上熱者酌加黃連以上諸恙雖為平時所皆有而在暑令為獨多世俗亦稱之為霍亂者也偏於濕者則名濕霍亂偏於熱者則名熱霍亂亦有名之為暑霍亂者其實皆有類於霍亂耳其有暑令發生之真霍亂為他時所無而為暑令之所獨有者其證狀為心腹絞痛吐利清穀小便利口不渴手足拘急甚者手足羅紋麻癟脈微欲絶寒象畢露者是為正候宜急用附子理中湯或四逆湯救之遲則每不及挽亦有初起腹中擾亂而欲吐不吐欲瀉不瀉轉筋而危急欲絶者為乾霍亂宜先以鹽一撮放刀上用火炙透溫水送下用雞翎掃喉以探吐或服明礬少許以探吐上得吐下即可瀉或不探其吐而先用大黃瀉之亦可或以雷公救疫散灸之亦可俟吐瀉齊作再以前方治之尚有吐瀉不禁而腹中不痛者腸胃之門戶洞開收攝無權亦為危候均宜以前法為治而當其瀉下過多之時羅紋麻癟耗水過甚用鹽水注射以增其水而利其腎亦為急救之一助至於吐瀉之非暴起而由漸來者非屬疳積必由脾胃虛弱所致治宜培補脾胃用異功散及六君子湯等吐瀉昏睡露睛欲生風候者宜錢氏白朮散或參苓白朮散加白附子天麻鉤藤之屬平時宜以八仙糕調理之總治吐瀉交作之病實者宜滲泄而虛者宜溫化毋使脾家受困統率無權則大端為不謬矣附方一沖和湯自制治小兒飲食不化發為吐瀉行氣化積使臻沖和四時均宜厚朴神麯白芍黃芩各錢半半夏豆豉佩蘭各二錢滑石赤苓各三錢甘草五分二燃照湯治暑穢挾濕霍亂吐下脘痞煩渴惡寒肢冷草果豆豉山梔省頭草川朴半夏黃芩滑石三藿香正氣丸治外感風寒內傷飲食憎寒壯熱頭痛嘔逆胸悶腹脹痰嗽氣喘傷冷傷濕傷暑霍亂吐瀉瘧痢山嵐瘴癘不服水土等證藿香大腹皮白芷茯苓紫蘇陳皮白朮厚朴桔梗半復甘草加薑棗四胃苓湯見本章節三節五竹葉石膏湯治傷寒胃虛而熱煩渴作嘔竹葉石膏半夏人參甘草炙粳米麥冬去芯六桂苓甘露飲見本章第三節七五苓散見第三章第五節八理中湯見第一章第四節九附子理中湯見第五章第四節十四逆湯治少陰病表熱裡寒下利清穀四肢拘急手足厥冷脈微欲絶者甘草乾薑附子十一四苓散治濕熱霍亂胸悶脹痛溺澀煩渴茯苓豬苓澤瀉陳皮各等分研為細末每服二三錢此方從五苓散中化出去肉桂之溫以陳皮易白朮有利氣之功而無實中之弊治濕熱霍亂之良方也十二雷公救疫散外用治霍亂臍腹絞痛四肢攣急桂心丁香硫黃吳茱萸加當門子少許共為細末納臍中用老薑一大片蓋於臍上再用蘄艾放在薑片上燒灸輕者一次重者二三次然後除去薑片貼上暖臍膏使藥氣不致外泄十三異功散見第三章第六節十四六君子湯見第五章第三節十五錢氏白朮散治吐瀉已久虛熱而渴白朮人參白茯苓藿香木香甘草炙各五分乾葛一錢共為細末清水煎服十六參苓白朮散治脾胃虛弱飲食不進多困少氣胸中痞滿噫嘔腹逆喘咳消渴大便不實及久瀉癰疽潰後不思食者人參白茯苓於朮山藥石蓮肉去心炒白扁豆去皮薑汁浸炒桔梗砂仁薏苡仁炒甘草炙十七八仙糕治脾胃虛弱食少體倦易吐易瀉人參茯苓山藥芡實蓮子肉各六兩研為細末加糯米粉三升粳米粉七升和勻以白蜜一斤白糖二斤八兩用水熬化拌藥粉中置籠上蒸熟切成條糕火上烘乾瓷器收貯十八十滴水治暑令上吐下瀉霍亂腹痛大黃酒樟腦油薄荷油生薑酒混和每服三滴至五滴此方為吐瀉初起之配劑生薑酒辣椒酒樟腦油薄荷油肉桂油另加大黃酒鴉片酒少許混和每服三滴至五滴此方為吐瀉過多之配劑十九揩擦法外用治霍亂四肢厥冷生附子搗爛揩擦四肢及手足心或用燒酒白蘭地酒亦可第八章瘧痢論治第一節瘧痢概説寒熱交作起迄有時謂之瘧赤白利下裡急後重謂之痢瘧疾有似乎寒熱然寒熱之止作無定內傷外感並皆有之與瘧疾之由寒而熱一日一作二日一作或三日一作者迥不相同也痢疾有似乎泄瀉然泄之或多或少或清或稀皆有臭穢汙水雜出其間與痢疾之黏液似凍類膿非膿類血非血赤白相間欲下不下裡急後重者迥不相同也此二證者雖四季皆有而獨盛於夏秋則以夏秋之天時轉變靡常時令之偏勝釀醞時邪亦最盛而人當此期正精神疲憊腸胃薄弱之際衛氣最易失守故時邪得而乘之也二證之起因雖皆由時邪然因所感之不同及受處之各異證狀遂為懸殊瘧疾所感為風氣之邪受處為營衛之間故其病為陰陽交併寒熱交爭痢疾所感為濕氣之邪受處為腸腑之間故其病為傳化失職鬱蒸滯下不僅此也同一瘧證因身體不同居處不同感受之深淺不同而瘧遂有多端病淺者發於三陽病深者發於三陰久瘧則成瘧母而不時發作同一痢證因身體不同居處不同感受之深淺不同而痢遂有多端病淺者赤白滯下病深者發熱不休久痢則成休息而不時發作凡瘧痢之經久邪動則病邪伏則已正氣不能伸張病邪留舍不去於是瘧痢兩證遂為四季皆有之病矣又瘧之為病可藉飲食物及蚊蟲為傳染痢之為病可藉飲食物及糞便為傳染甚者則感其氣息而亦病沿門闔境謂之疫瘧疫痢焉其病成人患之已覺虧乏小兒感染倍覺困頓茲因其證雖不同而其起伏之處頗有似之者故同類而共論之第二節瘧疾述要甲概況瘧疾一證通常皆寒熱交作起迄有時亦有名之為痎瘧者則夜發曰痎晝發曰瘧也其病有寒多熱少者有熱多寒少者有但寒而熱甚微者有但熱而寒甚微者其間雖有寒熱多少之不同隱顯之各異然為寒熱交作而起迄有時則一也故均屬於瘧瘧之一日一作者為輕間日一作者為重三日而作一次者是為最深多由久瘧失治所致又瘧疾之寒熱多少不平者亦為較重瘧之熱勢不清者亦為較重瘧之由重而漸輕大率為寒熱由不平而漸平均由期長而漸縮短反之則為病方增也瘧疾之起源雖由時令之偏然感之而足以致病者必其身體有預伏之因交相為瘧以成功或預伏暑邪成為暑瘧或預伏濕邪成為濕瘧或預伏風邪成為風瘧或預伏寒邪成為寒瘧而積痰積食亦多能致瘧伏邪重者瘧亦重伏邪輕者瘧亦輕故秋深之瘧恆較夏日為重以伏邪重故一發則纏綿而不易愈也又瘧疾之輕重更須視脾胃之強弱脾胃強則衛氣振作而能鼓邪以外出脾胃弱則衛氣不振而使病邪得久留故瘧疾之易愈與否又常視脾胃之強弱與否以為斷也此病當發作之時為病邪乘機以外出故治瘧得當者當使其每發一次則病邪減退一次庶幾漸發漸輕而易愈否則截瘧過早則有閉塞邪氣之患截瘧過遲則有元氣衰憊之慮是不可不慎之於始也乙治法瘧疾之治法初起常為疏導開泄而疏導開泄之中則宜分別其暑濕風寒之因辨其熱重寒重之狀對證以下藥大率因暑而發者但熱而少寒體若燔炭煩渴而嘔便艱或傍流治宜清涼之劑有汗者人參白虎湯加減無汗者香薷飲加減通治宜杏仁滑石淡竹葉花粉麥冬知母川貝陳皮甘草濕重痰多宜以二陳湯出入為法熱重煩躁宜加淡豆豉石膏之屬因濕而發者多身體沉重小便不利嘔逆脹滿舌膩或糙治宜解表除濕濕重而痰多熱少者用胃苓湯加羌活柴胡紫蘇之類濕漸化熱者用四苓散加減濕已化熱者用桑葉菊花銀花連翹薄荷等輕清之劑濕重化熱者則從熱治因風而發者多煩躁頭疼惡風自汗或先熱而後寒治宜解表泄風用半夏柴胡羌活紫蘇川芎細辛白芷檳榔生薑之屬若唇舌乾燥口渴不宜過用燥劑者用桂枝湯加桑葉銀花之類和之因寒而發者但寒無熱或寒多熱微頭項腰背疼痛治宜辛溫解散用柴胡桂枝幹薑湯寒盛而痰多者加常山草果檳榔厚朴之屬虛者數發後即用附子理中湯至於治瘧總法有瘧疾第一方瘧疾第二方瘧疾第三方可以量證酌用通治之方又有二陳湯與平胃散因瘧不離乎痰濕故以治痰治濕為主也又有小柴胡湯因瘧不離乎少陽故治從少陽和之也然平胃偏燥熱甚者宜加黃芩黃連青皮之屬小柴胡湯有補初病者宜去人參甘草大棗之屬而黃芩黃連不宜於寒證附子乾薑不宜於熱證初起必宜發表久瘧宜顧脾胃此皆不可不知者也又凡瘧之一日一作者因其暑濕風寒酌用疏導開泄之劑數服可愈瘧之間日一作者開泄之後宜用四君子湯補中益氣湯之類扶其正氣則庶可有濟瘧之三日一作者謂之三陰瘧必須補氣養血外貼三陰瘧疾膏瘧乃可止瘧愈之後仍須用八珍湯或人參養榮湯出入以為培補否則難免有復發之慮也又瘧疾經久結為癥瘕在於脅際者謂之瘧母治宜瘧母丸或鱉甲煎丸以化之脾虛不任攻伐者宜補中益氣湯加鱉甲總之瘧之熱重而實至於便結譫語者亦可用硝黃攻下瘧之虛而寒熱微微往來者亦可用參耆峻補固非僅疏導開泄之法一成到底而不變者也余如熱多寒少之瘧亦名疸瘧熱高而不覺其寒者亦名溫瘧但寒少熱者亦名牝瘧脾虛而嘔吐痰水者亦名痰瘧腹大而疼飢不欲食者亦名食瘧立名雖異而治法固不脫乎上述以為之變化也又小兒初次患瘧謂之胎瘧既不可截瘧過早更不可遷延過久必須培養盡善庶免脾胃受傷腹脹肌瘦浸假入於怯損之途也附方一人參白虎湯治熱渴人參知母石膏天花粉葛根麥冬竹葉粳米壯實之人或邪盛之人瘧初起不宜補者去人參略有惡寒而汗者加桂枝腹脹大便不通譫語悶亂者酌加大黃黃芩二香薷飲治夏秋臟腑冷熱不調飲食不節暑熱乘之陽氣為陰邪所遏致頭痛發熱惡寒煩躁口渴引飲腹中不和心腹疼痛吐瀉者香薷三錢厚朴一錢白扁豆錢半甘草炙一錢清水煎服此方為暑瀉要藥寒熱交作加陳皮茯苓各二錢青皮淡芩各一錢病發前二小時服無汗熱服有汗冷服三二陳湯見第一章第四節四胃苓湯見第七章第三節五四苓散見第七章第四節六桂枝湯見第四章第四節七柴胡桂枝幹薑湯治瘧寒多微有熱或但寒不熱及傷寒發汗而復下之胸脅滿微結小便不利渴而不嘔頭汗出往來寒熱心下煩柴胡桂枝黃芩乾薑牡蠣甘草栝蔞根便溏去栝蔞根淡芩加白扁豆八附子理中湯見第五章第四節九瘧疾第一方治瘧平胃消痰理氣除濕陳皮半夏白茯苓威靈仙各一錢柴胡黃芩製蒼朮厚朴各八分青皮檳榔各六分甘草炙三分加生薑三片井水河水各半煎服頭痛加白芷一錢二三服後再服第二方十瘧疾第二方治瘧補瀉互用虛實參半生首烏三錢陳皮柴胡白茯苓黃芩各八分白朮炒當歸威靈仙各一錢知母鱉甲醋炙酥研為粉各二錢甘草炙三分加生薑三片井水河水各半煎服十一瘧疾第三方治瘧疾之因於虛者使元氣充實愈後不發人參白朮炒各一錢黃耆炙當歸各一錢二分陳皮柴胡各八分甘草炙三分升麻四分加生薑一片大棗一枚清水煎服便堅加首烏二錢炒知母二錢十二平胃散見第六章第三節十三小柴胡湯見第三章第七節十四四君子湯見第三章第五節十五補中益氣湯見第四章第四節十六三陰瘧疾膏外用治三陰瘧疾寒熱不止麝香一分五釐冰片一錢附子生漂曬乾二錢白胡椒肉桂各錢半公丁香一錢研為極細末用膏藥一張上藥末一分於發日五更空腹未發之時烘熱貼於臍上手揉百轉睡去片時方可食物忌食生冷油膩蛋面菱芋魚腥發物十七八珍湯調和榮衛滋養血氣治陰虛內熱脾胃虧損肌肉消瘦當歸川芎白芍熟地人參白朮茯苓甘草炙加生薑大棗十八人參養榮湯升陽滋陰治脾肺俱虛發熱惡寒肢體瘦倦食少作瀉發黃或潰瘍氣血虧弱寒熱不退肢體瘦倦面黃食少氣短瘡口不斂及病後咳嗽自汗潮熱口乾食少心虛驚悸下利等證人參陳皮黃耆炙桂心當歸酒拌白朮甘草炙各一錢白芍酒洗一錢五分熟地酒拌五味子炒杵茯苓各七分五釐遠志五分加生薑大棗清水煎服十九瘧母丸治瘧痞結於左脅硬痛者鱉甲醋炙三兩青皮炒桃仁炒神麯炒麥芽炒各一兩三稜醋煮蓬莪朮醋煮海珠粉醋煮各五錢香附醋煮二兩紅花三錢共研末神麯糊為丸如梧桐子大二十鱉甲煎丸治瘧母鱉甲炙一兩二錢鼠婦熬黃芩各三分柴胡蜣螂熬各六分乾薑大黃桂枝石韋去毛厚朴紫葳半夏阿膠芍藥丹皮蟅蟲熬各五分葶藶炒人參各一分烏扇燒瞿麥蜂窠炙各四分赤硝一錢二分桃仁二分如法為丸如梧子大每服七丸一日三次忌食生冷雞蛋豆麥等物二十一金雞納霜治一切瘧疾久瘧不止及三陰瘧疾第三節痢疾述要甲概況痢疾亦稱滯下以大便下黏液之物裡急後重滯而不暢也下赤色者謂之赤痢下白色者謂之白痢赤白兼下者謂之赤白痢通常下痢大都赤白兼有下純白或純赤者則較少也痢疾之輕者糞中雜痢次數不多滯急之狀亦不甚劇痢疾之重者純痢無糞日夜臨圊常數十百次欲下則滯痛甚劇而終於所下無幾又痢疾之輕者常發於秋初痢疾之重者多發於秋深然痢疾之重輕猶未可全恃乎此以為斷也痢疾之出入恆在發熱之甚否其有初起發熱而入後漸減漸無者縱腹痛滯下次數極多證狀雖劇必有可愈之道若身熱漸發漸高旋退而又增縱腹痛尚緩次數尚少證狀雖差必有危險之虞此昔人所以有熱不休死不治之説也又痢疾之不能飲食者謂之噤口痢亦屬重證偏實者為腸胃灼熱所致偏虛者為津液枯涸所致久痢不止而不食者常為不治痢之時止時作者謂之休息痢雖非危證然常經年纍月而不愈多由初起失於通利致濕熱之邪留舍不去所致若不謹慎調攝恐其永成痼疾皆不可以不慎也痢疾之起源雖由時令之偏口腹感染所致然必腸中傳化失職濕熱內伏先為其因以致時邪乘之津液受傷遂變化為痢成此奔迫下注之狀所以腹痛滯下者以濕邪膠結氣不足以引之外達氣欲行而難行故痛濕欲去而又留故滯也大抵濕熱之邪傷其氣分者則腐化而為白痢濕熱之邪傷其血分者則下潰而為赤痢氣血俱傷者赤白皆齊下然腸中迂回細小之地病則氣血未有不並傷者故患痢者亦以赤白兼下為多休息痢疾則以瘀熱留伏於膜油隱匿之地蒸腐日久不復能分赤白故多見似凍之濁物泄下後則外結灰色之衣而已此外有腸中發赤發腫以致潰爛膿血者謂之膿血痢亦有僅見純血者謂之純血痢然膿與血不必僅見於痢疾如腸癰腸風及泄瀉等證中亦多有之固不可混統指為痢疾以致臨證貽誤也乙治法痢疾初起概忌止澀而宜通利蓋痢為腸腑之病濕熱之邪非通利不能引之外出也惟通利之法約有數端熱重者通之以苦降濕重者通之以分利滯甚者通之以攻下而初起尚有糞便未盡化痢者則宜以消食行滯之法為之治更不必先用苦降也至於痢疾經久確為滑脫不禁無滯下急痛之實象而有腸腹㽱痛之虛象者乃可以言止澀故通因通用之法治痢之新病而實者也塞因塞用之法治痢之久病而虛者也治赤痢宜和血治白痢宜調氣赤白痢下和血調氣通治方有芍藥湯赤白皆治氣血並顧為痢疾初起之主方惟痢疾初起尚在似痢非痢之間者可用神麯焦楂肉焦麥芽檳榔陳皮枳殼之類以消食行滯不必作痢治而胃氣一醒腑氣一通痢疾竟有消滅於無形者若滯下甚急身熱亦壯來勢頗盛者則不能不專作痢治矣凡痢之熱重積多滯下不暢者宜木香檳榔丸痢之濕與熱俱重須祛濕行滯並行者宜枳朮導滯丸痢之熱甚渴甚後重滯下者宜白頭翁湯白痢之偏於熱者宜芍藥湯加杏仁桔梗偏於濕者宜胃苓湯加木香砂仁偏於虛寒者宜二陳湯加炮薑焦朮厚朴木香砂仁日久下痢清白手足厥冷腹痛不已者宜附子理中湯氣虛滑脫不禁者宜用人參黃耆以補氣御米殼以固腸由白痢而變赤白者宜戊已丸赤痢之偏於熱者宜白頭翁湯加黃芩炭槐花炭偏於濕者宜蒼朮地榆湯偏於虛寒服涼藥而下愈甚者宜四君子湯加木香肉豆蔻炮薑炭地榆炭赤痢久而不止虛而欲脫者宜八珍湯加黃耆升麻之類手足厥冷脈漸微細者宜附子理中湯休息痢疾通治方宜駐車丸氣虛者加補中益氣湯單方用龍眼肉一枚包苦參子七粒日日吞之頗為有效凡休息痢之積滯未清者宜香連丸加白朮枳實等以消其滯積滯已清者宜人參黃耆加椿根白皮御米殼之類以塞其脫由下痢而轉下膿血者宜阿膠梅連丸黃連阿膠湯虛者宜純陽真人養臟湯純血痢之稠厚鮮紅而多者屬熱宜用黃連槐角淡芩白芍生地犀角之類稀淡色瘀而少者屬寒宜黃土湯至時時便血隨感隨發血清而色鮮下則四射如濺者是為腸風便血下膿血而腹皮腫脹按之則痛轉側不便者是為腸癰此均非痢疾而有似於痢臨證時不可不細辨之總之治痢之大要一曰初起忌溫補而宜通利蓋通利則腸中膠結之邪熱可去而溫補則使熱愈盛使氣愈滯必至變壞二曰宜通利而不宜急下蓋邪熱膠結類乎溝渠之壅塞惟宜磨鑿疏通庶可逐漸開啓若急下則徒損胃氣無濟於事也三曰不可妄用發表蓋痢疾邪在於腸非發表所能開泄即有身寒發熱者乃內毒熏蒸自內達外固非表邪使然也四曰不可過於分利蓋分利乃止瀉之法而非治痢之道過於分利濕邪雖去而津液受傷必致纏綿不已也至於小兒患痢尤多過貪口腹及恣食瓜果生冷積滯不行而致若用止澀之法最足貽誤大事此皆不可不知者也附方一芍藥湯治痢下膿血及後重窘痛白芍炒二兩當歸尾黃連炒黃芩炒各五錢檳榔木香甘草炙各三錢每服五錢清水煎服二木香檳榔丸治一切滯氣心胸腹脅痞滿二便澀滯木香檳殼枳殼麩炒青皮陳皮蓬莪朮煨切黃連同吳茱萸炒各一兩黃柏酒炒香附醋炒大黃酒蒸各三兩牽牛頭末四兩研為細末朴硝泡水和丸如豌豆大三枳朮導滯丸治脾胃困於濕熱不得運化胸悶腹痛積滯泄瀉枳實五錢白朮土炒黃芩酒炒茯苓黃連薑汁炒各三錢澤瀉二錢神麯五錢大黃一兩共研細末為丸四白頭翁湯治厥陰熱利下重及下利脈沉弦渴欲飲水者白頭翁黃連黃柏秦皮五胃苓湯見第七章第三節六二陳湯見第六章第三節七附子理中湯見第五章第四節八戊己丸治脾胃受濕下痢赤白腹痛米穀不化川黃連吳茱萸白芍藥各等分研末和丸九蒼朮地榆湯治脾經受濕下血蒼朮地榆十四君子湯見第三章第五節十一八珍湯見本章第二節十二駐車丸治陰虛發熱下利膿血及休息痢阿膠搗碎蛤粉炒成珠為末以醋熬成膏十五兩黃連一斤十四兩當歸十五兩乾薑十兩研為末搗篩醋煮阿膠膏為丸如梧桐子大每服十餘丸十三補中益氣湯見第四章第四節十四香連丸見第四章第一節十五阿膠梅連丸治陰虛下痢至夜發熱阿膠黃連各三兩烏梅肉黃柏炒黑赤芍當歸炒赤苓各一兩五錢乾薑一兩研為細末和丸如梧子大每服十餘丸十六黃連阿膠湯治久痢不止黃連炒阿膠炒黨參白朮茯苓各一錢乾薑炒甘草灸各五分木香七分烏梅三個加生薑大棗清水煎食前服十七純陽真人養臟湯治冷熱不調下痢赤白或便膿血或如魚腦裡急後重臍腹㽱痛及脫肛墜下酒毒濕毒便血人參白朮當歸白芍木香各一兩六錢甘草肉桂各八錢肉豆蔻五錢御米殼三兩六錢訶子肉一兩二錢每服四錢清水煎服十八黃土湯治吐血衄血先便後血及婦人血崩産後下痢灶中黃土甘草炙乾地黃白朮附子阿膠黃芩十九痢疾初起方自制治腸胃積滯濕熱熏蒸身熱赤白痢下腹痛滯急川朴黃芩炒白芍鬱金檳榔青皮神麯銀花加左金丸清水煎服咳嗽不爽兼須開肺者加桔梗前胡赤多於白者加當歸炭槐花炭淡芩銀花俱炒炭用口渴甚者去川朴加蘆根藕汁小便少者加赤苓澤瀉二十痢疾熱重方自制治痢疾身熱不退腹痛滯急噁心拒食黃連竹瀝製半夏白芍石蓮肉粉菖蒲羚羊角枳實淡芩炭銀花炭花檳榔鮮佩蘭服藥後動噁心者細呷玫瑰花露一杯以定之二十一陳萊蔔菜萊蔔菜經風霜雨雪後曬乾收藏小兒患痢疾可取用數錢加生薑一二片煎湯服有效第九章雜證論治第一節二便下血甲概況小兒二便下血宜分虛實凡大便下血初起多為肥甘積熱蘊蓄於腸傳化失職以致便血無論色紫色鮮當從實治下血日久或糞前先下或糞後淋出爽而不痛者當從虛治糞中雜有赤白似凍者則為痢疾凡便血之類不論先後血是血糞是糞者此為大腸之血雖多無礙若有血點血絲混於糞內者當防其為小腸之血最為難治放下血之輕重不能遽以多少斷也凡小便溲血初起多為心經有熱由小腸傳導而下當從實治腎虧而下者血液全混於小便之中當從虛治然小兒二便下血非習見之病或由跌僕傷其腰腑或由玩弄傷其尿道亦間有之凡此外來之因一時未能診得故治病之始當先問其源庶幾著手較易也乙治法大便下血初起宜用槐花銀花各三錢神麯山楂炒炭各二錢加五倍子以涼血清熱消食化積多者加黑荊芥側柏炭以止之便血日久者宜四君子湯加川連或用補中益氣湯以升提之赤白似凍當從痢治參看第八章小便溲血初起宜清心經之熱用導赤散或清心蓮子飲腎虧而下病後所致者宜用黃耆旱蓮草枸杞子補骨脂之類以固之若虛而有熱者用六味地黃丸因損傷溲血者腰腑受傷宜用杜仲川斷之類佐以和血養血之劑尿道受傷宜用大豆甘草萹蓄草赤芍生地車前子以和養清利傷於外部者則以大豆甘草湯洗之附方一四君子湯見第三章第五節二補中益氣湯見第四章第四節三導赤散見第四章第一節四清心蓮子飲治上盛下虛心火炎上口苦咽乾心煩發渴及膀胱氣虛濕熱陰莖腫痛或莖竅澀滯小便赤或白濁亦治婦人積熱血崩白濁帶下石蓮肉去心白茯苓黃耆蜜炙人參各七分五釐黃芩麥冬去心地骨皮車前子炒甘草炙各一錢清水煎服五六味地黃丸見第三章第五節六大豆甘草湯外用止癢消疼解毒治各種疳瘡黑豆一合生甘草一兩赤皮蔥三莖槐條六十寸清水煎湯候溫洗之第二節吐血嘔血甲概況小兒寡七情之火故內傷吐血較成人為少然偶或患之則較成人為重必須加意治療以免變端凡血之夾痰而出者是為肺血可從咳嗽一類參看之見第六章若巨口吐出者則為胃血新病吐血者先宜行瘀再進和絡久病吐血者則宜止澀之然胃中是否夾痰是否夾濕是否積有死血均須詳別至於有因胃寒而吐者更居少數暴湧而嘔出者屬於大熱辨之明察庶可無誤乙治法小兒因咳傷氣管而咯血者進潤肺化痰之品即可漸愈若咳嗽歷久痰中帶血則宜照內傷咳嗽之例為之治具有巨口吐出屬於胃血宜柏枝飲暴湧嘔出者宜急用童便乘熱飲以止之否則出血過多必有暴脫之危也通常吐血一證行瘀之劑為桃仁三七紅花之屬吐血初起色紫者宜加而用之破血之劑為莪朮三稜大黃之屬瘀血久而積塊者宜之和絡之劑為丹皮白芍丹參之屬血絡有熱者宜之止血之劑為白芨棕櫚炭代赭石之屬傷重血多者宜之夾痰者栝蔞杏仁貝母之屬可用夾濕者白朮茯苓澤瀉之屬可用血熱者宜降犀角地黃茜草之屬可用血寒者宜溫肉桂乾薑沉香之屬可用至於吐血和平之劑最無弊害者有茅根蓮鬚藕節等品不寒不熱不塞不通用之於小兒為尤適也附方一柏枝飲治小兒衄血吐血柏枝藕節等分研為末三歲小兒每服五分藕汁入蜜沸湯調下本方加代赭石白芍功用尤大二乾薑甘草湯治心肺寒而嘔血或感受寒涼多食生冷吐血色黯黑面白脈微者乾薑甘草第三節身體腫脹甲概況小兒腫脹其原因與成人相同而得之則較成人為易以腫脹之病源在於脾而小兒則脾弱易於受病也考腫脹一症腫與脹有別腫浮滿於外脹則急脹於裡腫有虛實脹亦有虛實腫之急而按之滿大便結而小便赤者實也腫之寬而按之陷大便溏而小便清者虛也脹之堅而按之實大便祕而身體熱者實也脹之寬而按之緩大便溏而身不熱者虛也然腫脹無論虛實要莫不起源於脾而關涉於肺腎蓋脾主運化精微肺主氣行治節腎主分利行水三者失職則水壅而不流氣滯而不調於是腫脹成矣腸胃有滯脾氣壅塞而不能運脾不能上輸於肺則肺亦不能下注於腎水行橫決而四泛是腫之實者腸胃薄弱脾氣衰敗而不能運或肺之治節有虧或腎之行水無權水道淤阻而四泛是腫之虛者脾積氣滯而不運是脹之實者脾衰氣虛而不運是脹之虛者亦有虛實參半者更宜詳辨總之腫脹之來或六淫外客或飲食內傷其來速者去亦速多屬於實或情志之病或勞傷日積其來漸者去不易多屬於虛凡腫或腫於全身或腫在頭面或腫在兩腳凡脹多脹於胸腹大率實證皆為易治虛證皆為難療也乙治法凡目胞上下微突如新臥起之狀者為腫病之先兆腫之來勢捷而成於數日之間者多屬實屬水輕者四肢面目作腫重者全身腫大甚至陰囊陰莖亦腫大而呈晶亮之狀通治宜新五皮飲以消其水甚則甘遂商陸之類亦可量證酌加若小便不利腫勢不減者宜新五皮飲加赤小豆豬苓澤瀉木通之屬其由咳嗽不爽肺氣不宣以致小便不利者宜酌加麻黃以開之大凡腫在腰上者宜發汗所謂開鬼門腫在腰下者宜利小便所謂潔淨府然二者之中究以利小便為要蓋水濕之邪不利小便終非其治也若利小便而猶不愈必脾虛而水易留聚其流雖通其源未浚必用健脾之劑如白朮蒼朮於朮山藥之類如能有效水腫之半虛半實者宜五苓散或理中湯減乾薑加白朮桑皮以治之腫之來勢緩而成於日積月纍者多屬虛屬氣然偶有夾水非由腎之不利實由脾肺皆虛治宜實脾飲或復元丹脹之實者胸腹滿通治宜藿香正氣丸脹之虛者外觀雖急而中空通治宜調中健脾丸若病進則漸成臌脹為難治之證矣參看第三章第六節附方一新五皮飲自制治一切身腫黃耆皮大腹皮冬瓜皮茯苓皮桑白皮各等分清水煎服頭面腫加麻黃腳腫去大腹皮加檳榔赤小豆牛膝小便不利加木通車前子一身俱腫腹膨晶亮加白朮豬苓澤瀉甘遂嘔水泛惡加生薑皮二五苓散見第三章第五節三理中湯見第一章第四節四實脾飲治身重懶食肢體浮腫口中不渴二便不實者厚朴白朮木瓜附子木香草果乾薑茯苓大腹皮加生薑五復元丹治脾胃俱虛發為水腫四肢虛浮心腹堅脹小便不痛兩目下腫附子木香茴香川椒厚朴獨活白朮橘紅吳萸肉桂澤瀉六藿香正氣丸見第七章第四節七調中健脾丸治臌脹單腹脹人參蒼朮黃耆吳萸茯苓白朮沉香陳皮半夏香附楂肉苡米黃連白芍蘇子澤瀉草豆蔻萊蔔子五加皮全栝蔞川椒鹼荷葉大腹皮煎湯打黃米粉糊丸八地骷髏治噤口痢疾傷力黃腫及腫脹膨脹不可消導者萊蔔之老於地內者瘦而無肉老而多筋如骷髏然掘出煎湯用第四節疝氣偏墜甲概況小兒疝氣多由先天所致後天則或感寒濕或傷生冷亦間有之此證多臍下絞痛或陰核腫大或偏一邊而墜下引痛則啼哭不止頗為受纍若任其遷延往往至長成病至陰囊腫大數倍於尋常而頑木不痛者則成為終身痼疾無法治療矣乙治法疝氣初起頭疼身熱或惡寒狀熱者宜參蘇飲加木香臍下絞痛者宜茱萸內消丸陰核腫大而成疝者宜桂枝湯加細辛當歸木香蠍尾睪丸偏一邊而墜下宜用四黃散燒存性研為細末雄豬膽汁調敷之或用灸法於莖下腎囊前中間弦子上灸之七壯頗較服藥為效也附方一茱萸內消丸治小兒陰㿗偏大上攻臍腹㽱痛陰囊腫脹或生瘡瘍時出黃水吳茱萸食茱萸各五錢山茱萸桔梗青皮各一兩川楝子一兩五錢大腹皮五味子海藻延胡索各一兩二錢五分木香七錢五分茴香桂心川烏頭桃仁各五錢共研細末為丸如麻子大每服三十丸二桂枝湯見第四章第四節三四黃散外用治小兒疝氣睪丸偏墜黃連黃芩大黃黃柏各二錢燒存性為極細末四參蘇飲見第五章第二節五包敷法外用治寒熱疼痛欲成囊癰者鮮地骨皮生薑各四兩共搗如泥用絹包於囊上其癢異常一夕即消第五節小兒瘡瘍甲概況小兒因父母之遺傳或乳母之積熱及飲食腐濁之氣久蓄腸胃以致血氣凝滯結而成毒重者則成為內癰輕者外發為瘡瘍治宜內托外疏切忌毒藥峻攻瘡瘍之種類約有舌瘡口瘡禿瘡疥瘡黃水黏瘡鶴膝風痛流注癰疽等茲分述其治法如下參看第三章第七節胎毒條乙治法小兒瘡瘍結成外治通用方宜四黃散舌瘡內服三黃湯或以桑白皮汁塗乳頭上與兒吮之若脾胃虛弱腹痛惡寒口舌生瘡者宜六君子湯加乾薑肉桂口瘡若口內糜爛出血者內服犀角連翹生地玄參丹皮之屬外敷消黃散口內白腐不甚疼痛者內服百解散外敷立效散黃金散禿瘡內服苦參丸外用苦參為末油調敷之或用柏油膏塗敷疥瘡內服四君子湯加栝蔞根桔梗外治春用柳條荊芥夏用棗葉槐枝秋冬用苦參均煎濃湯洗之黃水黏瘡內服犀角消毒散日久黏水不絶者脾胃已虛宜異功散外用輕粉樟腦各二錢大楓子去殼川椒各四十九粒杏仁一錢共為細末柏油調敷之鶴膝風痛膝內作痛焮腫色赤內服宜大防風湯或百解散和五苓散加麻黃薑蔥煎服腫硬色白而不作膿者難治流注初起外用蔥尉法內服宜消之已成膿者須內托又凡小兒癰疽與成人大致相同治法初起宜清涼解毒膿成宜托裡透膿善後宜培補脾胃兼泄餘毒則大旨當為不謬也附方一四黃散外用治小兒身上一切熱毒瘡疾燥癢抓破有汁不幹黃連黃柏黃芩大黃滑石各五錢五倍子二錢半曬研為末每用二三錢清油調塗患處二三黃湯見第三章第三節三六君子湯見第五章第三節四消黃散外用治風熱上攻舌硬腫大風化硝蒲黃各五錢先以蒲黃研為細末再同朴硝研勻外用點揩舌之上下五百解散治瘡瘍乾葛升麻赤芍甘草黃芩麻黃肉桂六立效散外用治小兒喉痹硼砂龍腦雄黃朴硝各五分研為極細末乾摻之七黃金散外用治口舌瘡毒痘瘡後目生翳膜黃柏蜜潤透曬乾再潤多次粉甘草各一兩研為細末點患處八苦參丸治痂疥瘙癢苦參一斤皂角二斤將皂角濾濃汁和苦參末為丸一方無皂角有菖蒲烏蛇九柏油膏外用治小兒頭上肥瘡羊胡瘡奶癬瘡膿窠瘡柏油一斤麻油四兩明礬銅緑各二兩鉛粉一兩共入鍋內熬成紅色下黃蠟入羊膽汁或豬膽汁一個攪勻瓷鉢收貯十四君子湯見第三章第五節十一犀角消毒散治斑疹丹毒積毒發於肌表頭面生瘡或痛或癢犀角二分牛蒡子甘草荊芥防風各五分金銀花三分清水煎服十二異功散見第三章第六節十三大防風湯治足三陰經虧損外邪乘虛入內致腿膝疼痛或成鶴膝風附骨疽等證防風白朮羌活人參川芎白芍附子牛膝各一錢肉桂黃耆杜仲熟地甘草各五分加生薑三片清水煎服十四五苓散見第三章第五節十五蔥尉法外用治癰疽風痰流注便毒結塊蔥一握炙熱搗爛作餅敷於痛處用厚布二三層以尉斗尉之再內服托毒內消之劑
